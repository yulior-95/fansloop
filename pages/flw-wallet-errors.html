<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 异常提示</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<link rel="stylesheet" href="../css/flw-wallet-flow.css">
</head>
<body>
<div class="status-bar dark-mode"><span class="time">9:41</span><span class="right"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></span></div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">异常与提示</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app">
    <div class="fl-bg" style="background:var(--bg-primary)"></div>
    <div class="fl-scroll" style="position:relative; z-index:1; padding-top:4px; font-size:12px; color:var(--text-tertiary)">
        <p style="margin:0 0 12px">与 MetaMask / WalletConnect 登录流程相关的一页汇总，可拆为 Toast/Modal 组件复用。</p>
        <div class="fl-section-h" style="margin-top:0">1 拒绝连接</div>
        <div class="fl-alert err" style="font-size:12px">连接已取消。请重新点击「连接钱包」并在钱包中允许。</div>
        <div class="fl-section-h">2 拒绝签名</div>
        <div class="fl-alert err" style="font-size:12px">签名失败，请重试。需完整签名以绑定 user_id 并建立登录。</div>
        <div class="fl-section-h">3 连接失败</div>
        <div class="fl-alert err" style="font-size:12px">钱包连接失败，请检查 <strong>网络</strong> 或 <strong>扩展 / App</strong> 是否可用。</div>
        <div class="fl-section-h">4 签名校验未通过</div>
        <div class="fl-alert err" style="font-size:12px">验证失败，请重新登录。请勿篡改 message、nonce 或 time。</div>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active"><i class="fa-regular fa-user"></i><span>我的</span><span class="fl-tab-sub">未登录</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
