<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 解绑申请</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
</head>
<body>
<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right"><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">解绑钱包</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app">
    <div class="fl-bg" style="background: var(--bg-primary)"></div>
    <div class="fl-scroll" style="position: relative; z-index: 1; padding-top: 4px">
        <div class="fl-card" style="border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.05)">
            <div class="fl-wallet-item" style="background: transparent; border: none; margin: 0; padding: 0 0 12px">
                <div class="w-icon" style="background: var(--bg-elevated)"><i class="fa-brands fa-ethereum"></i></div>
                <div class="w-info">
                    <div class="w-addr">0x1f90****a02e</div>
                    <div class="w-sub">申请解绑 · 将失去默认提现到该地址</div>
                </div>
            </div>
        </div>
        <div class="fl-alert warn" style="margin: 16px 0">
            解绑需 <strong>24 小时</strong> 后生效。生效前仍可用于充值识别；<strong>短期内不可将同一钱包绑定到其它账号</strong>。频繁解绑会触发限频。
        </div>
        <div class="fl-card" style="font-size: 13px; line-height: 1.6; color: var(--text-secondary)">
            <div style="display:flex; align-items: flex-start; gap:8px; margin-bottom: 12px">
                <span class="badge" style="background: var(--bg-elevated)">1</span>
                提交后进入冷静期
            </div>
            <div style="display:flex; align-items: flex-start; gap:8px; margin-bottom: 12px">
                <span class="badge" style="background: var(--bg-elevated)">2</span>
                解绑后部分功能受限（以产品规则为准）
            </div>
            <div style="display:flex; align-items: flex-start; gap:8px">
                <span class="badge" style="background: var(--bg-elevated)">3</span>
                主钱包若被解绑，将提示先设新的主钱包
            </div>
        </div>
        <div style="margin-top: 20px; display: flex; gap: 10px">
            <button class="btn btn-secondary btn-block" type="button" style="flex:1">取消</button>
            <button class="btn btn-primary btn-block" type="button" style="flex:1; background: linear-gradient(135deg, #EF4444 0%, #B91C1C 100%)">确认申请解绑</button>
        </div>
        <p class="fl-toast" style="margin-top: 16px">与资产系统：链上资金在你自己的地址；<strong>平台记账户</strong> 余额始终跟随 user_id。</p>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active"><i class="fa-regular fa-user"></i><span>我的</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
