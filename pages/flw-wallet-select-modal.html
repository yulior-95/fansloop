<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 选择钱包</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<link rel="stylesheet" href="../css/flw-wallet-flow.css">
</head>
<body>
<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right"><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">连接钱包</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app" style="background:var(--bg-primary)">
    <div class="fl-bg" style="background:var(--bg-primary)"></div>
    <div class="fl-scroll" style="position:relative;z-index:1; padding-top:4px; color:var(--text-tertiary); font-size:14px; text-align:center; padding-bottom:8px">
        此处为入口页在点击「连接钱包」后的态<br>主列表被半透明遮罩覆盖
    </div>
    <div class="fl-overlay fl-overlay--reserve-tab" style="z-index: 40; background: rgba(0,0,0,0.45)">
        <div class="fl-sheet" style="max-height: 90%; padding: 0 0 8px 0; background: var(--bg-secondary)">
            <div class="grab" style="margin: 8px auto 4px"></div>
            <h3 style="padding: 0 20px 12px; font-size: 16px; font-weight: 700; text-align: left">选择钱包</h3>
            <p style="padding: 0 20px 16px; font-size: 12px; color: var(--text-tertiary); line-height: 1.4; text-align: left">MetaMask 适合电脑浏览器；WalletConnect 可连接手机上的各类钱包</p>
            <div class="fl-btn-row" style="margin: 0 16px 10px; border: 1px solid rgba(225,119,38,0.4); background: rgba(225,119,38,0.06)">
                <i class="fa-brands fa-metamask" style="font-size: 30px; color: #E17726"></i>
                <div style="flex: 1; text-align: left">
                    <div style="font-weight: 700; font-size: 16px">MetaMask <span class="flw-badge-rec">推荐</span> <span style="font-size: 11px; font-weight: 500; color: var(--text-tertiary)">PC 浏览器</span></div>
                    <div style="font-size: 12px; color: var(--text-tertiary)">调起扩展连接</div>
                </div>
                <i class="fa-solid fa-chevron-right fl-chevron"></i>
            </div>
            <div class="fl-btn-row" style="margin: 0 16px 8px; border: 1px solid rgba(51,150,255,0.35)">
                <i class="fa-brands fa-ethereum" style="font-size: 26px; color: #3396FF"></i>
                <div style="flex: 1; text-align: left">
                    <div style="font-weight: 700; font-size: 16px">WalletConnect <span class="flw-badge-rec" style="background: rgba(51,150,255,0.2); color: #93C5FD">v2</span> <span style="font-size: 11px; font-weight: 500; color: var(--text-tertiary)">移动/其他</span></div>
                    <div style="font-size: 12px; color: var(--text-tertiary)">二维码或 Deep Link 打开钱包 App</div>
                </div>
                <i class="fa-solid fa-chevron-right fl-chevron"></i>
            </div>
            <p style="text-align:center; font-size: 11px; color: var(--text-muted); padding: 0 20px 16px">连接后统一进入「请求签名」步骤，后端校验后发放会话</p>
        </div>
    </div>
</div>
<div class="tab-bar" style="z-index: 50">
    <div class="tab-item active"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item"><i class="fa-regular fa-user"></i><span>我的</span></div>
</div>
<div class="home-indicator" style="z-index: 55"></div>
</body>
</html>
