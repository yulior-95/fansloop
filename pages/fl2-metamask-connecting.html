<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 连接 MetaMask</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<style>
    body {
        background:
            radial-gradient(ellipse at 50% 25%, rgba(225,119,38,0.18), transparent 55%),
            radial-gradient(ellipse at 50% 80%, rgba(168,85,247,0.15), transparent 60%),
            #0A0A12;
    }

    .fl2-connect-wrap {
        position: absolute;
        top: calc(var(--status-bar-height) + var(--nav-bar-height));
        bottom: 0; left: 0; right: 0;
        display: flex; flex-direction: column; align-items: center;
        padding: 0 24px;
    }

    /* MetaMask 大 logo pulse */
    .fl2-mm-logo {
        width: 120px; height: 120px; margin: 40px 0 12px;
        border-radius: 32px;
        background: linear-gradient(135deg, #F6851B 0%, #E17726 50%, #C85B16 100%);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 20px 60px rgba(225,119,38,0.45),
                    inset 0 2px 0 rgba(255,255,255,0.25);
        position: relative;
    }
    .fl2-mm-logo::before, .fl2-mm-logo::after {
        content: ''; position: absolute; inset: 0;
        border-radius: 32px;
        border: 2px solid rgba(225,119,38,0.5);
        animation: fl2pulse 2.2s ease-out infinite;
    }
    .fl2-mm-logo::after { animation-delay: 1.1s; }
    @keyframes fl2pulse {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(1.55); opacity: 0; }
    }

    .fl2-mm-logo svg { position: relative; z-index: 2; }

    .fl2-dots-link {
        display: flex; align-items: center; gap: 6px;
        margin-top: 10px; color: var(--text-tertiary); font-size: 11px;
    }
    .fl2-dots {
        display: flex; gap: 5px; align-items: center;
    }
    .fl2-dots .d {
        width: 5px; height: 5px; border-radius: 50%;
        background: #A855F7;
        animation: fl2dot 1.4s ease-in-out infinite;
    }
    .fl2-dots .d:nth-child(2) { animation-delay: 0.2s; }
    .fl2-dots .d:nth-child(3) { animation-delay: 0.4s; }
    .fl2-dots .d:nth-child(4) { animation-delay: 0.6s; }
    @keyframes fl2dot {
        0%, 100% { opacity: 0.25; transform: scale(0.7); }
        50% { opacity: 1; transform: scale(1); }
    }

    .fl2-app-badge {
        width: 44px; height: 44px; border-radius: 12px;
        background: linear-gradient(135deg, #A855F7, #EC4899);
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: 18px;
        box-shadow: 0 4px 14px rgba(168,85,247,0.4);
    }

    .fl2-title-big {
        font-size: 22px; font-weight: 700;
        margin-top: 28px; text-align: center;
        letter-spacing: -0.3px;
    }
    .fl2-desc {
        font-size: 13px; color: var(--text-secondary);
        text-align: center; margin-top: 8px;
        line-height: 1.6; max-width: 300px;
    }

    /* 步骤卡片 */
    .fl2-steps {
        width: 100%; margin-top: 28px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        padding: 18px 18px 6px;
    }
    .fl2-step {
        display: flex; gap: 14px;
        padding: 10px 0;
        position: relative;
    }
    .fl2-step + .fl2-step {
        border-top: 0.5px solid rgba(255,255,255,0.06);
    }
    .fl2-step-n {
        width: 28px; height: 28px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 12px; font-weight: 700;
        flex-shrink: 0;
    }
    .fl2-step-n.done {
        background: rgba(16,185,129,0.15);
        color: #10B981; border: 1px solid rgba(16,185,129,0.3);
    }
    .fl2-step-n.active {
        background: linear-gradient(135deg, #A855F7, #EC4899);
        color: #fff;
        box-shadow: 0 0 0 4px rgba(168,85,247,0.2);
        animation: fl2stepglow 1.6s ease-in-out infinite;
    }
    .fl2-step-n.pending {
        background: rgba(255,255,255,0.05);
        color: var(--text-muted);
        border: 1px solid rgba(255,255,255,0.08);
    }
    @keyframes fl2stepglow {
        0%, 100% { box-shadow: 0 0 0 4px rgba(168,85,247,0.2); }
        50% { box-shadow: 0 0 0 8px rgba(168,85,247,0.08); }
    }
    .fl2-step-info .title {
        font-size: 14px; font-weight: 600;
    }
    .fl2-step-info .sub {
        font-size: 12px; color: var(--text-tertiary); margin-top: 2px;
        line-height: 1.5;
    }
    .fl2-step-n.pending ~ .fl2-step-info .title { color: var(--text-tertiary); }

    /* 底部 */
    .fl2-foot-note {
        margin-top: auto; margin-bottom: 20px;
        padding: 12px 16px;
        background: rgba(245,158,11,0.08);
        border: 1px solid rgba(245,158,11,0.18);
        border-radius: 12px;
        font-size: 12px; color: #FCD34D;
        display: flex; gap: 10px; align-items: flex-start;
        line-height: 1.5;
    }
    .fl2-foot-note i { margin-top: 2px; flex-shrink: 0; }

    .fl2-cancel-btn {
        width: 100%; height: 46px; margin-bottom: 10px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        color: #fff; font-size: 14px; font-weight: 500;
        border-radius: 12px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
    </span>
</div>

<div class="nav-bar" style="top:var(--status-bar-height)">
    <div class="nav-left">
        <div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div>
    </div>
    <div class="nav-title">连接 MetaMask</div>
    <div class="nav-right"></div>
</div>

<div class="fl2-connect-wrap">

    <div class="fl2-mm-logo">
        <!-- Fox-like simple icon -->
        <svg viewBox="0 0 80 80" width="62" height="62">
            <defs>
                <linearGradient id="foxg" x1="0" x2="1" y1="0" y2="1">
                    <stop offset="0%" stop-color="#fff"/>
                    <stop offset="100%" stop-color="#FDE68A"/>
                </linearGradient>
            </defs>
            <path fill="url(#foxg)" d="M65 12 L46 24 L49 16 L65 12 Z
                                      M15 12 L34 24 L31 16 L15 12 Z
                                      M55 48 L60 56 L50 58 Z
                                      M25 48 L20 56 L30 58 Z
                                      M40 38 L28 42 L40 52 L52 42 Z
                                      M40 56 L32 64 L40 66 L48 64 Z"/>
        </svg>
    </div>

    <div class="fl2-dots-link">
        <div class="fl2-app-badge" style="width:20px; height:20px; font-size:10px; border-radius:6px;">
            <i class="fa-solid fa-infinity"></i>
        </div>
        <div class="fl2-dots">
            <div class="d"></div><div class="d"></div><div class="d"></div><div class="d"></div>
        </div>
        <span>FansLoop</span>
    </div>

    <div class="fl2-title-big">正在连接你的 MetaMask</div>
    <div class="fl2-desc">请打开浏览器右上角 MetaMask 扩展，在弹窗中确认授权连接</div>

    <div class="fl2-steps">
        <div class="fl2-step">
            <div class="fl2-step-n done"><i class="fa-solid fa-check" style="font-size:11px"></i></div>
            <div class="fl2-step-info">
                <div class="title">检测到 MetaMask 扩展</div>
                <div class="sub">v11.16.4 · Chrome 128</div>
            </div>
        </div>
        <div class="fl2-step">
            <div class="fl2-step-n active">2</div>
            <div class="fl2-step-info">
                <div class="title">等待你在 MetaMask 确认连接…</div>
                <div class="sub">请求来自：fansloop.xyz · 仅读取公开地址</div>
            </div>
        </div>
        <div class="fl2-step">
            <div class="fl2-step-n pending">3</div>
            <div class="fl2-step-info">
                <div class="title">获取钱包地址</div>
                <div class="sub">将展示签名请求内容</div>
            </div>
        </div>
        <div class="fl2-step">
            <div class="fl2-step-n pending">4</div>
            <div class="fl2-step-info">
                <div class="title">签名并验证身份</div>
                <div class="sub">后端校验签名后完成登录</div>
            </div>
        </div>
    </div>

    <div class="fl2-foot-note">
        <i class="fa-solid fa-circle-info"></i>
        <span>若未弹出窗口，请点击浏览器右上角 MetaMask 图标手动查看。首次连接会展示权限清单。</span>
    </div>

    <button class="fl2-cancel-btn">取消连接</button>
</div>

<div class="home-indicator"></div>
</body>
</html>
