<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>收款方式</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<style>
.nav-bar { background: var(--bg-primary); }
.app-content {
    padding-top: calc(var(--status-bar-height) + var(--nav-bar-height));
    padding-bottom: 100px;
}

/* 收益概览 */
.income-card {
    margin: 8px 16px 16px;
    padding: 18px;
    border-radius: var(--radius-xl);
    background: linear-gradient(135deg, #10B981 0%, #06B6D4 100%);
    color: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(16,185,129,0.3);
}
.income-card::before {
    content: ''; position: absolute;
    top: -30%; right: -20%;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 70%);
}
.income-card .label {
    font-size: 12px; opacity: 0.85;
    display: flex; align-items: center; gap: 6px;
}
.income-card .amount {
    font-size: 28px; font-weight: 800;
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
    display: flex; align-items: baseline; gap: 4px;
}
.income-card .amount .unit { font-size: 13px; font-weight: 500; opacity: 0.9; }
.income-card .row {
    margin-top: 14px;
    display: flex; gap: 16px;
    font-size: 12px;
    position: relative;
}
.income-card .row .r-k { opacity: 0.85; }
.income-card .row .r-v { font-weight: 700; margin-left: 4px; }

/* 列表 */
.section-title {
    padding: 10px 16px;
    font-size: 13px; color: var(--text-secondary); font-weight: 600;
    display: flex; justify-content: space-between;
}

.method-list {
    margin: 0 16px 12px;
    display: flex; flex-direction: column; gap: 10px;
}
.method-card {
    padding: 14px;
    border-radius: var(--radius-lg);
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    display: flex; align-items: center; gap: 12px;
    position: relative;
}
.method-card.primary {
    background: linear-gradient(135deg, rgba(168,85,247,0.12), rgba(236,72,153,0.05));
    border-color: rgba(168,85,247,0.3);
}
.method-card.primary::after {
    content: '默认';
    position: absolute;
    top: 10px; right: 12px;
    padding: 2px 8px;
    border-radius: var(--radius-full);
    background: var(--brand-gradient);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
}
.method-card .m-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
}
.method-card .m-icon.usdt { background: linear-gradient(135deg, rgba(6,182,212,0.25), rgba(6,182,212,0.05)); color: var(--crypto-cyan); }
.method-card .m-icon.alipay { background: rgba(22,119,255,0.15); color: #1677FF; }
.method-card .m-icon.bank { background: rgba(245,158,11,0.15); color: var(--crypto-gold); }
.method-card .m-icon.wechat { background: rgba(7,193,96,0.15); color: #07C160; }

.method-card .info { flex: 1; min-width: 0; }
.method-card .name { font-size: 15px; font-weight: 600; }
.method-card .detail {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 3px;
    font-family: "SF Mono", monospace;
}
.method-card .chain-tag {
    display: inline-flex; align-items: center;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 700;
    background: rgba(239,68,68,0.15);
    color: var(--danger);
    margin-left: 6px;
}
.method-card .more { color: var(--text-tertiary); font-size: 14px; padding: 6px; }

/* 添加收款方式 */
.add-method {
    margin: 0 16px 12px;
    padding: 14px;
    border-radius: var(--radius-lg);
    background: var(--bg-card);
    border: 1.5px dashed var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    color: var(--text-secondary);
    font-size: 14px;
}
.add-method i { color: var(--brand-purple); }

/* 分账规则 */
.rule-card {
    margin: 0 16px 12px;
    padding: 14px;
    background: var(--bg-card);
    border-radius: var(--radius-lg);
}
.rule-card .r-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
}
.rule-card .r-title { font-size: 14px; font-weight: 600; }
.rule-card .r-edit { color: var(--brand-purple); font-size: 12px; }

.bar-wrap {
    margin-top: 8px;
    display: flex; height: 10px;
    border-radius: 5px;
    overflow: hidden;
    background: var(--bg-elevated);
}
.bar-wrap .seg { height: 100%; }
.bar-wrap .seg-1 { background: #06B6D4; }
.bar-wrap .seg-2 { background: var(--brand-gradient); }

.legend {
    display: flex; gap: 14px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-secondary);
}
.legend .l { display: flex; align-items: center; gap: 6px; }
.legend .dot {
    width: 10px; height: 10px; border-radius: 50%;
}

.notice {
    margin: 0 16px;
    padding: 12px 14px;
    border-radius: var(--radius-md);
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.2);
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.6;
    display: flex; gap: 8px;
}
.notice i { color: var(--success); }
</style>
</head>
<body>

<div class="status-bar">
    <span class="time">9:41</span>
    <span class="right">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
    </span>
</div>

<div class="nav-bar solid">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">收款方式</div>
    <div class="nav-right"><div class="nav-btn"><i class="fa-solid fa-plus"></i></div></div>
</div>

<div class="app-content">

    <!-- 累计收益 -->
    <div class="income-card">
        <div class="label"><i class="fa-solid fa-sack-dollar"></i> 本月累计收入</div>
        <div class="amount">
            1,284.92 <span class="unit">USDT</span>
        </div>
        <div class="row">
            <div><span class="r-k">订阅收入</span><span class="r-v">+892.50</span></div>
            <div><span class="r-k">打赏收入</span><span class="r-v">+392.42</span></div>
        </div>
    </div>

    <!-- 绑定的收款方式 -->
    <div class="section-title">
        <span>已绑定收款方式 · 3</span>
    </div>

    <div class="method-list">
        <div class="method-card primary">
            <div class="m-icon usdt"><i class="fa-brands fa-bitcoin"></i></div>
            <div class="info">
                <div class="name">USDT 加密钱包 <span class="chain-tag">TRC20</span></div>
                <div class="detail">TF9K5y8a...k2Yn6q</div>
            </div>
            <i class="fa-solid fa-ellipsis more"></i>
        </div>

        <div class="method-card">
            <div class="m-icon alipay"><i class="fa-brands fa-alipay"></i></div>
            <div class="info">
                <div class="name">支付宝</div>
                <div class="detail">alex***@gmail.com</div>
            </div>
            <i class="fa-solid fa-ellipsis more"></i>
        </div>

        <div class="method-card">
            <div class="m-icon bank"><i class="fa-solid fa-building-columns"></i></div>
            <div class="info">
                <div class="name">招商银行 · 储蓄卡</div>
                <div class="detail">尾号 **** 6218</div>
            </div>
            <i class="fa-solid fa-ellipsis more"></i>
        </div>
    </div>

    <div class="add-method">
        <i class="fa-solid fa-plus"></i>
        <span>添加新的收款方式</span>
    </div>

    <!-- 分账规则 -->
    <div class="section-title">收益结算方式</div>
    <div class="rule-card">
        <div class="r-head">
            <div class="r-title">自动分账比例</div>
            <span class="r-edit">调整 ›</span>
        </div>
        <div class="bar-wrap">
            <div class="seg seg-1" style="width:70%"></div>
            <div class="seg seg-2" style="width:30%"></div>
        </div>
        <div class="legend">
            <div class="l"><span class="dot" style="background:#06B6D4"></span> USDT 钱包 70%</div>
            <div class="l"><span class="dot" style="background:var(--brand-purple)"></span> 支付宝 30%</div>
        </div>
    </div>

    <div class="notice">
        <i class="fa-solid fa-shield-halved"></i>
        <div>
            <strong style="color:var(--success)">平台抽成 0%</strong>，收益全部归创作者所有。
            USDT 结算即时到账，法币结算 T+1 到账，跨境无手续费。
        </div>
    </div>

</div>

<div class="home-indicator"></div>
</body>
</html>
