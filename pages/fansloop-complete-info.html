<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 完善账号</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
</head>
<body>
<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right"><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"></div>
    <div class="nav-title">完善账号信息</div>
    <div class="nav-right"><div class="nav-btn" style="width:auto; padding:0 10px; font-size:15px; font-weight:500">帮助</div></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app">
    <img class="fl-hero-ambient" style="height: 180px" src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1000&q=80" alt="">
    <div class="fl-scroll" style="position: relative; z-index: 1; padding-top: 96px">
        <p style="font-size:14px; color:var(--text-secondary); line-height:1.6; margin: 0 0 20px">
            为找回账号、二次验证与风控，建议绑定 <strong>手机号</strong> 或 <strong>邮箱</strong>。钱包登录首次进入需补充其一。
        </p>
        <div class="fl-card" style="text-align:center; border-style:dashed">
            <i class="fa-solid fa-fingerprint" style="font-size:32px; color:var(--brand-purple); margin-bottom:8px"></i>
            <p style="font-size:12px; color:var(--text-tertiary)">当前 user_id：FL-882-901 · 主资产在此账号下</p>
        </div>
        <div class="form-group" style="margin-top:20px">
            <label class="form-label">手机号 <span class="badge-brand" style="font-size:9px; vertical-align:2px">推荐</span></label>
            <div class="form-input-group">
                <span class="prefix">+86</span>
                <input class="form-input" type="tel" placeholder="11 位手机号" readonly>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">或绑定邮箱</label>
            <div class="form-input-group">
                <input class="form-input" type="email" placeholder="name@email.com" readonly>
            </div>
        </div>
        <button class="btn btn-primary btn-block mt-4" type="button">立即绑定</button>
        <button class="btn btn-ghost btn-block mt-2" type="button" style="font-weight:500; color:var(--text-tertiary)">暂时跳过，稍后提醒我</button>
        <p class="fl-toast" style="margin-top:20px; color:var(--warning)">
            跳过后部分权益与提现将受限，新用户奖励需过风控
        </p>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active"><i class="fa-regular fa-user"></i><span>我的</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
