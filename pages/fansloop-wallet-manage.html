<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 钱包管理</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
</head>
<body>
<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right"><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">钱包管理</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app">
    <div class="fl-bg" style="background: var(--bg-primary)"></div>
    <div class="fl-scroll" style="position: relative; z-index: 1; padding-top: 4px">
        <p style="font-size:13px; color:var(--text-tertiary); margin: 4px 0 16px; line-height:1.5">
            一个钱包仅绑定一个账号。主钱包为默认 <strong>收款 / 提现</strong> 地址，资产仍归属 <strong>user_id</strong>。
        </p>
        <div class="fl-wallet-item">
            <div class="w-icon"><i class="fa-brands fa-ethereum"></i></div>
            <div class="w-info">
                <div class="w-addr">0x7a2f****c3c91</div>
                <div class="w-sub">MetaMask · 以太坊主网</div>
            </div>
            <span class="fl-pill default">主钱包</span>
        </div>
        <div class="fl-wallet-item" style="margin-bottom:0">
            <div class="w-icon" style="background: rgba(6,182,212,0.12); color: var(--crypto-cyan)"><i class="fa-brands fa-ethereum"></i></div>
            <div class="w-info">
                <div class="w-addr">0x1f90****a02e</div>
                <div class="w-sub">WalletConnect · 多链</div>
            </div>
        </div>
        <div style="display:flex; gap:8px; margin: 20px 0 12px">
            <button class="btn btn-primary btn-block" type="button" style="height: 44px"><i class="fa-solid fa-link" style="margin-right:6px"></i>绑定新钱包</button>
        </div>
        <div class="fl-list-row" style="padding:12px 0; background: var(--bg-card); border:1px solid var(--border-color); border-radius: var(--radius-md); margin-bottom:8px; padding-left: 14px; padding-right: 14px; cursor:pointer">
            <span><i class="fa-solid fa-star" style="color:var(--warning)"></i> 设置主钱包</span>
            <span class="r">切换 <i class="fa-solid fa-chevron-right fl-chevron"></i></span>
        </div>
        <div class="fl-list-row" style="padding:12px 0; background: var(--bg-card); border:1px solid var(--border-color); border-radius: var(--radius-md); padding-left: 14px; padding-right: 14px; cursor:pointer">
            <span style="color:var(--danger)"><i class="fa-solid fa-link-slash" style="margin-right:4px"></i>解绑钱包</span>
            <span class="r">有冷却 <i class="fa-solid fa-chevron-right fl-chevron"></i></span>
        </div>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active"><i class="fa-regular fa-user"></i><span>我的</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
