<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 入口（连接钱包）</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<link rel="stylesheet" href="../css/flw-wallet-flow.css">
</head>
<body>
<div class="status-bar dark-mode"><span class="time">9:41</span><span class="right"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></span></div>
<div class="app-content content-with-tab fansloop-app">
    <div class="fl-bg-hero" style="height:42%; background-image:url('https://images.unsplash.com/photo-1620321023374-d1a68fbc720d?w=1200&q=80');"></div>
    <div class="fl-scroll fl-welcome-only">
        <div class="fl-brand" style="padding-top:8px">
            <div class="fl-brand-icon"><i class="fa-solid fa-infinity"></i></div>
            <h1>登录 / 注册 <span class="gradient-text">FansLoop</span></h1>
            <p>使用钱包一键登录 · 支持 MetaMask 与 WalletConnect</p>
        </div>
        <button class="btn btn-primary btn-block" type="button" style="height:52px; gap:10px">
            <i class="fa-solid fa-wallet"></i> 连接钱包
        </button>
        <p class="terms" style="margin-top:16px">点击后将弹出钱包选择（MetaMask / WalletConnect）</p>
        <div class="divider-text" style="margin:24px 0">或使用</div>
        <button class="btn btn-ghost btn-block" type="button">手机号 / 邮箱登录</button>
        <p class="terms" style="margin-top:24px">继续即表示同意 <a href="#" onclick="return false">《用户协议》</a> 与 <a href="#" onclick="return false">《隐私政策》</a></p>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active"><i class="fa-regular fa-user"></i><span>我的</span><span class="fl-tab-sub">未登录</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
