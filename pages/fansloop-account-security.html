<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 账户与安全</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
</head>
<body>
<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right"><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">账户与安全</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app">
    <div class="fl-bg" style="background: var(--bg-primary)"></div>
    <div class="fl-scroll" style="position: relative; z-index: 1; padding-top: 4px">
        <div class="fl-card" style="display:flex; align-items:center; gap:12px; margin-top:4px; background: linear-gradient(135deg, rgba(168,85,247,0.12) 0%, rgba(10,10,18,0.3) 100%)">
            <img class="avatar avatar-md" src="https://images.unsplash.com/photo-1494790108755-2616b612b786?w=200&h=200&fit=crop" alt="">
            <div style="flex:1; min-width:0">
                <div style="font-weight:600">Ava · 创作者</div>
                <div style="font-size:12px; color:var(--text-tertiary)">ID FL-204-115 · 已实名（可选）</div>
            </div>
        </div>
        <div class="fl-section-h" style="margin-top:8px">安全与绑定</div>
        <div class="fl-card" style="padding:0 16px">
            <div class="fl-list-row" style="cursor:pointer">
                <span>手机号</span>
                <span class="r">138****6688 <i class="fa-solid fa-chevron-right fl-chevron"></i></span>
            </div>
            <div class="fl-list-row" style="cursor:pointer">
                <span>登录邮箱</span>
                <span class="r">a***@gmail.com <i class="fa-solid fa-chevron-right fl-chevron"></i></span>
            </div>
            <div class="fl-list-row" style="border-bottom:none; cursor:pointer">
                <span><i class="fa-solid fa-link" style="color:var(--brand-purple); margin-right:6px"></i>钱包管理</span>
                <span class="r" style="color:var(--brand-purple); font-weight:500">2 个钱包 <i class="fa-solid fa-chevron-right fl-chevron" style="color:var(--brand-purple)"></i></span>
            </div>
        </div>
        <div class="fl-section-h">安全策略</div>
        <div class="fl-card" style="font-size:13px; color:var(--text-secondary); line-height:1.6">
            <i class="fa-solid fa-robot" style="color:var(--crypto-cyan)"></i> 设备指纹与异常登录检测；验证码错误将累计限制。<br><br>
            <i class="fa-solid fa-ban" style="color:var(--danger)"></i> 解绑钱包后 24h 内生效，短期内不可改绑到他人账号，防薅防滥用。
        </div>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active"><i class="fa-regular fa-user"></i><span>我的</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
