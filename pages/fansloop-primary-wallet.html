<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 设为主钱包</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
</head>
<body>
<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right"><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-xmark"></i></div></div>
    <div class="nav-title">主钱包</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app" style="display: flex; flex-direction: column; overflow: hidden;">
    <div class="fl-bg" style="background: var(--bg-primary)"></div>
    <div class="fl-scroll" style="position: relative; z-index: 1; flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; padding-top: 4px">
        <p style="font-size: 14px; color: var(--text-secondary); margin: 0 0 20px; line-height: 1.5; flex-shrink: 0">
            全平台只能有 <strong>一</strong> 个主钱包。用于 <strong>默认收款</strong> 与 <strong>默认提现</strong>，不影响资产归属 <strong>user_id</strong> 的平台记账。
        </p>
        <div class="fl-card" style="position:relative; flex:0; flex-shrink:0">
            <div class="fl-wallet-item" style="background: var(--bg-secondary); margin: 0; border: 1px solid rgba(16,185,129,0.35)">
                <div class="w-icon"><i class="fa-brands fa-ethereum"></i></div>
                <div class="w-info">
                    <div class="w-addr">0x1f90****a02e</div>
                    <div class="w-sub">将设为主 · WalletConnect</div>
                </div>
            </div>
        </div>
        <p style="font-size: 12px; color: var(--text-tertiary); text-align: center; margin: 20px 0 8px; flex-shrink:0">与当前主钱包比较</p>
        <div class="fl-card" style="padding: 12px 16px; opacity: 0.6; flex-shrink:0">
            <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-tertiary)">
                <span>现主钱包</span>
                <span class="w-addr" style="font-size: 12px">0x7a2f****c3c91</span>
            </div>
        </div>
        <div style="margin-top: auto; width: 100%; flex-shrink:0">
        <div class="fl-alert err" style="font-size: 12px; margin-top: 20px">
            主钱包 <strong>切换</strong> 需用户确认，并可在风控场景要求二次验证。
        </div>
        <div style="display: flex; gap: 8px; margin: 16px 0 0">
            <button class="btn btn-secondary btn-block" type="button" style="flex:1">取消</button>
            <button class="btn btn-primary btn-block" type="button" style="flex:1">确认切换主钱包</button>
        </div>
        </div>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active"><i class="fa-regular fa-user"></i><span>我的</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
