<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>设置</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<style>
.nav-bar { background: var(--bg-primary); }
.app-content {
    padding-top: calc(var(--status-bar-height) + var(--nav-bar-height));
    padding-bottom: 40px;
    background: var(--bg-primary);
}

.logout-btn {
    margin: 24px 16px 8px;
    padding: 16px;
    border-radius: var(--radius-lg);
    background: var(--bg-card);
    text-align: center;
    color: var(--danger);
    font-weight: 600;
}

.version {
    text-align: center;
    color: var(--text-tertiary);
    font-size: 11px;
    padding: 20px 0;
}
</style>
</head>
<body>

<div class="status-bar">
    <span class="time">9:41</span>
    <span class="right">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
    </span>
</div>

<div class="nav-bar solid">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">设置</div>
    <div class="nav-right"></div>
</div>

<div class="app-content">

    <div class="list-group-title">账户与钱包</div>
    <div class="list-group">
        <div class="list-item">
            <div class="icon-box" style="background:rgba(6,182,212,0.15); color:var(--crypto-cyan)"><i class="fa-solid fa-wallet"></i></div>
            <div class="main">
                <div class="title">账户</div>
                <div class="subtitle">USDT · 法币余额管理</div>
            </div>
            <div class="value"><span class="gradient-text" style="font-weight:600">128.56 U</span></div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <div class="list-item">
            <div class="icon-box" style="background:rgba(245,158,11,0.15); color:var(--crypto-gold)"><i class="fa-solid fa-coins"></i></div>
            <div class="main">
                <div class="title">支付方式</div>
                <div class="subtitle">管理扣款方式</div>
            </div>
            <div class="value">4 种</div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <div class="list-item">
            <div class="icon-box" style="background:rgba(16,185,129,0.15); color:var(--crypto-green)"><i class="fa-solid fa-circle-dollar-to-slot"></i></div>
            <div class="main">
                <div class="title">收款方式</div>
                <div class="subtitle">创作收益结算账户</div>
            </div>
            <div class="value" style="color:var(--warning)">未绑定</div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <div class="list-item">
            <div class="icon-box"><i class="fa-solid fa-link"></i></div>
            <div class="main">
                <div class="title">链上钱包</div>
                <div class="subtitle">0x8A...f2E6</div>
            </div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
    </div>

    <div class="list-group-title">通用</div>
    <div class="list-group">
        <div class="list-item">
            <div class="icon-box"><i class="fa-regular fa-bell"></i></div>
            <div class="main"><div class="title">通知设置</div></div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <div class="list-item">
            <div class="icon-box" style="background:rgba(59,130,246,0.15); color:var(--info)"><i class="fa-regular fa-message"></i></div>
            <div class="main"><div class="title">聊天设置</div></div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <div class="list-item">
            <div class="icon-box" style="background:rgba(239,68,68,0.15); color:var(--danger)"><i class="fa-solid fa-user-secret"></i></div>
            <div class="main">
                <div class="title">隐私</div>
                <div class="subtitle">屏蔽 · 黑名单 · 防截屏</div>
            </div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <div class="list-item">
            <div class="icon-box" style="background:rgba(16,185,129,0.15); color:var(--crypto-green)"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="main">
                <div class="title">安全</div>
                <div class="subtitle">密码 · 二次验证 · 设备管理</div>
            </div>
            <div class="value"><span class="badge badge-brand" style="padding:1px 6px; font-size:9px">2FA</span></div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <div class="list-item">
            <div class="icon-box"><i class="fa-solid fa-gear"></i></div>
            <div class="main"><div class="title">通用</div></div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <div class="list-item">
            <div class="icon-box" style="background:rgba(236,72,153,0.15); color:var(--brand-pink)"><i class="fa-solid fa-language"></i></div>
            <div class="main"><div class="title">语言</div></div>
            <div class="value">简体中文</div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <div class="list-item">
            <div class="icon-box"><i class="fa-solid fa-palette"></i></div>
            <div class="main"><div class="title">外观</div></div>
            <div class="value">深色</div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
    </div>

    <div class="list-group-title">关于</div>
    <div class="list-group">
        <div class="list-item">
            <div class="icon-box"><i class="fa-solid fa-circle-info"></i></div>
            <div class="main"><div class="title">关于 VaultX</div></div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <div class="list-item">
            <div class="icon-box"><i class="fa-solid fa-file-contract"></i></div>
            <div class="main"><div class="title">用户协议 & 隐私政策</div></div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <div class="list-item">
            <div class="icon-box"><i class="fa-solid fa-headset"></i></div>
            <div class="main"><div class="title">帮助与反馈</div></div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <div class="list-item">
            <div class="icon-box"><i class="fa-solid fa-database"></i></div>
            <div class="main"><div class="title">清除缓存</div></div>
            <div class="value">248.3 MB</div>
        </div>
    </div>

    <div class="logout-btn">退出登录</div>

    <div class="version">VaultX v1.0.2 (build 1024)</div>

</div>

<div class="home-indicator"></div>
</body>
</html>
