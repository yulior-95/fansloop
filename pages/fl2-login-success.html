<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 登录成功</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<style>
    body {
        background:
            radial-gradient(ellipse at 50% 30%, rgba(16,185,129,0.2), transparent 55%),
            radial-gradient(ellipse at 50% 100%, rgba(168,85,247,0.15), transparent 60%),
            #0A0A12;
    }

    .fl2-wrap {
        position: absolute;
        top: var(--status-bar-height);
        bottom: 0; left: 0; right: 0;
        display: flex; flex-direction: column;
        padding: 30px 24px 30px;
    }

    /* 顶部成功动效 */
    .fl2-success-anim {
        position: relative;
        width: 140px; height: 140px;
        margin: 24px auto 20px;
    }
    .fl2-success-anim .ring {
        position: absolute; inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(16,185,129,0.3);
        animation: fl2ring 2.4s ease-out infinite;
    }
    .fl2-success-anim .ring:nth-child(2) { animation-delay: 0.8s; }
    .fl2-success-anim .ring:nth-child(3) { animation-delay: 1.6s; }
    @keyframes fl2ring {
        0% { transform: scale(0.8); opacity: 1; }
        100% { transform: scale(1.5); opacity: 0; }
    }
    .fl2-success-anim .check-circle {
        position: absolute; inset: 24px;
        border-radius: 50%;
        background: linear-gradient(135deg, #10B981 0%, #059669 100%);
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: 40px;
        box-shadow: 0 16px 40px rgba(16,185,129,0.5),
                    inset 0 1px 0 rgba(255,255,255,0.3);
    }

    .fl2-title {
        font-size: 26px; font-weight: 800;
        text-align: center;
        letter-spacing: -0.4px;
        margin-bottom: 8px;
    }
    .fl2-sub {
        font-size: 13px; color: var(--text-secondary);
        text-align: center; line-height: 1.6;
        margin-bottom: 20px;
    }

    /* 用户卡 */
    .fl2-user-card {
        background: linear-gradient(135deg, rgba(168,85,247,0.08), rgba(236,72,153,0.04));
        border: 1px solid rgba(168,85,247,0.2);
        border-radius: 18px;
        padding: 18px;
        margin-bottom: 14px;
        position: relative;
        overflow: hidden;
    }
    .fl2-user-card::before {
        content: ''; position: absolute;
        top: -30px; right: -30px;
        width: 120px; height: 120px;
        background: radial-gradient(circle, rgba(168,85,247,0.2), transparent 70%);
    }
    .fl2-user-top {
        display: flex; align-items: center; gap: 14px;
        margin-bottom: 14px;
        position: relative;
    }
    .fl2-avatar {
        width: 56px; height: 56px; border-radius: 50%;
        position: relative;
        padding: 2px;
        background: linear-gradient(135deg, #A855F7, #EC4899);
        flex-shrink: 0;
    }
    .fl2-avatar img {
        width: 100%; height: 100%;
        border-radius: 50%;
        border: 2px solid #0A0A12;
        object-fit: cover;
    }
    .fl2-avatar .online {
        position: absolute; bottom: 2px; right: 2px;
        width: 14px; height: 14px;
        border-radius: 50%;
        background: #10B981;
        border: 2px solid #0A0A12;
    }
    .fl2-user-info .name {
        font-size: 18px; font-weight: 700;
        display: flex; align-items: center; gap: 6px;
    }
    .fl2-user-info .name .verify {
        width: 16px; height: 16px;
        background: #3B82F6;
        border-radius: 50%;
        display: inline-flex; align-items: center; justify-content: center;
        color: #fff; font-size: 9px;
    }
    .fl2-user-info .handle {
        font-size: 12px; color: var(--text-tertiary);
        margin-top: 2px;
    }

    .fl2-user-meta {
        display: grid; grid-template-columns: 1fr 1fr;
        gap: 10px;
        position: relative;
    }
    .fl2-user-meta .m {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 10px;
        padding: 10px 12px;
    }
    .fl2-user-meta .m .k {
        font-size: 10px; color: var(--text-tertiary);
        text-transform: uppercase; letter-spacing: 0.5px;
        display: flex; align-items: center; gap: 4px;
        margin-bottom: 4px;
    }
    .fl2-user-meta .m .k i { color: var(--brand-purple); font-size: 10px; }
    .fl2-user-meta .m .v {
        font-size: 13px; font-weight: 600;
        font-family: ui-monospace, monospace;
    }

    /* Session info */
    .fl2-session {
        background: rgba(16,185,129,0.08);
        border: 1px solid rgba(16,185,129,0.2);
        border-radius: 14px;
        padding: 12px 14px;
        margin-bottom: 16px;
    }
    .fl2-session .sh {
        display: flex; align-items: center; gap: 6px;
        font-size: 11px; color: #6EE7B7;
        text-transform: uppercase; letter-spacing: 0.5px;
        font-weight: 700;
        margin-bottom: 10px;
    }
    .fl2-session .sh i { font-size: 10px; }
    .fl2-session-row {
        display: flex; justify-content: space-between;
        font-size: 12px; padding: 4px 0;
    }
    .fl2-session-row .k { color: var(--text-tertiary); }
    .fl2-session-row .v { color: #fff; font-family: ui-monospace, monospace; }

    /* 底部 CTA */
    .fl2-btn-enter {
        width: 100%; height: 54px;
        border-radius: 16px; border: none;
        background: linear-gradient(135deg, #A855F7, #EC4899);
        color: #fff; font-size: 16px; font-weight: 700;
        display: flex; align-items: center; justify-content: center;
        gap: 8px;
        box-shadow: 0 12px 28px rgba(168,85,247,0.42);
        cursor: pointer;
        margin-top: auto;
    }
    .fl2-count {
        text-align: center;
        font-size: 11px; color: var(--text-tertiary);
        margin-top: 12px;
    }
    .fl2-count b { color: #fff; }
</style>
</head>
<body>

<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
    </span>
</div>

<div class="fl2-wrap">

    <div class="fl2-success-anim">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="check-circle">
            <i class="fa-solid fa-check"></i>
        </div>
    </div>

    <div class="fl2-title">欢迎回来！</div>
    <div class="fl2-sub">该钱包已绑定账号，正在为你进入首页…</div>

    <!-- 用户卡 -->
    <div class="fl2-user-card">
        <div class="fl2-user-top">
            <div class="fl2-avatar">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&q=80" alt="avatar">
                <div class="online"></div>
            </div>
            <div class="fl2-user-info">
                <div class="name">
                    Luna Cipher
                    <span class="verify"><i class="fa-solid fa-check"></i></span>
                </div>
                <div class="handle">@luna_cipher · FansLoop 创作者</div>
            </div>
        </div>

        <div class="fl2-user-meta">
            <div class="m">
                <div class="k"><i class="fa-solid fa-hashtag"></i> USER ID</div>
                <div class="v">fl_8a2f9e1c</div>
            </div>
            <div class="m">
                <div class="k"><i class="fa-solid fa-wallet"></i> 主钱包</div>
                <div class="v">0x7c5A…8D93</div>
            </div>
        </div>
    </div>

    <!-- Session -->
    <div class="fl2-session">
        <div class="sh"><i class="fa-solid fa-shield-halved"></i> 本次登录</div>
        <div class="fl2-session-row">
            <span class="k">登录方式</span>
            <span class="v">MetaMask · EIP-4361</span>
        </div>
        <div class="fl2-session-row">
            <span class="k">Session 有效期</span>
            <span class="v">7 天</span>
        </div>
        <div class="fl2-session-row">
            <span class="k">设备指纹</span>
            <span class="v">Chrome · macOS</span>
        </div>
        <div class="fl2-session-row">
            <span class="k">登录时间</span>
            <span class="v">2026-04-23 09:41</span>
        </div>
    </div>

    <button class="fl2-btn-enter">
        <i class="fa-solid fa-house"></i>
        立即进入首页
        <i class="fa-solid fa-arrow-right" style="font-size:13px; margin-left:2px"></i>
    </button>

    <div class="fl2-count"><b>2</b> 秒后自动跳转</div>
</div>

<div class="home-indicator"></div>
</body>
</html>
