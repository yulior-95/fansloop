<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · MetaMask 连接中</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<link rel="stylesheet" href="../css/flw-wallet-flow.css">
</head>
<body>
<div class="status-bar dark-mode"><span class="time">9:41</span><span class="right"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></span></div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">MetaMask</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app">
    <div class="fl-bg" style="background:var(--bg-primary)"></div>
    <div class="fl-scroll" style="position:relative; z-index:1; padding-top:4px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height: 52%; text-align:center">
        <div class="flw-step" style="justify-content:center; width:100%"><i class="fa-brands fa-metamask" style="font-size:20px; color:#E17726"></i> 正在请求浏览器扩展</div>
        <div class="fl-brand-icon" style="width:80px; height:80px; font-size:36px; margin: 24px 0 16px; animation: none"><i class="fa-brands fa-metamask" style="color:#E17726"></i></div>
        <p style="font-size:16px; font-weight:600; margin-bottom:6px">等待确认连接</p>
        <p style="font-size:13px; color:var(--text-tertiary); line-height:1.5; max-width: 280px">请在 MetaMask 弹窗中点击 <strong>连接</strong> 以继续获取钱包地址</p>
        <div class="flw-pulse" style="margin: 24px auto 0"></div>
        <p class="fl-toast" style="margin-top:20px">本步骤不发起任何链上转账，仅建立读地址权限</p>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active"><i class="fa-regular fa-user"></i><span>我的</span><span class="fl-tab-sub">未登录</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
