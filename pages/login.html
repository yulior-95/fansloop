<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<style>
.login-bg {
    position: absolute;
    top: 0; left: 0; right: 0; height: 55%;
    background:
        radial-gradient(circle at 20% 20%, rgba(168,85,247,0.4), transparent 50%),
        radial-gradient(circle at 80% 30%, rgba(236,72,153,0.35), transparent 55%),
        radial-gradient(circle at 50% 70%, rgba(6,182,212,0.25), transparent 50%),
        var(--bg-primary);
    z-index: 0;
}
.login-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 50%, var(--bg-primary) 100%);
}
.login-wrap {
    position: relative; z-index: 2;
    padding: 80px 24px 0;
    min-height: 100%;
}
.brand-logo {
    width: 72px; height: 72px;
    border-radius: 20px;
    background: var(--brand-gradient);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: #fff;
    box-shadow: 0 10px 40px rgba(168,85,247,0.45);
    margin-bottom: 24px;
}
.brand-title {
    font-size: 32px; font-weight: 800; letter-spacing: -0.5px;
    margin-bottom: 8px;
}
.brand-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 40px; }

.tab-switch {
    display: flex; gap: 24px;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 24px;
}
.tab-switch-item {
    padding: 10px 0;
    font-size: 15px;
    color: var(--text-tertiary);
    position: relative;
    cursor: pointer;
}
.tab-switch-item.active {
    color: var(--text-primary);
    font-weight: 600;
}
.tab-switch-item.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--brand-gradient);
    border-radius: 2px;
}

.auth-mode {
    display: flex; gap: 6px;
    background: var(--bg-card);
    padding: 4px;
    border-radius: var(--radius-full);
    margin-bottom: 20px;
}
.auth-mode-item {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    font-size: 13px;
    color: var(--text-secondary);
    border-radius: var(--radius-full);
    cursor: pointer;
}
.auth-mode-item.active {
    background: var(--brand-gradient);
    color: #fff;
    font-weight: 600;
}

.terms {
    font-size: 11px;
    color: var(--text-tertiary);
    text-align: center;
    margin-top: 20px;
    line-height: 1.6;
}
.terms a { color: var(--brand-purple); text-decoration: none; }

.divider-text {
    display: flex; align-items: center; gap: 12px;
    margin: 28px 0 20px;
    color: var(--text-tertiary);
    font-size: 12px;
}
.divider-text::before, .divider-text::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border-color);
}

.third-party {
    display: flex; justify-content: center; gap: 20px;
}
.third-party .tp-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--bg-card);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    color: var(--text-primary);
    cursor: pointer;
}
.third-party .tp-btn.wallet {
    background: var(--brand-gradient-soft);
    color: var(--brand-purple);
}

.bottom-link {
    position: absolute;
    bottom: 40px; left: 0; right: 0;
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
}
.bottom-link a {
    color: var(--brand-purple);
    font-weight: 600;
    text-decoration: none;
    margin-left: 4px;
}
</style>
</head>
<body>

<div class="login-bg"></div>

<!-- 状态栏 -->
<div class="status-bar">
    <span class="time">9:41</span>
    <span class="right">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
    </span>
</div>

<div class="app-content">
<div class="login-wrap">

    <div class="brand-logo">
        <i class="fa-solid fa-bolt"></i>
    </div>
    <h1 class="brand-title">欢迎来到 <span class="gradient-text">VaultX</span></h1>
    <p class="brand-subtitle">去中心化的私密内容社交平台</p>

    <!-- 验证码/密码 切换 -->
    <div class="auth-mode">
        <div class="auth-mode-item active">验证码登录</div>
        <div class="auth-mode-item">密码登录</div>
    </div>

    <!-- 手机号/邮箱切换 -->
    <div class="tab-switch">
        <div class="tab-switch-item active"><i class="fa-solid fa-mobile-screen" style="margin-right:6px"></i>手机号</div>
        <div class="tab-switch-item"><i class="fa-solid fa-envelope" style="margin-right:6px"></i>邮箱</div>
    </div>

    <div class="form-group">
        <div class="form-input-group">
            <span class="prefix">+86 <i class="fa-solid fa-chevron-down" style="font-size:10px"></i></span>
            <input class="form-input" placeholder="请输入手机号">
        </div>
    </div>

    <div class="form-group">
        <div class="form-input-group">
            <input class="form-input" placeholder="请输入验证码">
            <span class="suffix"><span class="get-code">获取验证码</span></span>
        </div>
    </div>

    <button class="btn btn-primary btn-block mt-4">登录</button>

    <p class="terms">
        登录即表示同意 <a>《用户协议》</a> 和 <a>《隐私政策》</a><br>
        您的内容数据将通过链上加密存储
    </p>

    <div class="divider-text">其他登录方式</div>

    <div class="third-party">
        <div class="tp-btn wallet" title="钱包登录"><i class="fa-solid fa-wallet"></i></div>
        <div class="tp-btn" title="Apple"><i class="fa-brands fa-apple"></i></div>
        <div class="tp-btn" title="Google"><i class="fa-brands fa-google"></i></div>
        <div class="tp-btn" title="Telegram"><i class="fa-brands fa-telegram"></i></div>
    </div>

</div>
</div>

<div class="bottom-link">
    还没有账号？<a>立即注册</a>
</div>

<div class="home-indicator"></div>
</body>
</html>
