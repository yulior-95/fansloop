<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 登录成功（老用户）</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<link rel="stylesheet" href="../css/flw-wallet-flow.css">
</head>
<body>
<div class="status-bar dark-mode"><span class="time">9:41</span><span class="right"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></span></div>
<div class="app-content content-with-tab fansloop-app">
    <div class="fl-bg" style="background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(16,185,129,0.15), transparent)"></div>
    <div class="fl-scroll fl-welcome-only" style="text-align:center; display:flex; flex-direction:column; align-items:center; padding-top:calc(var(--status-bar-height) + 20px)">
        <i class="fa-solid fa-circle-check" style="font-size:64px; color:var(--success); margin-bottom:20px; filter:drop-shadow(0 0 20px rgba(16,185,129,0.4))"></i>
        <h1 style="font-size:22px; font-weight:800; margin-bottom:8px">欢迎回来</h1>
        <p style="font-size:14px; color:var(--text-secondary); line-height:1.5; max-width: 300px">该钱包 <strong>已绑定</strong> 账号，签名校验通过，<strong>直接登录</strong> 成功</p>
        <div class="flw-banner-ok" style="width:100%; max-width:320px; margin-top:24px; text-align:left">
            <i class="fa-solid fa-fingerprint" style="font-size:20px; color:var(--success)"></i>
            <div>
                <div style="font-size:12px; color:var(--text-tertiary)">user_id</div>
                <div class="flw-id-mono">FL-201-8804</div>
            </div>
        </div>
        <p style="font-size:12px; color:var(--text-tertiary); margin:16px 0 8px; width:100%; max-width:320px; text-align:left">登录方式</p>
        <div class="fl-card" style="width:100%; max-width:320px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between">
            <span style="font-size:14px">MetaMask</span>
            <span class="badge" style="background:var(--bg-elevated)">本次</span>
        </div>
        <button class="btn btn-primary btn-block mt-6" type="button" style="max-width:320px; margin-top: 24px">进入首页</button>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item active"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item"><i class="fa-regular fa-user"></i><span>我的</span><span class="fl-tab-sub">已登录</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
