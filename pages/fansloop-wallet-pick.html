<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 选择钱包</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<style>
.fl-wc-hero { height: 160px; }
</style>
</head>
<body>
<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right"><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">选择连接方式</div>
    <div class="nav-right"></div>
</div>

<div class="app-content content-with-nav content-with-tab fansloop-app" style="background: var(--bg-primary)">
    <img class="fl-hero-ambient fl-wc-hero" src="https://images.unsplash.com/photo-1639322537228-f710d59d3e77?w=1000&q=80" alt="">
    <div class="fl-scroll" style="min-height: 44%; display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 1; padding-top: 64px; box-sizing: border-box">
        <p style="text-align:center; color:var(--text-tertiary); font-size:14px; margin-bottom:8px">连接钱包以签名登录，禁止手动填地址</p>
        <div class="fl-btn-row" style="margin-top:4px">
            <i class="fa-brands fa-metamask logo-mm" style="font-size:28px"></i>
            <div style="flex:1">
                <div style="font-weight:600; font-size:16px">MetaMask</div>
                <div style="font-size:12px; color:var(--text-tertiary)">浏览器扩展 · 最常用</div>
            </div>
            <i class="fa-solid fa-chevron-right fl-chevron"></i>
        </div>
        <div class="fl-btn-row">
            <i class="fa-brands fa-ethereum" style="font-size:24px; color: var(--text-secondary)"></i>
            <div style="flex:1">
                <div style="font-weight:600; font-size:16px">WalletConnect <span class="badge-brand" style="font-size:9px; margin-left:4px">v2</span></div>
                <div style="font-size:12px; color:var(--text-tertiary)">扫码连接其他手机钱包</div>
            </div>
            <i class="fa-solid fa-chevron-right fl-chevron"></i>
        </div>
        <p style="text-align:center; font-size:11px; color:var(--text-muted); margin-top:20px">一个钱包仅可绑定一个 FansLoop 账号，防止重复领奖励</p>
    </div>

    <div class="fl-overlay fl-overlay--reserve-tab">
        <div class="fl-sheet" style="padding-bottom: 28px; max-height: 80%">
            <div class="grab"></div>
            <h3>使用 WalletConnect</h3>
            <p style="text-align:center; font-size:12px; color:var(--text-tertiary); margin-bottom: 16px">在钱包 App 中扫码授权</p>
            <div style="width:160px; height:160px; margin:0 auto 12px; background: #fff; border-radius: 12px; display:flex; align-items:center; justify-content:center;">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=FansLoop_WC_v2_link_mock" width="140" height="140" alt="WalletConnect QR">
            </div>
            <p class="fl-toast">将展示动态 nonce 签名请求 · 与上方页面流程联动</p>
        </div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active">
        <i class="fa-solid fa-wallet"></i>
        <span>连接</span>
    </div>
</div>
<div class="home-indicator"></div>
</body>
</html>
