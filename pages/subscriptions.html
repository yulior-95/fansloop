<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>我的订阅</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<style>
.nav-bar { background: var(--bg-primary); }
.app-content { padding-top: calc(var(--status-bar-height) + var(--nav-bar-height)); padding-bottom: calc(var(--tab-bar-height) + 20px); }

/* Top tabs */
.sub-tabs {
    display: flex; gap: 20px;
    padding: 0 16px;
    border-bottom: 0.5px solid var(--border-color);
    background: var(--bg-primary);
    position: sticky;
    top: 0;
    z-index: 20;
}
.sub-tabs .tab {
    padding: 10px 0;
    font-size: 14px;
    color: var(--text-tertiary);
    position: relative;
}
.sub-tabs .tab.active { color: var(--text-primary); font-weight: 600; }
.sub-tabs .tab.active::after {
    content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
    background: var(--brand-gradient); border-radius: 2px;
}
.sub-tabs .tab .dot {
    position: absolute; top: 8px; right: -8px;
    width: 6px; height: 6px;
    background: #EF4444;
    border-radius: 50%;
}

/* 订阅创作者横滑列表 */
.creator-strip {
    padding: 16px 0 12px 16px;
    display: flex; gap: 14px;
    overflow-x: auto;
    scrollbar-width: none;
}
.creator-strip::-webkit-scrollbar { display: none; }
.creator-strip .ci {
    flex-shrink: 0;
    width: 62px;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 6px;
}
.creator-strip .ci.active .avatar-ring {
    background: var(--brand-gradient);
}
.creator-strip .ci .avatar-ring {
    padding: 2px;
    background: var(--border-strong);
    border-radius: 50%;
}
.creator-strip .ci img {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2px solid var(--bg-primary);
    display: block;
}
.creator-strip .ci .name {
    font-size: 11px;
    color: var(--text-secondary);
    max-width: 62px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.creator-strip .ci.add .avatar-ring {
    background: var(--border-strong);
}
.creator-strip .ci.add .placeholder {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--bg-card);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    font-size: 20px;
    border: 2px solid var(--bg-primary);
}

/* Feed 卡片 */
.feed-list { padding: 0 16px; display: flex; flex-direction: column; gap: 18px; }
.feed-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    overflow: hidden;
}
.feed-card .head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px;
}
.feed-card .head .info { flex: 1; min-width: 0; }
.feed-card .head .name-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 600;
}
.feed-card .head .time {
    font-size: 11px; color: var(--text-tertiary);
    margin-top: 2px;
}
.feed-card .head .more { color: var(--text-tertiary); }

.feed-card .title {
    padding: 0 12px 10px;
    font-size: 14px; line-height: 1.5;
}

.feed-card .media {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 5;
    overflow: hidden;
}
.feed-card .media img {
    width: 100%; height: 100%; object-fit: cover;
}
.feed-card .media .tag-bl {
    position: absolute; bottom: 10px; left: 10px;
    background: rgba(0,0,0,0.5);
    padding: 3px 8px;
    border-radius: var(--radius-full);
    font-size: 10px; color: #fff;
    display: flex; align-items: center; gap: 4px;
    backdrop-filter: blur(10px);
}

.feed-card .media .paywall-mini {
    position: absolute; top: 10px; right: 10px;
    background: var(--brand-gradient);
    padding: 3px 8px;
    border-radius: var(--radius-full);
    font-size: 10px; color: #fff;
    font-weight: 600;
}

.feed-card .actions {
    display: flex; align-items: center;
    padding: 10px 12px;
    gap: 20px;
}
.feed-card .actions .act {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; color: var(--text-secondary);
}
.feed-card .actions .act.liked { color: #ff3b5c; }
.feed-card .actions .sp { flex: 1; }

/* 图文卡 */
.post-text {
    padding: 14px;
}
.post-text .content { font-size: 14px; line-height: 1.6; margin-bottom: 10px; }
.post-text .img-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4px;
}
.post-text .img-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 6px;
}
</style>
</head>
<body>

<div class="status-bar">

        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>

</div>

<div class="nav-bar solid">

        </div>
        <div class="ci active">
            <div class="avatar-ring"><img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=120&q=80"></div>

        </div>
        <div class="ci">

        <div class="ci active">

    <!-- Feed -->

        <!-- 图文卡 -->

        <div class="feed-card">

            <div class="media">

            <div class="actions">

        </div>
    </div>

</div>

<!-- TabBar -->
<div class="tab-bar">
    <div class="tab-item">
        <i class="fa-regular fa-house"></i>
        <span>首页</span>
    </div>
    <div class="tab-item active">
        <i class="fa-solid fa-heart"></i>
        <span>订阅</span>
    </div>
    <div class="tab-create">
        <div class="create-btn"><i class="fa-solid fa-plus"></i></div>
    </div>

    </div>
    <div class="tab-item">
        <i class="fa-regular fa-user"></i>
        <span>我的</span>
    </div>
</div>

<div class="home-indicator"></div>
</body>
</html>
