<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>绑定银行卡</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<style>
.nav-bar { background: var(--bg-primary); }
.app-content {
    padding-top: calc(var(--status-bar-height) + var(--nav-bar-height));
    padding-bottom: 100px;
}

/* 步骤条 */
.steps-bar {
    margin: 8px 16px 18px;
    display: flex; gap: 4px;
}
.step-pill {
    flex: 1;
    height: 4px;
    border-radius: 3px;
    background: rgba(255,255,255,0.08);
}
.step-pill.done { background: linear-gradient(90deg, #10B981, #34D399); }
.step-pill.active { background: linear-gradient(90deg, #A855F7 60%, rgba(168,85,247,0.25) 60%); }

/* 头部品牌提示 */
.bind-hero {
    margin: 0 16px 20px;
    padding: 20px 18px;
    background: linear-gradient(135deg, rgba(22,119,255,0.1), rgba(168,85,247,0.06));
    border: 1px solid rgba(22,119,255,0.22);
    border-radius: 18px;
    display: flex; gap: 14px; align-items: center;
    position: relative;
    overflow: hidden;
}
.bind-hero::before {
    content: ''; position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(22,119,255,0.22), transparent 70%);
}
.bind-hero .ic {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, #3B82F6, #60A5FA);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 8px 20px rgba(59,130,246,0.35);
    position: relative;
}
.bind-hero .info h2 {
    font-size: 17px; font-weight: 700;
    letter-spacing: -0.3px;
}
.bind-hero .info p {
    font-size: 12px; color: var(--text-secondary);
    margin-top: 3px; line-height: 1.5;
}

/* 分组标题 */
.sec-h {
    padding: 4px 20px 8px;
    font-size: 11px;
    color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px;
    font-weight: 600;
    display: flex; align-items: center; gap: 6px;
}
.sec-h i { color: var(--brand-purple); }

/* 表单 */
.form-card {
    margin: 0 16px 14px;
    background: var(--bg-card);
    border-radius: 16px;
    overflow: hidden;
}
.field {
    display: flex;
    padding: 14px 16px;
    gap: 12px;
    align-items: center;
}
.field + .field {
    border-top: 0.5px solid rgba(255,255,255,0.06);
}
.field.focus {
    background: linear-gradient(90deg, rgba(168,85,247,0.06), transparent);
}
.field .f-ic {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
}
.field .f-ic.a { background: rgba(168,85,247,0.15); color: #C084FC; }
.field .f-ic.b { background: rgba(59,130,246,0.15); color: #60A5FA; }
.field .f-ic.c { background: rgba(16,185,129,0.15); color: #10B981; }
.field .f-ic.d { background: rgba(245,158,11,0.15); color: #FBBF24; }
/* 银行 LOGO 图标（替代通用 ic） */
.field .f-ic.bank-cmb {
    background: linear-gradient(135deg, #DC2626, #991B1B);
    color: #fff;
    font-weight: 900;
    font-size: 15px;
    box-shadow: 0 4px 10px rgba(220,38,38,0.3);
}
.field .f-ic.bank-icbc {
    background: linear-gradient(135deg, #DC2626, #7F1D1D);
    color: #fff;
    font-weight: 900;
    font-size: 15px;
}
.field .f-ic.bank-abc {
    background: linear-gradient(135deg, #16A34A, #166534);
    color: #fff;
    font-weight: 900;
    font-size: 15px;
}
.field .f-main {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; gap: 3px;
}
.field .f-label {
    font-size: 10px; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 4px;
}
.field .f-label .req { color: #EF4444; }
.field .f-value {
    display: flex; align-items: center; gap: 6px;
}
.field .f-input {
    flex: 1; min-width: 0;
    background: transparent; border: none; outline: none;
    color: #fff; font-size: 15px;
    font-family: inherit;
    padding: 0;
}
.field .f-input::placeholder { color: var(--text-muted); }
.field .f-input.readonly {
    color: var(--text-secondary);
    font-weight: 500;
}
.field .f-verified {
    font-size: 10px; padding: 2px 6px;
    border-radius: 4px;
    background: rgba(16,185,129,0.15);
    color: #10B981;
    font-weight: 700;
    display: flex; align-items: center; gap: 3px;
    flex-shrink: 0;
}
.field .f-tool {
    padding: 6px 10px;
    border-radius: 8px;
    background: rgba(168,85,247,0.15);
    border: 1px solid rgba(168,85,247,0.25);
    color: var(--brand-purple);
    font-size: 11px;
    font-weight: 600;
    display: flex; align-items: center; gap: 4px;
    flex-shrink: 0;
}
.field .f-tool.disabled {
    background: rgba(255,255,255,0.04);
    color: var(--text-tertiary);
    border-color: rgba(255,255,255,0.08);
}
.field .f-bank {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 8px;
    background: rgba(220,38,38,0.15);
    border-radius: 6px;
    font-size: 10px; color: #FCA5A5;
    font-weight: 600;
}
.field .f-bank .logo {
    width: 14px; height: 14px; border-radius: 3px;
    background: #fff;
    color: #DC2626;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 900;
}
.field .f-bank.abc .logo { color: #16A34A; }
.field .f-bank.abc { background: rgba(22,163,74,0.15); color: #86EFAC; }
.field .f-bank.boc .logo { color: #DC2626; }
.field .f-bank.cmb .logo { color: #DC2626; }

/* 预览卡 */
.preview-card {
    margin: 0 16px 16px;
    padding: 14px 16px;
    background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 50%, #60A5FA 100%);
    border-radius: 16px;
    color: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(30,64,175,0.3);
}
.preview-card::before {
    content: ''; position: absolute;
    top: -30px; right: -30px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
}
.preview-card .pc-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
    position: relative;
}
.preview-card .pc-head .bank {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700;
}
.preview-card .pc-head .bank .bl {
    width: 24px; height: 24px; border-radius: 6px;
    background: #fff;
    color: #DC2626;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 900;
}
.preview-card .pc-head .brand {
    font-size: 14px; font-weight: 800;
    letter-spacing: 1px;
    font-style: italic;
    color: rgba(255,255,255,0.85);
}
.preview-card .pc-num {
    position: relative;
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 18px;
    letter-spacing: 3px;
    font-weight: 600;
    margin-bottom: 12px;
}
.preview-card .pc-meta {
    display: flex; justify-content: space-between;
    font-size: 10px;
    position: relative;
}
.preview-card .pc-meta .k { color: rgba(255,255,255,0.7); }
.preview-card .pc-meta .v { font-weight: 600; margin-top: 2px; }

/* 限额说明 */
.limit-box {
    margin: 0 16px 14px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
}
.limit-box h4 {
    font-size: 11px; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
}
.limit-box h4 i { color: #FBBF24; }
.limit-row {
    display: flex; justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
}
.limit-row .k { color: var(--text-tertiary); }
.limit-row .v { color: #fff; font-weight: 500; }

/* 协议 */
.protocol {
    margin: 0 20px 16px;
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 11px; color: var(--text-tertiary);
    line-height: 1.5;
}
.protocol .chk {
    width: 16px; height: 16px;
    border-radius: 4px;
    background: var(--brand-gradient);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 9px;
    flex-shrink: 0;
    margin-top: 1px;
}
.protocol a { color: var(--brand-purple); text-decoration: none; }

/* 安全徽章 */
.safety {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin: 0 16px 14px;
    justify-content: center;
}
.safety .sb {
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(16,185,129,0.08);
    color: #6EE7B7;
    border: 1px solid rgba(16,185,129,0.2);
    display: flex; align-items: center; gap: 4px;
}
.safety .sb i { font-size: 9px; }

.submit-bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 10px 16px 30px;
    background: rgba(10,10,18,0.95);
    backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--border-color);
    z-index: 20;
}
</style>
</head>
<body>

<div class="status-bar">
    <span class="time">9:41</span>
    <span class="right">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
    </span>
</div>

<div class="nav-bar solid">
    <div class="nav-left"><div class="nav-btn" onclick="location.href='recharge-fiat.html'"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">绑定银行卡</div>
    <div class="nav-right"><div class="nav-btn"><i class="fa-regular fa-circle-question"></i></div></div>
</div>

<div class="app-content">

    <!-- 卡片预览（实时反映输入） -->
    <div class="preview-card" style="margin-top: 8px">
        <div class="pc-head">
            <div class="bank">
                <div class="bl">招</div>
                招商银行
            </div>
            <div class="brand">UnionPay</div>
        </div>
        <div class="pc-num">6214 2688 1009 2025</div>
        <div class="pc-meta">
            <div>
                <div class="k">持卡人</div>
                <div class="v">LUNA CIPHER</div>
            </div>
            <div>
                <div class="k">卡类型</div>
                <div class="v">储蓄卡</div>
            </div>
        </div>
    </div>

    <!-- 表单 -->
    <div class="sec-h">
        <i class="fa-solid fa-pen-to-square"></i>
        填写信息
    </div>

    <div class="form-card">
        <div class="field">
            <div class="f-ic a"><i class="fa-regular fa-user"></i></div>
            <div class="f-main">
                <div class="f-label">持卡人姓名 <span class="req">*</span></div>
                <div class="f-value">
                    <input class="f-input" placeholder="请输入持卡人真实姓名">
                </div>
            </div>
        </div>

        <div class="field">
            <div class="f-ic a"><i class="fa-regular fa-id-card"></i></div>
            <div class="f-main">
                <div class="f-label">身份证号码 <span class="req">*</span></div>
                <div class="f-value">
                    <input class="f-input" placeholder="请输入 18 位身份证号">
                </div>
            </div>
        </div>

        <div class="field focus">
            <div class="f-ic bank-cmb">招</div>
            <div class="f-main">
                <div class="f-label">银行卡号 <span class="req">*</span></div>
                <div class="f-value">
                    <input class="f-input" value="6214 2688 1009 2025" placeholder="16-19 位卡号">
                </div>
            </div>
            <div class="f-tool">
                <i class="fa-solid fa-camera"></i>
                OCR
            </div>
        </div>

        <div class="field">
            <div class="f-ic c"><i class="fa-solid fa-mobile-screen"></i></div>
            <div class="f-main">
                <div class="f-label">银行预留手机号 <span class="req">*</span></div>
                <div class="f-value">
                    <span style="font-size: 13px; color: var(--text-secondary); padding-right: 6px; border-right: 1px solid rgba(255,255,255,0.08); margin-right: 4px;">+86</span>
                    <input class="f-input" value="138 0013 2025" placeholder="银行预留手机号">
                </div>
            </div>
        </div>

        <div class="field">
            <div class="f-ic d"><i class="fa-solid fa-key"></i></div>
            <div class="f-main">
                <div class="f-label">短信验证码 <span class="req">*</span></div>
                <div class="f-value">
                    <input class="f-input" placeholder="6 位验证码" maxlength="6">
                </div>
            </div>
            <div class="f-tool">
                <i class="fa-solid fa-paper-plane"></i>
                获取验证码
            </div>
        </div>
    </div>

    <!-- 限额 -->
    <div class="sec-h">
        <i class="fa-solid fa-gauge-high"></i>
        预估限额（绑定后启用）
    </div>

    <div class="limit-box">
        <div class="limit-row">
            <span class="k">单笔限额</span>
            <span class="v">¥50,000</span>
        </div>
        <div class="limit-row">
            <span class="k">单日限额</span>
            <span class="v">¥100,000</span>
        </div>
        <div class="limit-row">
            <span class="k">单月限额</span>
            <span class="v">¥500,000</span>
        </div>
        <div class="limit-row">
            <span class="k">单笔最小金额</span>
            <span class="v">¥100</span>
        </div>
    </div>

    <!-- 安全徽章 -->
    <div class="safety">
        <span class="sb"><i class="fa-solid fa-shield-halved"></i> 银联加密传输</span>
        <span class="sb"><i class="fa-solid fa-user-check"></i> 身份核验</span>
        <span class="sb"><i class="fa-solid fa-lock"></i> 信息脱敏存储</span>
        <span class="sb"><i class="fa-solid fa-triangle-exclamation"></i> 反欺诈监控</span>
    </div>

    <!-- 协议 -->
    <div class="protocol">
        <div class="chk"><i class="fa-solid fa-check"></i></div>
        <span>我已阅读并同意 <a href="#">《银行卡绑定协议》</a>、<a href="#">《快捷支付服务协议》</a>，确认该卡为本人所有</span>
    </div>

</div>

<div class="submit-bar">
    <button class="btn btn-primary btn-block">
        <i class="fa-solid fa-check"></i>
        完成绑定
    </button>
</div>

<div class="home-indicator"></div>
</body>
</html>
