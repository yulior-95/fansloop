<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 选择钱包</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<link rel="stylesheet" href="../css/flw-wallet-flow.css">
</head>
<body>
<div class="status-bar dark-mode"><span class="time">9:41</span><span class="right"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></span></div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-xmark"></i></div></div>
    <div class="nav-title">连接钱包</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app" style="background:var(--bg-primary)">
    <div class="fl-bg" style="background:var(--bg-primary)"></div>
    <div class="fl-scroll" style="position:relative; z-index:1; padding-top:8px; color:var(--text-tertiary); font-size:13px; text-align:center">
        <p>点击下方选项发起连接；连接成功后需完成签名以登录。</p>
    </div>
    <div class="fl-overlay fl-overlay--reserve-tab" style="background:rgba(0,0,0,0.45)">
        <div class="fl-sheet" style="padding-bottom:28px">
            <div class="grab"></div>
            <h3>选择钱包</h3>
            <p style="text-align:center; font-size:12px; color:var(--text-tertiary); margin-bottom:12px">连接用于登录 FansLoop，不会发起转账</p>
            <div class="fl-btn-row">
                <i class="fa-brands fa-metamask" style="font-size:28px; color:#E17726"></i>
                <div style="flex:1; text-align:left">
                    <div style="font-weight:600">MetaMask <span class="flw-badge-rec">推荐 · PC</span></div>
                    <div style="font-size:12px; color:var(--text-tertiary)">浏览器扩展，桌面端优先</div>
                </div>
                <i class="fa-solid fa-chevron-right fl-chevron"></i>
            </div>
            <div class="fl-btn-row" style="margin-bottom:0">
                <i class="fa-brands fa-ethereum" style="font-size:24px; color:#3396FF"></i>
                <div style="flex:1; text-align:left">
                    <div style="font-weight:600">WalletConnect <span class="badge-brand" style="font-size:9px">v2</span></div>
                    <div style="font-size:12px; color:var(--text-tertiary)">移动端 / 其他钱包 · 扫码或 Deep Link</div>
                </div>
                <i class="fa-solid fa-chevron-right fl-chevron"></i>
            </div>
        </div>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active"><i class="fa-regular fa-user"></i><span>我的</span><span class="fl-tab-sub">未登录</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
