<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 登录 / 注册</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<style>
    .fl2-hero {
        position: absolute; top: 0; left: 0; right: 0; height: 52%;
        overflow: hidden; z-index: 0;
    }
    .fl2-hero img {
        width: 100%; height: 100%; object-fit: cover;
        transform: scale(1.08);
        filter: brightness(0.55) saturate(1.2);
    }
    .fl2-hero::after {
        content: ''; position: absolute; inset: 0;
        background:
            radial-gradient(ellipse at top, rgba(168,85,247,0.35), transparent 60%),
            linear-gradient(to bottom, transparent 35%, #0A0A12 95%);
    }
    .fl2-hero-float {
        position: absolute; z-index: 2; color: #fff;
        top: 80px; left: 0; right: 0; text-align: center;
    }
    .fl2-logo-mark {
        width: 72px; height: 72px; margin: 0 auto 16px;
        border-radius: 22px;
        background: linear-gradient(135deg, #A855F7 0%, #EC4899 100%);
        display: flex; align-items: center; justify-content: center;
        font-size: 34px; color: #fff;
        box-shadow: 0 16px 42px rgba(168,85,247,0.55),
                    inset 0 1px 0 rgba(255,255,255,0.35);
        position: relative;
    }
    .fl2-logo-mark::after {
        content: ''; position: absolute; inset: -6px;
        border-radius: 26px;
        border: 1.5px solid rgba(168,85,247,0.35);
        filter: blur(0.5px);
    }
    .fl2-title {
        font-size: 32px; font-weight: 800; letter-spacing: -0.8px;
        margin-bottom: 8px;
    }
    .fl2-title .grad {
        background: linear-gradient(90deg, #C084FC, #F472B6, #FBBF24);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .fl2-sub {
        font-size: 14px; color: rgba(255,255,255,0.75);
        padding: 0 40px; line-height: 1.5;
    }

    /* 底部卡片 */
    .fl2-sheet-card {
        position: absolute; bottom: 0; left: 0; right: 0;
        padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0));
        z-index: 3;
    }

    /* 主 CTA - 连接钱包 */
    .fl2-primary-cta {
        height: 56px; width: 100%;
        border-radius: 16px; border: none;
        background: linear-gradient(135deg, #A855F7 0%, #EC4899 100%);
        color: #fff; font-size: 16px; font-weight: 700;
        display: flex; align-items: center; justify-content: center;
        gap: 10px;
        box-shadow: 0 12px 32px rgba(168,85,247,0.45),
                    inset 0 1px 0 rgba(255,255,255,0.2);
        position: relative; overflow: hidden;
        cursor: pointer;
    }
    .fl2-primary-cta::before {
        content: ''; position: absolute;
        top: 0; left: -80%; width: 60%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
        animation: fl2shine 3s ease-in-out infinite;
    }
    @keyframes fl2shine {
        0% { left: -80%; } 60%, 100% { left: 120%; }
    }

    /* 特性列表 */
    .fl2-feats {
        display: flex; justify-content: space-between;
        gap: 8px; margin: 18px 2px 22px;
    }
    .fl2-feat {
        flex: 1; text-align: center;
        display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .fl2-feat-ic {
        width: 34px; height: 34px;
        border-radius: 10px;
        background: rgba(168,85,247,0.12);
        border: 1px solid rgba(168,85,247,0.2);
        display: flex; align-items: center; justify-content: center;
        color: #C084FC; font-size: 14px;
    }
    .fl2-feat-txt {
        font-size: 11px; color: var(--text-tertiary); line-height: 1.3;
    }

    /* 分隔 */
    .fl2-or {
        display: flex; align-items: center; gap: 12px;
        color: var(--text-muted); font-size: 11px;
        margin: 12px 0;
    }
    .fl2-or::before, .fl2-or::after {
        content: ''; flex: 1; height: 1px;
        background: rgba(255,255,255,0.08);
    }

    /* 次要登录入口 */
    .fl2-alt-row {
        display: flex; gap: 10px; margin-top: 6px;
    }
    .fl2-alt-btn {
        flex: 1; height: 46px; border-radius: 12px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        color: #fff; font-size: 13px; font-weight: 500;
        display: flex; align-items: center; justify-content: center;
        gap: 8px;
    }
    .fl2-alt-btn i { font-size: 15px; }

    /* 条款 */
    .fl2-terms {
        font-size: 11px; color: var(--text-tertiary);
        text-align: center; line-height: 1.6;
        margin-top: 16px;
    }
    .fl2-terms a { color: #C084FC; text-decoration: none; }

    /* 浮动徽标 */
    .fl2-top-chip {
        position: absolute; top: calc(var(--status-bar-height) + 12px);
        right: 20px; z-index: 4;
        padding: 5px 10px 5px 8px;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 999px;
        font-size: 11px; color: #fff;
        display: flex; align-items: center; gap: 5px;
    }
    .fl2-top-chip i { color: #10B981; font-size: 9px; }
</style>
</head>
<body>

<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
    </span>
</div>

<div class="fl2-top-chip">
    <i class="fa-solid fa-circle"></i>
    <span>Web3 · Secure Login</span>
</div>

<div class="fl2-hero">
    <img src="https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=900&q=80" alt="">
    <div class="fl2-hero-float">
        <div class="fl2-logo-mark">
            <i class="fa-solid fa-infinity"></i>
        </div>
        <div class="fl2-title">欢迎来到 <span class="grad">FansLoop</span></div>
        <div class="fl2-sub">连接你的 Web3 钱包，开启去中心化创作者经济与粉丝互动新体验</div>
    </div>
</div>

<div class="fl2-sheet-card">

    <button class="fl2-primary-cta">
        <i class="fa-solid fa-wallet"></i>
        连接钱包登录 / 注册
        <i class="fa-solid fa-arrow-right" style="margin-left:2px; font-size:13px;"></i>
    </button>

    <div class="fl2-feats">
        <div class="fl2-feat">
            <div class="fl2-feat-ic"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="fl2-feat-txt">签名登录<br>零密码风险</div>
        </div>
        <div class="fl2-feat">
            <div class="fl2-feat-ic"><i class="fa-solid fa-link"></i></div>
            <div class="fl2-feat-txt">链上身份<br>一键切换</div>
        </div>
        <div class="fl2-feat">
            <div class="fl2-feat-ic"><i class="fa-solid fa-bolt"></i></div>
            <div class="fl2-feat-txt">Gas-Free<br>链下验证</div>
        </div>
    </div>

    <div class="fl2-or">或使用其他方式</div>

    <div class="fl2-alt-row">
        <button class="fl2-alt-btn"><i class="fa-brands fa-apple"></i>Apple</button>
        <button class="fl2-alt-btn"><i class="fa-brands fa-google" style="color:#EA4335"></i>Google</button>
        <button class="fl2-alt-btn"><i class="fa-regular fa-envelope"></i>邮箱</button>
    </div>

    <div class="fl2-terms">
        登录即表示你已阅读并同意
        <a href="#">《服务协议》</a> 与 <a href="#">《隐私政策》</a>
    </div>
</div>

<div class="home-indicator"></div>
</body>
</html>
