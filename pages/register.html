<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>注册</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<style>
.reg-bg {
    position: absolute; top: 0; left: 0; right: 0; height: 40%;
    background:
        radial-gradient(circle at 30% 20%, rgba(236,72,153,0.35), transparent 55%),
        radial-gradient(circle at 70% 30%, rgba(168,85,247,0.35), transparent 60%),
        var(--bg-primary);
    z-index: 0;
}
.reg-bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 60%, var(--bg-primary) 100%);
}
.reg-wrap { position: relative; z-index: 2; padding: 0 24px 40px; }

.header {
    padding-top: calc(var(--status-bar-height) + 8px);
    height: calc(var(--status-bar-height) + var(--nav-bar-height));
    display: flex; align-items: center;
}
.back-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
    color: #fff;
    font-size: 15px;
}
.reg-title {
    font-size: 28px; font-weight: 800; margin: 16px 0 6px;
}
.reg-subtitle { color: var(--text-secondary); font-size: 13px; margin-bottom: 32px; }

.tab-switch {
    display: flex; gap: 24px;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 24px;
}
.tab-switch-item {
    padding: 10px 0; font-size: 15px;
    color: var(--text-tertiary);
    position: relative; cursor: pointer;
}
.tab-switch-item.active {
    color: var(--text-primary); font-weight: 600;
}
.tab-switch-item.active::after {
    content: ''; position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px; background: var(--brand-gradient);
    border-radius: 2px;
}

.strength { display: flex; gap: 6px; margin-top: 8px; }
.strength span { flex: 1; height: 3px; border-radius: 2px; background: var(--bg-elevated); }
.strength span.active { background: var(--brand-gradient); }

.hint {
    font-size: 11px; color: var(--text-tertiary);
    margin-top: 6px;
}

.checkbox-line {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 12px; color: var(--text-secondary);
    margin: 20px 0 24px;
}
.checkbox-line input {
    width: 16px; height: 16px; margin-top: 2px; accent-color: var(--brand-purple);
}
.checkbox-line a { color: var(--brand-purple); }
</style>
</head>
<body>

<div class="reg-bg"></div>

<div class="status-bar">
    <span class="time">9:41</span>
    <span class="right">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
    </span>
</div>

<div class="app-content">
<div class="reg-wrap">
    <div class="header">
        <div class="back-btn"><i class="fa-solid fa-chevron-left"></i></div>
    </div>

    <h1 class="reg-title">创建账户</h1>
    <p class="reg-subtitle">3 秒完成注册，畅享链上私密世界</p>

    <div class="tab-switch">
        <div class="tab-switch-item active"><i class="fa-solid fa-mobile-screen" style="margin-right:6px"></i>手机号</div>
        <div class="tab-switch-item"><i class="fa-solid fa-envelope" style="margin-right:6px"></i>邮箱</div>
    </div>

    <div class="form-group">
        <label class="form-label">手机号</label>
        <div class="form-input-group">
            <span class="prefix">+86 <i class="fa-solid fa-chevron-down" style="font-size:10px"></i></span>
            <input class="form-input" placeholder="请输入手机号">
        </div>
    </div>

    <div class="form-group">
        <label class="form-label">验证码</label>
        <div class="form-input-group">
            <input class="form-input" placeholder="6 位验证码">
            <span class="suffix"><span class="get-code">获取验证码</span></span>
        </div>
    </div>

    <div class="form-group">
        <label class="form-label">设置密码</label>
        <div class="form-input-group">
            <input class="form-input" type="password" placeholder="8-20 位，含字母与数字">
            <span class="suffix"><i class="fa-solid fa-eye-slash"></i></span>
        </div>
        <div class="strength">
            <span class="active"></span>
            <span class="active"></span>
            <span></span>
            <span></span>
        </div>
        <p class="hint">密码强度：中</p>
    </div>

    <div class="form-group">
        <label class="form-label">邀请码（选填）</label>
        <div class="form-input-group">
            <span class="prefix"><i class="fa-solid fa-gift" style="color:var(--crypto-gold)"></i></span>
            <input class="form-input" placeholder="输入邀请码可获得 5 USDT 奖励">
        </div>
    </div>

    <div class="checkbox-line">
        <input type="checkbox" checked>
        <span>我已阅读并同意 <a>《用户协议》</a>、<a>《隐私政策》</a> 以及 <a>《链上数据存储声明》</a></span>
    </div>

    <button class="btn btn-primary btn-block">创建账户</button>

    <p class="text-center text-sm text-muted mt-4">
        已有账号？<span style="color:var(--brand-purple); font-weight:600">立即登录</span>
    </p>

</div>
</div>

<div class="home-indicator"></div>
</body>
</html>
