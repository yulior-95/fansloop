<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 登录态与结果</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<link rel="stylesheet" href="../css/flw-wallet-flow.css">
</head>
<body>
<div class="status-bar dark-mode"><span class="time">9:41</span><span class="right"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></span></div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">登录信息</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app">
    <div class="fl-bg" style="background:var(--bg-primary)"></div>
    <div class="fl-scroll" style="position:relative; z-index:1; padding-top:4px">
        <p style="font-size:12px; color:var(--text-tertiary); margin:0 0 16px; line-height:1.5">登录成功后的标准返回与持久化关系（供开发对齐接口与本地存储键名）。</p>
        <div class="fl-card" style="padding:0 0 0 0">
            <div class="fl-list-row" style="border-bottom:1px solid var(--border-color)">
                <span class="l" style="color:var(--text-primary)">user_id</span>
                <span class="flw-id-mono" style="font-size:12px">FL-201-8804</span>
            </div>
            <div class="fl-list-row" style="border-bottom:1px solid var(--border-color)">
                <span class="l" style="color:var(--text-primary)">登录方式</span>
                <span><i class="fa-brands fa-metamask" style="color:#E17726; margin-right:4px"></i> MetaMask</span>
            </div>
            <div class="fl-list-row" style="border-bottom:1px solid var(--border-color)">
                <span class="l" style="color:var(--text-primary)">或</span>
                <span><i class="fa-brands fa-ethereum" style="color:#3396FF; margin-right:4px"></i> WalletConnect v2</span>
            </div>
            <div class="fl-list-row" style="border:none; flex-direction:column; align-items:stretch; gap:8px; padding:14px 0 12px">
                <span class="l" style="color:var(--text-primary)">会话</span>
                <div style="font-size:12px; color:var(--text-tertiary); line-height:1.5">发放 <strong>access / session</strong> token（或 cookie session），在有效期内无需重复签名校验，除非被吊销或设备风控。</div>
                <div class="flw-skeleton-line" style="max-width:100%"></div>
                <div class="flw-skeleton-line" style="max-width: 70%"></div>
            </div>
        </div>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item active"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item"><i class="fa-regular fa-user"></i><span>我的</span><span class="fl-tab-sub">已登录</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
