<style>
body { background: #000; }

.feed-video {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
}
.feed-video img.cover {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
}

/* 顶部导航 */
.top-nav {
    position: absolute;
    top: var(--status-bar-height);
    left: 0; right: 0;
    display: flex; align-items: center;
    padding: 6px 16px;
    z-index: 50;
}
.top-nav .search-icon {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px;
}
.top-nav .categories {
    flex: 1;
    display: flex; justify-content: center; gap: 20px;
}
.top-nav .cat {
    color: rgba(255,255,255,0.65);
    font-size: 15px; font-weight: 500;
    position: relative;
    padding-bottom: 6px;
}
.top-nav .cat.active {
    color: #fff; font-weight: 700;
}
.top-nav .cat.active::after {
    content: ''; position: absolute;
    left: 50%; bottom: 0; transform: translateX(-50%);
    width: 20px; height: 3px; border-radius: 2px;
    background: var(--brand-gradient);
}
.top-nav .live-icon {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px;
}

/* 右侧动作栏 */
.action-bar {
    position: absolute;
    right: 12px;
    bottom: calc(var(--tab-bar-height) + 20px);
    display: flex; flex-direction: column;
    gap: 20px;
    align-items: center;
    z-index: 10;
}
.action-bar .action {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    color: #fff;
}
.action-bar .action i {
    font-size: 28px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}
.action-bar .action .count {
    font-size: 11px; font-weight: 600;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.action-bar .action.liked i { color: #ff3b5c; }
.action-bar .action.saved i { color: var(--crypto-gold); }

.action-bar .creator-avatar {
    position: relative;
    margin-bottom: 4px;
}
.action-bar .creator-avatar img {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2px solid #fff;
}
.action-bar .creator-avatar .follow-btn {
    position: absolute;
    bottom: -6px; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--brand-gradient);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 10px;
    box-shadow: 0 2px 6px rgba(168,85,247,0.5);
}

/* 音乐转盘 */
.music-disc {
    margin-top: 4px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle, #444 2px, #1a1a26 5px, #000);
    padding: 3px;
}
.music-disc img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
}

/* 底部信息 */
.feed-info {
    position: absolute;
    left: 16px; right: 88px;
    bottom: calc(var(--tab-bar-height) + 16px);
    color: #fff;
    z-index: 10;
}
.feed-info .creator {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
}
.feed-info .creator .name {
    font-size: 16px; font-weight: 700;
}
.feed-info .creator .badge {
    padding: 2px 8px;
    font-size: 10px;
}
.feed-info .title {
    font-size: 14px; line-height: 1.5;
    margin-bottom: 8px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
}
.feed-info .tags {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 10px;
}
.feed-info .tags .hash {
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    font-weight: 600;
}
.feed-info .music-info {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: rgba(255,255,255,0.85);
}

/* 付费锁定卡 */
.paywall {
    position: absolute;
    left: 24px; right: 24px;
    top: 42%;
    background: rgba(20, 20, 30, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius-xl);
    padding: 20px;
    text-align: center;
    z-index: 15;
}
.paywall .lock-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--brand-gradient);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 24px; color: #fff;
    margin-bottom: 12px;
    box-shadow: 0 6px 20px rgba(168,85,247,0.5);
}
.paywall .tip {
    font-size: 15px; font-weight: 600; color: #fff;
    margin-bottom: 4px;
}
.paywall .sub {
    font-size: 12px; color: rgba(255,255,255,0.7);
    margin-bottom: 16px;
}
.paywall .price-row {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin-bottom: 14px;
}
.paywall .price {
    font-size: 22px; font-weight: 800;
}
.paywall .price-unit {
    font-size: 12px; color: rgba(255,255,255,0.7);
}

/* Feed page indicator */
.page-dots {
    position: absolute;
    right: 6px;
    top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 6px;
    z-index: 20;
}
.page-dots span {
    width: 3px; height: 14px;
    border-radius: 2px;
    background: rgba(255,255,255,0.3);
}
.page-dots span.active {
    background: var(--brand-gradient);
    height: 20px;
}

.tab-bar { background: rgba(0,0,0,0.65); }

/* 图文类型标识 */
.media-type {
    position: absolute;
    top: 96px;
    left: 16px;
    padding: 4px 10px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border-radius: var(--radius-full);
    font-size: 11px;
    color: #fff;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    z-index: 20;
}

/* =============================================
   积分商城悬浮球（参考番茄小说，Web3 化）
   ============================================= */
.reward-ball {
    position: absolute;
    left: 14px;
    bottom: calc(var(--tab-bar-height) + 28px);
    width: 72px;
    height: 72px;
    z-index: 40;
    cursor: pointer;
    /* 入场缓动 */
    animation: rbFloatIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both,
               rbSway 4s ease-in-out infinite 0.6s;
}
@keyframes rbFloatIn {
    from { transform: translateY(20px) scale(0.5); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
}
@keyframes rbSway {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-4px) rotate(1deg); }
}

/* 外层光晕 */
.reward-ball .rb-halo {
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: radial-gradient(circle,
        rgba(251,191,36,0.5) 0%,
        rgba(245,158,11,0.25) 45%,
        transparent 70%);
    filter: blur(6px);
    animation: rbPulse 2.2s ease-in-out infinite;
}
@keyframes rbPulse {
    0%, 100% { opacity: 0.9; transform: scale(1); }
    50%      { opacity: 0.55; transform: scale(1.15); }
}

/* 倒计时进度环（conic-gradient） */
.reward-ball .rb-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: conic-gradient(
        from -90deg,
        #FBBF24 0%,
        #F59E0B 30%,
        #EC4899 60%,
        rgba(255,255,255,0.12) 60%,
        rgba(255,255,255,0.12) 100%);
    padding: 3px;
    mask: radial-gradient(circle, transparent 60%, #000 62%);
    -webkit-mask: radial-gradient(circle, transparent 60%, #000 62%);
    animation: rbCountdown 30s linear infinite;
}
@keyframes rbCountdown {
    0%   { background: conic-gradient(from -90deg, #FBBF24, #F59E0B 40%, #EC4899 75%, rgba(255,255,255,0.12) 75%, rgba(255,255,255,0.12)); }
    25%  { background: conic-gradient(from -90deg, #FBBF24, #F59E0B 30%, #EC4899 56%, rgba(255,255,255,0.12) 56%, rgba(255,255,255,0.12)); }
    50%  { background: conic-gradient(from -90deg, #FBBF24, #F59E0B 22%, #EC4899 37%, rgba(255,255,255,0.12) 37%, rgba(255,255,255,0.12)); }
    75%  { background: conic-gradient(from -90deg, #FBBF24, #F59E0B 14%, #EC4899 19%, rgba(255,255,255,0.12) 19%, rgba(255,255,255,0.12)); }
    100% { background: conic-gradient(from -90deg, #FBBF24, #F59E0B 0%, #EC4899 0%, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.12)); }
}

/* 粒子轨道（两颗粒子绕行装饰） */
.reward-ball .rb-orbit {
    position: absolute; inset: 2px;
    border-radius: 50%;
    pointer-events: none;
    animation: rbRotate 6s linear infinite;
}
.reward-ball .rb-orbit::before,
.reward-ball .rb-orbit::after {
    content: ''; position: absolute;
    width: 5px; height: 5px; border-radius: 50%;
    background: #FDE68A;
    box-shadow: 0 0 8px 2px #FBBF24;
}
.reward-ball .rb-orbit::before { top: -2px; left: 50%; transform: translateX(-50%); }
.reward-ball .rb-orbit::after {
    bottom: -2px; left: 50%; transform: translateX(-50%);
    background: #F9A8D4; box-shadow: 0 0 8px 2px #EC4899;
}
@keyframes rbRotate { to { transform: rotate(360deg); } }

/* 核心金币主体 */
.reward-ball .rb-core {
    position: absolute; inset: 6px;
    border-radius: 50%;
    background: linear-gradient(135deg,
        #FEF3C7 0%,
        #FBBF24 30%,
        #F59E0B 60%,
        #D97706 100%);
    box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.5),
        inset 0 -3px 6px rgba(120,53,15,0.35),
        0 4px 14px rgba(245,158,11,0.45);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
}
/* 币面高光纹理 */
.reward-ball .rb-core::before {
    content: ''; position: absolute;
    top: 6%; left: 10%;
    width: 40%; height: 30%;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    filter: blur(3px);
}
/* 币面 3D 翻转 */
.reward-ball .rb-coin-inner {
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1px;
    animation: rbFlip 3.8s ease-in-out infinite;
    transform-style: preserve-3d;
}
@keyframes rbFlip {
    0%, 42%, 100% { transform: rotateY(0deg); }
    50%, 92% { transform: rotateY(180deg); }
}
.reward-ball .rb-core i.coin-icon {
    font-size: 20px;
    color: #7C2D12;
    filter: drop-shadow(0 1px 0 rgba(255,255,255,0.5));
    margin-top: -2px;
}
.reward-ball .rb-countdown {
    font-size: 10px;
    font-weight: 800;
    color: #7C2D12;
    font-family: ui-monospace, "SF Mono", monospace;
    line-height: 1;
    letter-spacing: -0.3px;
    margin-top: 1px;
}

/* +5 金币弹出气泡 */
.reward-ball .rb-pop {
    position: absolute;
    top: -2px; right: -6px;
    padding: 3px 8px;
    border-radius: 999px;
    background: linear-gradient(135deg, #EC4899, #A855F7);
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.2px;
    box-shadow: 0 4px 10px rgba(236,72,153,0.5);
    display: flex; align-items: center; gap: 3px;
    opacity: 0;
    animation: rbPop 4s ease-in-out infinite;
    animation-delay: 2s;
    white-space: nowrap;
    transform-origin: bottom left;
}
.reward-ball .rb-pop i { font-size: 8px; }
@keyframes rbPop {
    0%, 70% { opacity: 0; transform: translateY(4px) scale(0.7); }
    10% { opacity: 1; transform: translateY(-6px) scale(1); }
    50% { opacity: 1; transform: translateY(-10px) scale(1); }
    60% { opacity: 0; transform: translateY(-18px) scale(0.9); }
}

/* 小尾巴提示 */
.reward-ball .rb-tail {
    position: absolute;
    left: 50%; bottom: -16px;
    transform: translateX(-50%);
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    color: #FEF3C7;
    font-size: 9px;
    font-weight: 600;
    white-space: nowrap;
    border: 1px solid rgba(251,191,36,0.25);
    display: flex; align-items: center; gap: 3px;
}
.reward-ball .rb-tail i { font-size: 7px; color: #FBBF24; }

/* 右上角关闭按钮 */
.reward-ball .rb-close {
    position: absolute;
    top: -4px; left: -4px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 2;
}
.reward-ball:hover .rb-close,
.reward-ball:active .rb-close { opacity: 1; }

/* 点击按压反馈 */
.reward-ball:active {
    animation-play-state: paused;
    transform: scale(0.94);
    transition: transform 0.12s;
}

/* 首次引导 tooltip（数秒后消失） */
.reward-guide {
    position: absolute;
    left: 90px;
    bottom: calc(var(--tab-bar-height) + 54px);
    padding: 8px 12px;
    background: linear-gradient(135deg, #1A1A26, #0D0D14);
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 12px;
    color: #FEF3C7;
    font-size: 12px;
    font-weight: 500;
    z-index: 41;
    box-shadow: 0 8px 22px rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 6px;
    animation: rbGuide 6s ease-in-out forwards;
    animation-delay: 1s;
    opacity: 0;
    white-space: nowrap;
}
.reward-guide::before {
    content: '';
    position: absolute;
    left: -6px; top: 50%;
    transform: translateY(-50%) rotate(45deg);
    width: 10px; height: 10px;
    background: linear-gradient(135deg, #1A1A26, #0D0D14);
    border-left: 1px solid rgba(251,191,36,0.3);
    border-bottom: 1px solid rgba(251,191,36,0.3);
}
.reward-guide .coin-ic {
    width: 16px; height: 16px; border-radius: 50%;
    background: linear-gradient(135deg, #FBBF24, #F59E0B);
    display: flex; align-items: center; justify-content: center;
    color: #7C2D12;
    font-size: 9px;
    flex-shrink: 0;
}
.reward-guide .grad {
    background: linear-gradient(135deg, #FBBF24, #EC4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 800;
}
@keyframes rbGuide {
    0%   { opacity: 0; transform: translateX(-8px); }
    12%  { opacity: 1; transform: translateX(0); }
    80%  { opacity: 1; transform: translateX(0); }
    100% { opacity: 0; transform: translateX(-8px); pointer-events: none; visibility: hidden; }
}
</style>
</head>
