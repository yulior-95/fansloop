<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 绑定新钱包</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
</head>
<body>
<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right"><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">绑定新钱包</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app">
    <div class="fl-bg" style="background: var(--bg-primary)"></div>
    <div class="fl-scroll" style="position: relative; z-index: 1; padding-top: 4px">
        <div class="fl-alert info" style="margin-top:8px">
            绑定需通过 <strong>钱包内签名</strong>，<strong>禁止</strong>手动粘贴地址。系统将校验该地址是否已被其他用户占用。
        </div>
        <p style="font-size:12px; color:var(--text-tertiary)">1. 选择连接方式  → 2. 签名验证  → 3. 成功展示在列表中</p>
        <div class="fl-btn-row" style="margin-top: 16px">
            <i class="fa-brands fa-metamask" style="font-size: 26px; color: #E17726"></i>
            <div style="flex:1">MetaMask 连接</div>
            <i class="fa-solid fa-chevron-right fl-chevron"></i>
        </div>
        <div class="fl-btn-row">
            <i class="fa-brands fa-ethereum" style="color: #3396FF; font-size: 22px"></i>
            <div style="flex:1">WalletConnect 扫码</div>
            <i class="fa-solid fa-chevron-right fl-chevron"></i>
        </div>
        <div class="fl-section-h">将签名的内容（示例）</div>
        <div class="fl-sign-box" style="font-size:11px">FansLoop LinkWallet
user_id: FL-204-115
action: link_wallet
wallet: 0x pending…
nonce: m2n9xPq5
timestamp: 2026-04-22T10:05:00Z</div>
        <button class="btn btn-primary btn-block mt-4" type="button">下一步：连接并签名</button>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active"><i class="fa-regular fa-user"></i><span>我的</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
