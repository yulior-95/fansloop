<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 解绑待生效</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<style>
.timer-box {
    text-align: center; padding: 20px; margin: 8px 0 20px;
    background: linear-gradient(180deg, rgba(168,85,247,0.12) 0%, var(--bg-card) 100%);
    border: 1px solid var(--border-color); border-radius: var(--radius-lg);
}
.timer-digits { font-size: 36px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 4px;
    background: var(--brand-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
</style>
</head>
<body>
<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right"><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">解绑进度</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app">
    <div class="fl-bg" style="background: var(--bg-primary)"></div>
    <div class="fl-scroll" style="position: relative; z-index: 1; padding-top: 4px">
        <div class="fl-alert info" style="margin-top:8px">
            你已成功提交解绑申请。冷静期内可撤销。生效后提现将不默认填充该地址。
        </div>
        <div class="timer-box">
            <p style="font-size: 12px; color: var(--text-tertiary); margin-bottom: 6px">距离解绑完全生效</p>
            <div class="timer-digits">23:45:12</div>
        </div>
        <div class="fl-section-h" style="margin-top:0">时间线</div>
        <div class="fl-card" style="padding: 0 0 0 0">
            <div style="padding: 12px 16px; border-left: 2px solid var(--success); margin-left: 12px; position: relative">
                <div style="position: absolute; left: -5px; top: 16px; width: 8px; height: 8px; border-radius: 50%; background: var(--success)"></div>
                <div style="font-size: 13px; font-weight: 600">已提交</div>
                <div style="font-size: 12px; color: var(--text-tertiary)">2026-04-22 09:00</div>
            </div>
            <div style="padding: 12px 16px; border-left: 2px solid var(--border-color); margin-left: 12px; position: relative; color: var(--text-tertiary)">
                <div style="position: absolute; left: -5px; top: 16px; width: 8px; height: 8px; border-radius: 50%; background: var(--bg-elevated)"></div>
                <div style="font-size: 13px; font-weight: 600; color: var(--text-primary)">即将生效</div>
                <div style="font-size: 12px">解绑 0x1f90****a02e</div>
            </div>
        </div>
        <button class="btn btn-ghost btn-block" type="button" style="margin-top: 20px; border-color: var(--brand-purple); color: var(--brand-purple)">撤销解绑</button>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active"><i class="fa-regular fa-user"></i><span>我的</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
