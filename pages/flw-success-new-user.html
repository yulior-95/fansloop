<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 新用户</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<link rel="stylesheet" href="../css/flw-wallet-flow.css">
</head>
<body>
<div class="status-bar dark-mode"><span class="time">9:41</span><span class="right"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></span></div>
<div class="app-content content-with-tab fansloop-app">
    <div class="fl-bg" style="background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(168,85,247,0.12), transparent)"></div>
    <div class="fl-scroll fl-welcome-only" style="text-align:center; display:flex; flex-direction:column; align-items:center; padding-top:calc(var(--status-bar-height) + 20px)">
        <i class="fa-solid fa-user-plus" style="font-size:48px; color:var(--brand-purple); margin-bottom:16px"></i>
        <h1 style="font-size:22px; font-weight:800; margin-bottom:8px">新账号已创建</h1>
        <p style="font-size:14px; color:var(--text-secondary); line-height:1.5; max-width: 300px">该钱包 <strong>未绑定</strong> 过账号。系统已创建用户并 <strong>自动绑定</strong> 本钱包，请再补充安全信息</p>
        <div class="flw-banner-ok" style="width:100%; max-width:320px; margin-top:20px; text-align:left; border-color:rgba(168,85,247,0.25); background: linear-gradient(135deg, rgba(168,85,247,0.1) 0%, rgba(10,10,18,0.2) 100%)">
            <i class="fa-solid fa-fingerprint" style="font-size:20px; color:var(--brand-purple)"></i>
            <div>
                <div style="font-size:12px; color:var(--text-tertiary)">user_id</div>
                <div class="flw-id-mono">FL-NEU-9921</div>
            </div>
        </div>
        <p class="fl-toast" style="text-align:left; max-width:320px; width:100%; margin-top:14px">若使用 WalletConnect，将记录为 WC 方式；会话建立规则与 MetaMask 一致</p>
        <button class="btn btn-primary btn-block mt-6" type="button" style="max-width:320px; margin-top: 8px">去完善账号</button>
        <button class="btn btn-ghost btn-block" type="button" style="max-width:320px; margin-top:8px; color:var(--text-tertiary)">先逛逛首页（弱引导）</button>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item active"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item"><i class="fa-regular fa-user"></i><span>我的</span><span class="fl-tab-sub">已登录</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
