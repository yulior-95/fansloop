<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 欢迎与登录</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<style>
.fl-hero { height: 44% !important; }
.fl-hero { background-image: url('https://images.unsplash.com/photo-1639762681057-bcdfeaa0f5c5?w=1200&q=80'); }
.fl-badge-guest { font-size: 9px; padding: 1px 6px; border-radius: 4px; background: rgba(168,85,247,0.2); color: #C4B5FD; display: block; margin-top: 2px; }
.tag-row { display: flex; gap: 6px; margin: 0 0 20px; }
.tag-row span { font-size: 12px; padding: 4px 10px; border-radius: var(--radius-full); background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-secondary); }
.tag-row .on { color: #fff; background: var(--bg-elevated); border-color: var(--brand-purple); }
.suffix .get-code.disabled { color: var(--text-muted); font-weight: 500; }
.note-ip { font-size: 11px; color: var(--text-tertiary); margin-top: 8px; }
</style>
</head>
<body>
<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
    </span>
</div>

<div class="app-content content-with-tab fansloop-app">
    <div class="fl-bg-hero fl-hero" aria-hidden="true"></div>
    <div class="fl-scroll fl-welcome-only">
        <div class="fl-brand">
            <div class="fl-brand-icon"><i class="fa-solid fa-infinity"></i></div>
            <h1>欢迎使用 <span class="gradient-text">FansLoop</span></h1>
            <p>手机号 / 邮箱 一键进入 · 新用户无感注册<br>也可连接钱包，链上资产安全归属 your user_id</p>
        </div>
        <div class="tag-row">
            <span class="on"><i class="fa-solid fa-mobile-screen" style="margin-right:4px"></i>手机/邮箱</span>
            <span>验证码登录</span>
        </div>
        <div class="form-group">
            <div class="form-input-group">
                <span class="prefix"><i class="fa-solid fa-user" style="color:var(--text-tertiary)"></i></span>
                <input class="form-input" type="text" placeholder="输入手机号或邮箱" value="user@example.com" readonly>
            </div>
            <p class="note-ip"><i class="fa-solid fa-shield-halved" style="color:var(--success);margin-right:4px"></i>同一 IP 有发送频率与次数限制，保护账号安全</p>
        </div>
        <div class="form-group">
            <div class="form-input-group">
                <input class="form-input" type="text" placeholder="6 位验证码" value="· · · · · ·" style="letter-spacing:8px">
                <span class="suffix"><span class="get-code disabled">59s 后重发</span></span>
            </div>
        </div>
        <button class="btn btn-primary btn-block mt-4" type="button">验证并登录 <span class="fl-badge-guest" style="display:inline; margin:0 0 0 4px" title="新用户将自动注册">含自动注册</span></button>
        <div class="divider-text" style="margin: 28px 0 16px">或使用 Web3 登录</div>
        <button class="btn btn-ghost btn-block" type="button" style="gap:10px">
            <i class="fa-solid fa-wallet" style="color:var(--brand-purple)"></i> 连接钱包
        </button>
        <p class="terms" style="margin-top:24px">
            继续即表示同意 <a href="#" onclick="return false">《用户协议》</a> 与 <a href="#" onclick="return false">《隐私政策》</a><br>
            平台资产与积分归属 user_id，钱包仅作充值/提现
        </p>
    </div>
</div>

<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active">
        <i class="fa-regular fa-user"></i>
        <span>我的</span>
        <span class="fl-tab-sub">未登录</span>
    </div>
</div>
<div class="home-indicator"></div>
</body>
</html>
