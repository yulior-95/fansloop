<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · WalletConnect 扫码</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<link rel="stylesheet" href="../css/flw-wallet-flow.css">
</head>
<body>
<div class="status-bar dark-mode"><span class="time">9:41</span><span class="right"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></span></div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">WalletConnect</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app">
    <div class="flw-hero-strip"></div>
    <div class="fl-bg" style="background:var(--bg-primary)"></div>
    <div class="fl-scroll" style="position:relative; z-index:1; padding-top:4px; text-align:center">
        <div class="flw-step" style="justify-content:center"><i class="fa-solid fa-qrcode"></i> PC 端：使用钱包 App 扫码</div>
        <p style="font-size:12px; color:var(--text-tertiary); margin: 4px 0 14px; line-height:1.5">手机端可点下方 Deep Link 直接打开钱包完成连接，无需扫码</p>
        <div style="width:184px; height:184px; margin:0 auto; background:#fff; border-radius:16px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 32px rgba(0,0,0,0.3)">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=FansLoop_WalletConnect_V2" width="160" height="160" alt="WC QR">
        </div>
        <div class="flw-link-row" style="margin-top:18px">
            <span><i class="fa-solid fa-bolt" style="color:var(--warning)"></i> 使用 Deep Link 打开钱包</span>
            <i class="fa-solid fa-chevron-right" style="color:var(--text-muted); font-size:12px"></i>
        </div>
        <p class="flw-qr-hint">连接成功后将进入与 MetaMask 相同的 <strong>签名</strong> 与 <strong>user_id 绑定</strong> 判断流程</p>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item active"><i class="fa-regular fa-user"></i><span>我的</span><span class="fl-tab-sub">未登录</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
