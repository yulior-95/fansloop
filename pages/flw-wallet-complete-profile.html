<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 首登补全</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<link rel="stylesheet" href="../css/flw-wallet-flow.css">
</head>
<body>
<div class="status-bar dark-mode"><span class="time">9:41</span><span class="right"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></span></div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"></div>
    <div class="nav-title">完善账号</div>
    <div class="nav-right"><div class="nav-btn" style="width:auto; padding:0 8px; font-size:12px; font-weight:500">跳过</div></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app">
    <img class="fl-hero-ambient" style="height:160px; opacity:0.35" src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800" alt="">
    <div class="fl-bg" style="background:var(--bg-primary)"></div>
    <div class="fl-scroll" style="position:relative; z-index:1; padding-top:72px">
        <p style="font-size:14px; color:var(--text-secondary); line-height:1.6; margin:0 0 16px">绑定 <strong>手机</strong> 或 <strong>邮箱</strong>，用于账号找回与提高安全性；<strong>完成</strong> 后可直接进首页，也可 <strong>跳过</strong> 后续再补。</p>
        <div class="form-group">
            <label class="form-label">手机号</label>
            <div class="form-input-group"><span class="prefix">+86</span><input class="form-input" type="tel" placeholder="11 位手机号" readonly></div>
        </div>
        <div class="form-group">
            <label class="form-label">或 邮箱</label>
            <div class="form-input-group"><input class="form-input" type="email" placeholder="name@email.com" readonly></div>
        </div>
        <button class="btn btn-primary btn-block mt-4" type="button">完成并进入首页</button>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item active"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item"><i class="fa-regular fa-user"></i><span>我的</span><span class="fl-tab-sub">已登录</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
