<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>修改提现信息</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<style>
body {
    background:
        radial-gradient(ellipse at 50% 10%, rgba(168,85,247,0.12), transparent 55%),
        #0A0A12;
}
.nav-bar { background: rgba(10,10,18,0.8); backdrop-filter: blur(12px); }
.app-content {
    padding-top: calc(var(--status-bar-height) + var(--nav-bar-height));
    padding-bottom: 20px;
    opacity: 0.4;
    filter: blur(1px);
}

/* 背景 */
.verify-hero { text-align: center; padding: 18px 20px 16px; }
.verify-hero .ic {
    width: 68px; height: 68px; margin: 0 auto 12px;
    border-radius: 20px;
    background: linear-gradient(135deg, #A855F7, #EC4899);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 28px;
}
.verify-hero h2 { font-size: 20px; font-weight: 700; }

.tx-summary {
    margin: 0 16px;
    padding: 16px;
    background: linear-gradient(180deg, #1A1A26 0%, #12121C 100%);
    border: 1px solid rgba(168,85,247,0.2);
    border-radius: 16px;
}
.tx-big { text-align: center; padding: 8px 0 6px; }
.tx-big .amt { font-size: 30px; font-weight: 800; color: #fff; }
.tx-big .cur { font-size: 16px; color: var(--text-secondary); font-weight: 600; }

/* ========= 弹窗 ========= */
.edit-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.68);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    backdrop-filter: blur(3px);
    animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

.edit-sheet {
    width: 100%;
    background: linear-gradient(180deg, #1A1A26 0%, #12121C 100%);
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    padding: 12px 0 30px;
    box-shadow: 0 -20px 60px rgba(0,0,0,0.55);
    max-height: 90%;
    animation: sheetUp 0.34s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; flex-direction: column;
}
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.sheet-grab {
    width: 44px; height: 5px;
    background: rgba(255,255,255,0.18);
    border-radius: 3px;
    margin: 0 auto 14px;
}
.sheet-head {
    padding: 0 20px 4px;
    display: flex; justify-content: space-between; align-items: center;
}
.sheet-head h2 {
    font-size: 17px; font-weight: 700;
    letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 8px;
}
.sheet-head h2 .ic {
    width: 28px; height: 28px; border-radius: 8px;
    background: rgba(168,85,247,0.15);
    color: var(--brand-purple);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
}
.sheet-head .close {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--text-secondary);
}
.sheet-sub {
    padding: 6px 20px 14px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
}
.sheet-sub b { color: #fff; }

/* 可滚动内容 */
.edit-scroll {
    overflow-y: auto;
    padding: 0 16px 4px;
    flex: 1;
}

/* 金额编辑区 */
.amt-edit-card {
    padding: 18px 16px;
    background: rgba(168,85,247,0.06);
    border: 1px solid rgba(168,85,247,0.22);
    border-radius: 14px;
    text-align: center;
    margin-bottom: 12px;
}
.amt-edit-card .label {
    font-size: 10px; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px;
    font-weight: 600;
    margin-bottom: 6px;
}
.amt-edit-card .input-row {
    display: flex; align-items: baseline; justify-content: center;
    gap: 4px;
}
.amt-edit-card .symbol { font-size: 20px; color: var(--text-secondary); font-weight: 600; }
.amt-edit-card .inp {
    font-size: 36px; font-weight: 800;
    color: #fff;
    background: transparent;
    border: none; outline: none;
    text-align: center;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    width: 180px;
    letter-spacing: -1px;
}
.amt-edit-card .balance-hint {
    font-size: 11px; color: var(--text-tertiary);
    margin-top: 6px;
}
.amt-edit-card .balance-hint b { color: var(--crypto-green); font-weight: 600; }
.chips-row {
    display: flex; justify-content: center; gap: 6px;
    margin-top: 12px; flex-wrap: wrap;
}
.chips-row .c {
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 11px;
    color: var(--text-secondary);
}
.chips-row .c.active {
    background: rgba(168,85,247,0.15);
    border-color: rgba(168,85,247,0.35);
    color: var(--brand-purple);
    font-weight: 600;
}
.chips-row .c.all {
    background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(236,72,153,0.15));
    border-color: var(--brand-purple);
    color: #fff;
    font-weight: 600;
}

/* 银行卡选择 */
.sec-h {
    padding: 6px 4px 8px;
    font-size: 11px;
    color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px;
    font-weight: 600;
    display: flex; justify-content: space-between; align-items: center;
}
.sec-h .right {
    color: var(--brand-purple);
    font-size: 11px;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 500;
}

.card-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    margin-bottom: 6px;
    cursor: pointer;
}
.card-item.selected {
    background: linear-gradient(90deg, rgba(168,85,247,0.12), rgba(168,85,247,0.04));
    border-color: rgba(168,85,247,0.4);
}
.card-item .bi-logo {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px;
    color: #fff;
    flex-shrink: 0;
}
.card-item .bi-logo.cmb { background: linear-gradient(135deg, #DC2626, #991B1B); }
.card-item .bi-logo.icbc { background: linear-gradient(135deg, #DC2626, #7F1D1D); }

.card-item .bi-main { flex: 1; min-width: 0; }
.card-item .bi-name { font-size: 13px; font-weight: 600; }
.card-item .bi-num {
    font-size: 10px; color: var(--text-tertiary);
    font-family: ui-monospace, monospace;
    margin-top: 2px;
}
.card-item .bi-radio {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.card-item.selected .bi-radio {
    background: var(--brand-gradient);
    border-color: var(--brand-purple);
}
.card-item.selected .bi-radio::after {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #fff;
}

/* 费用变化预览 */
.diff-box {
    margin-top: 10px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
}
.diff-box .dt {
    font-size: 11px; color: var(--text-tertiary);
    margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
    font-weight: 600;
    display: flex; align-items: center; gap: 4px;
}
.diff-box .dt i { color: #FBBF24; font-size: 10px; }

.diff-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0;
    font-size: 12px;
}
.diff-row .k { color: var(--text-tertiary); }
.diff-row .old { color: #EF4444; text-decoration: line-through; margin-right: 4px; font-size: 11px; opacity: 0.7; }
.diff-row .new { color: #fff; font-weight: 600; }
.diff-row .new.green { color: #6EE7B7; }

/* 底部 */
.sheet-bar {
    padding: 10px 20px 0;
    border-top: 0.5px solid rgba(255,255,255,0.06);
    display: flex; gap: 10px;
}
.sheet-bar .btn.sec {
    flex: 0 0 100px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-secondary);
    height: 48px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12px;
    font-size: 14px; font-weight: 600;
}
.sheet-bar .btn.main { flex: 1; }
</style>
</head>
<body>

<div class="status-bar">
    <span class="time">9:41</span>
    <span class="right">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
    </span>
</div>

<div class="nav-bar solid">
    <div class="nav-left"><div class="nav-btn" onclick="location.href='withdraw-fiat-verify.html'"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">安全验证</div>
    <div class="nav-right"><div class="nav-btn"><i class="fa-regular fa-circle-question"></i></div></div>
</div>

<!-- 背景 -->
<div class="app-content">
    <div class="verify-hero">
        <div class="ic"><i class="fa-solid fa-shield-halved"></i></div>
        <h2>提现安全验证</h2>
    </div>

    <div class="tx-summary">
        <div class="tx-big">
            <span class="cur">¥</span><span class="amt">2,000.00</span>
        </div>
    </div>
</div>

<!-- ========== 修改提现信息弹窗 ========== -->
<div class="edit-overlay">
    <div class="edit-sheet">
        <div class="sheet-grab"></div>

        <div class="sheet-head">
            <h2>
                <span class="ic"><i class="fa-regular fa-pen-to-square"></i></span>
                修改提现信息
            </h2>
            <div class="close"><i class="fa-solid fa-xmark"></i></div>
        </div>

        <div class="sheet-sub">
            修改后订单将重新生成，当前验证状态会<b>重置</b>
        </div>

        <!-- 可滚动内容 -->
        <div class="edit-scroll">

            <!-- 金额编辑 -->
            <div class="amt-edit-card">
                <div class="label">提现金额</div>
                <div class="input-row">
                    <span class="symbol">¥</span>
                    <input class="inp" value="3,000.00">
                </div>
                <div class="balance-hint">可提现余额 <b>¥6,128.56</b> · 本月剩余额度 ¥48,000</div>

                <div class="chips-row">
                    <span class="c">¥500</span>
                    <span class="c">¥1,000</span>
                    <span class="c">¥2,000</span>
                    <span class="c active">¥3,000</span>
                    <span class="c all"><i class="fa-solid fa-bolt" style="font-size:9px"></i> 全部</span>
                </div>
            </div>

            <!-- 收款卡 -->
            <div class="sec-h">
                <span><i class="fa-solid fa-building-columns" style="color:var(--brand-purple); margin-right:5px"></i>到账银行卡</span>
                <span class="right">添加新卡 <i class="fa-solid fa-plus" style="font-size:10px"></i></span>
            </div>

            <div class="card-item selected">
                <div class="bi-logo cmb">招</div>
                <div class="bi-main">
                    <div class="bi-name">招商银行 储蓄卡</div>
                    <div class="bi-num">•••• •••• •••• 2025</div>
                </div>
                <div class="bi-radio"></div>
            </div>

            <div class="card-item">
                <div class="bi-logo icbc">工</div>
                <div class="bi-main">
                    <div class="bi-name">中国工商银行</div>
                    <div class="bi-num">•••• •••• •••• 8869</div>
                </div>
                <div class="bi-radio"></div>
            </div>

            <!-- 变更预览 -->
            <div class="diff-box">
                <div class="dt"><i class="fa-solid fa-arrow-right-arrow-left"></i>本次修改</div>
                <div class="diff-row">
                    <span class="k">提现金额</span>
                    <span>
                        <span class="old">¥2,000</span>
                        <span class="new">¥3,000</span>
                    </span>
                </div>
                <div class="diff-row">
                    <span class="k">手续费</span>
                    <span>
                        <span class="old">¥4</span>
                        <span class="new">¥6</span>
                    </span>
                </div>
                <div class="diff-row">
                    <span class="k">实际到账</span>
                    <span>
                        <span class="old">¥1,996</span>
                        <span class="new green">¥2,994</span>
                    </span>
                </div>
                <div class="diff-row" style="padding-top: 8px; border-top: 1px dashed rgba(255,255,255,0.08); margin-top: 4px">
                    <span class="k">到账银行</span>
                    <span class="new">招商银行 •••• 2025</span>
                </div>
            </div>

        </div>

        <!-- 底部按钮 -->
        <div class="sheet-bar">
            <button class="btn sec" onclick="location.href='withdraw-fiat-verify.html'">取消</button>
            <button class="btn btn-primary main" onclick="location.href='withdraw-fiat-verify.html'">
                <i class="fa-solid fa-check"></i>
                确认修改
            </button>
        </div>
    </div>
</div>

<div class="home-indicator"></div>
</body>
</html>
