<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FansLoop · 资产与流转</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/fansloop-auth.css">
<style>
.path-flow { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 4px; font-size: 11px; text-align: center; margin: 8px 0; }
.path-flow .p { background: var(--bg-elevated); padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-color); }
.path-flow i { color: var(--text-tertiary); margin: 0 2px; }
.split-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.split-col .cell { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 10px; min-height: 100px; }
.split-col h4 { font-size: 12px; margin-bottom: 6px; }
.split-col p { font-size: 10px; color: var(--text-tertiary); line-height: 1.45; }
</style>
</head>
<body>
<div class="status-bar dark-mode">
    <span class="time">9:41</span>
    <span class="right"><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div class="nav-bar solid" style="top:var(--status-bar-height)">
    <div class="nav-left"><div class="nav-btn"><i class="fa-solid fa-chevron-left"></i></div></div>
    <div class="nav-title">用户资产与流转</div>
    <div class="nav-right"></div>
</div>
<div class="app-content content-with-nav content-with-tab fansloop-app">
    <div class="fl-bg" style="background: var(--bg-primary)"></div>
    <div class="fl-scroll" style="position: relative; z-index: 1; font-size: 12px; padding-top: 4px">
        <p style="color: var(--text-secondary); margin: 4px 0 14px; line-height: 1.5">说明页：为充值 / NFT / 代币 功能预留的产品语境，<strong>一切链下记账归属 user_id</strong>。</p>
        <div class="split-col">
            <div class="cell" style="border-color: rgba(168,85,247,0.3)">
                <h4><i class="fa-solid fa-landmark" style="color: var(--brand-purple)"></i> 平台账户资产</h4>
                <p>积分、USDT 平台余额、活动代币、权益券 — 以 user_id 为唯一主键。</p>
            </div>
            <div class="cell" style="border-color: rgba(6,182,212,0.3)">
                <h4><i class="fa-solid fa-link" style="color: var(--crypto-cyan)"></i> 链上 / 钱包资产</h4>
                <p>公链上原生资产、合约代币、NFT — 在钱包中持有，可充值进平台或提现。</p>
            </div>
        </div>
        <div class="fl-section-h" style="margin: 18px 0 6px">资金与价值流转（示意）</div>
        <div class="fl-card" style="padding: 12px; margin-bottom: 0">
            <div class="path-flow">
                <span class="p">钱包</span> <i class="fa-solid fa-right-long"></i> <span class="p" style="border-color: rgba(16,185,129,0.4)">充值上账</span>
                <i class="fa-solid fa-right-long"></i> <span class="p" style="background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(10,10,18,0.1))">平台账户 (user_id)</span>
            </div>
            <div class="path-flow">
                <span class="p">消费 / 打赏 / 会员</span> <i class="fa-solid fa-right-long"></i> <span class="p">USDT/积分/代币 扣减</span>
            </div>
            <div class="path-flow">
                <span class="p">提现</span> <i class="fa-solid fa-right-long"></i> <span class="p">主钱包地址</span> <i class="fa-solid fa-right-long"></i> <span class="p">链上到账</span>
            </div>
        </div>
        <div style="margin: 12px 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color)">
            <img src="https://images.unsplash.com/photo-1640340434855-0084e1b3bbb6?w=800&q=80" alt="" style="width: 100%; height: 100px; object-fit: cover; display: block">
        </div>
        <p class="fl-toast" style="line-height: 1.5; color: var(--text-tertiary)">可替换为 Figma/Canvas 的正式产品插图；本页为 HTML 静态示意。</p>
    </div>
</div>
<div class="tab-bar">
    <div class="tab-item active"><i class="fa-solid fa-house"></i><span>首页</span></div>
    <div class="tab-item"><i class="fa-regular fa-heart"></i><span>订阅</span></div>
    <div class="tab-create"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
    <div class="tab-item"><i class="fa-regular fa-message"></i><span>消息</span></div>
    <div class="tab-item"><i class="fa-regular fa-user"></i><span>我的</span></div>
</div>
<div class="home-indicator"></div>
</body>
</html>
