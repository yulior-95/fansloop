<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>创建直播 · FansLoop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
.pub-shell { max-width: 720px; margin: 32px auto; padding: 0 20px; }
.cover-pick {
    height: 180px;
    border-radius: var(--r-lg);
    background: url('https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=1200&q=80') center/cover;
    border: 1px solid var(--border);
    margin-bottom: 16px;
}
.price-opt {
    margin: 16px 0;
    padding: 14px;
    background: var(--bg-input);
    border: 1px dashed var(--border-strong);
    border-radius: var(--r-md);
}
.price-opt label { font-size: 12px; color: var(--t-secondary); display: block; margin-bottom: 8px; }
.price-opt .hint { font-size: 11px; color: var(--t-tertiary); margin-top: 8px; }
</style>
</head>
<body style="background:var(--bg-canvas)">
<div class="pub-shell">
    <a href="home.html" style="font-size:13px;color:var(--brand-purple);margin-bottom:16px;display:inline-flex;align-items:center;gap:6px"><i class="fa-solid fa-arrow-left"></i> 返回首页</a>
    <h1 style="font-size:22px;font-weight:800;margin-bottom:8px">创建直播</h1>
    <p style="color:var(--t-secondary);font-size:13px;margin-bottom:20px">设置封面与标题， viewers 将通过 Feed 与推送收到开播提醒。</p>
    <div class="cover-pick"></div>
    <div class="field"><label class="field-label">直播标题</label><input class="input" placeholder="例如：雨夜小提琴即兴" /></div>
    <div class="field mt-16"><label class="field-label">开播时间</label><select class="select"><option>立即开播</option><option>预约 30 分钟后</option><option>自定义…</option></select></div>
    <div class="price-opt">
        <label><i class="fa-solid fa-ticket" style="color:#F59E0B"></i> 直播间门票 / 最低打赏（可选）</label>
        <input type="number" class="input" placeholder="留空表示仅常规打赏，不设门槛" min="0" step="0.01" style="max-width:260px" />
        <p class="hint">USDT · 可用于付费入场或设定礼物门槛，不影响审核流程。</p>
    </div>
    <button class="btn btn-primary btn-lg btn-block mt-16" onclick="location.href='live-detail.html'"><i class="fa-solid fa-tower-broadcast"></i> 提交审核并进入开播流程</button>
</div>
</body>
</html>
