<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>资金密码验证</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
body { background: var(--bg-app); }
.modal-mask { background: rgba(0,0,0,0.7); }
.modal { max-width: 460px; }

.pwd-stage { text-align: center; padding: 12px 0 16px; }
.pwd-stage .ic-wrap {
    width: 76px; height: 76px;
    margin: 0 auto 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(236,72,153,0.08));
    border: 1px solid rgba(168,85,247,0.3);
    display: flex; align-items: center; justify-content: center;
    color: #C084FC;
    font-size: 30px;
}
.pwd-stage h3 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.pwd-stage p { font-size: 12.5px; color: var(--t-tertiary); }

.pwd-input {
    display: flex; gap: 8px; justify-content: center;
    margin: 22px 0;
}
.pwd-input .dot {
    width: 44px; height: 50px;
    background: var(--bg-input);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--t-tertiary);
    font-size: 22px;
}
.pwd-input .dot.filled {
    background: var(--bg-input-focus);
    border-color: var(--brand-purple);
    color: #fff;
    box-shadow: 0 0 0 3px rgba(168,85,247,0.1);
}
.pwd-input .dot.cursor { border-color: var(--brand-purple); animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.confirm-summary {
    background: var(--bg-input);
    border-radius: var(--r-md);
    padding: 14px 16px;
    margin-bottom: 14px;
}
</style>

<link rel="stylesheet" href="../css-web/global-lang-switch.css">
<script src="../js-web/global-lang-switch.js" defer></script>
</head>
<body>

<div class="modal-mask">
    <div class="modal">
        <div class="modal-head">
            <h2 style="font-size: 16px"><span class="ic"><i class="fa-solid fa-key"></i></span>资金密码 · 第 2/2 步
                <span class="sub">最后一步 · 验证后立即提交</span>
            </h2>
            <button class="close" onclick="location.href='withdraw-fiat.html'"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="modal-body">
            <div class="pwd-stage">
                <div class="ic-wrap"><i class="fa-solid fa-lock"></i></div>
                <h3>请输入 6 位资金密码</h3>
                <p>资金密码与登录密码不同 · <a href="#" style="color:var(--brand-purple)">忘记密码？</a></p>
            </div>

            <div class="pwd-input">
                <div class="dot filled">●</div>
                <div class="dot filled">●</div>
                <div class="dot filled">●</div>
                <div class="dot filled">●</div>
                <div class="dot cursor"></div>
                <div class="dot"></div>
            </div>

            <div class="confirm-summary">
                <div class="kv-list">
                    <div class="kv-row" style="padding: 6px 0"><span class="k">提现金额</span><span class="v num">500.00 USDT</span></div>
                    <div class="kv-row" style="padding: 6px 0"><span class="k">收款卡</span><span class="v">招商 ****6618</span></div>
                    <div class="kv-row" style="padding: 6px 0; border-bottom: none"><span class="k">实际到账</span><span class="v num t-grad" style="font-weight: 800">¥3,532.25</span></div>
                </div>
            </div>

            <div class="notice notice-warning">
                <i class="fa-solid fa-triangle-exclamation ni"></i>
                <span>连续输错 5 次将冻结资金密码 24 小时。请仔细输入。</span>
            </div>
        </div>

        <div class="modal-foot">
            <button class="btn" onclick="location.href='withdraw-fiat-verify.html'">上一步</button>
            <button class="btn btn-primary" onclick="location.href='withdraw-fiat-success.html'">
                <i class="fa-solid fa-paper-plane"></i>提交提现申请
            </button>
        </div>
    </div>
</div>

</body>
</html>
