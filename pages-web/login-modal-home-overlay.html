<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首页触发登录 · FansLoop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<link rel="stylesheet" href="../css-web/global-lang-switch.css">
<script src="../js-web/global-lang-switch.js" defer></script>
<style>
html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg-canvas); }
.wrap {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-sizing: border-box;
}
.bg-blur {
    position: absolute;
    inset: 0;
    background: var(--bg-app);
    opacity: 0.35;
    filter: blur(4px);
    pointer-events: none;
}
.note {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 11px;
    font-weight: 700;
    color: #E9D5FF;
    background: rgba(168,85,247,0.2);
    border: 1px solid rgba(168,85,247,0.45);
    padding: 8px 14px;
    border-radius: 999px;
    white-space: nowrap;
}
.frame-shell {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 440px;
    height: min(560px, calc(100vh - 80px));
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-xl);
    overflow: hidden;
    box-shadow: var(--shadow-lg), var(--shadow-glow);
}
.frame-shell iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}
</style>
</head>
<body>
<div class="wrap">
    <div class="bg-blur"></div>
    <p class="note"><i class="fa-solid fa-layer-group"></i> 弹窗内嵌 wallet / email 流程 · modal-login-main.html</p>
    <div class="frame-shell">
        <iframe src="modal-login-main.html" title="登录"></iframe>
    </div>
</div>
</body>
</html>
