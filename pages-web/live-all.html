<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>全部直播 · FansLoop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 24px; max-width: 1200px; margin: 0 auto; }
.card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    cursor: pointer;
}
.card .thumb {
    height: 140px;
    background-size: cover;
    background-position: center;
    position: relative;
}
.card .thumb .live-tag {
    position: absolute; top: 10px; left: 10px;
    background: #EF4444;
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    padding: 4px 8px;
    border-radius: 4px;
}
.card .bd { padding: 12px 14px; }
.card .bd .t { font-weight: 700; font-size: 14px; }
.card .bd .s { font-size: 11px; color: var(--t-tertiary); margin-top: 4px; }
</style>

<link rel="stylesheet" href="../css-web/global-lang-switch.css">
<script src="../js-web/global-lang-switch.js" defer></script>
</head>
<body style="background:var(--bg-canvas)">
<div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto">
    <h1 style="font-size:20px;font-weight:800">正在直播</h1>
    <a href="home.html" style="color:var(--brand-purple);font-size:13px"><i class="fa-solid fa-arrow-left"></i> 返回首页</a>
</div>
<div class="grid">
    <div class="card" onclick="location.href='live-detail.html'">
        <div class="thumb" style="background-image:url('https://images.unsplash.com/photo-1465847899084-d164df4dedc6?w=600')"><span class="live-tag">LIVE</span></div>
        <div class="bd"><div class="t">雨夜小提琴现场</div><div class="s">夜雨听弦 · 1,284 观看</div></div>
    </div>
    <div class="card" onclick="location.href='live-detail.html'">
        <div class="thumb" style="background-image:url('https://images.unsplash.com/photo-1493612276216-ee3925520721?w=600')"><span class="live-tag">LIVE</span></div>
        <div class="bd"><div class="t">深夜咖啡馆问答</div><div class="s">咖啡店主 · 642 观看</div></div>
    </div>
    <div class="card" onclick="location.href='live-detail.html'">
        <div class="thumb" style="background-image:url('https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=600')"><span class="live-tag">LIVE</span></div>
        <div class="bd"><div class="t">City Pop 键盘即兴</div><div class="s">SynthWave · 428 观看</div></div>
    </div>
</div>
</body>
</html>
