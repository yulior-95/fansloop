<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>修改收款银行卡</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
body { background: var(--bg-app); }
.modal-mask { background: rgba(0,0,0,0.7); }
.modal { max-width: 540px; }

.curr-card {
    padding: 14px;
    background: linear-gradient(135deg, rgba(168,85,247,0.06), rgba(236,72,153,0.03));
    border: 1px solid rgba(168,85,247,0.2);
    border-radius: var(--r-md);
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
}
.curr-card .lo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #C8102E, #8B0000);
    color: #fff; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800;
}
.curr-card .info { flex: 1; }
.curr-card .info .n { font-size: 13px; font-weight: 700; }
.curr-card .info .a { font-size: 11px; color: var(--t-tertiary); font-family: ui-monospace, monospace; margin-top: 1px; }
.curr-card .tag { font-size: 10px; padding: 3px 8px; background: rgba(168,85,247,0.18); color: #C084FC; border-radius: 5px; font-weight: 600; }
</style>

<link rel="stylesheet" href="../css-web/global-lang-switch.css">
<script src="../js-web/global-lang-switch.js" defer></script>
</head>
<body>

<div class="modal-mask">
    <div class="modal">
        <div class="modal-head">
            <h2 style="font-size: 16px"><span class="ic"><i class="fa-solid fa-pen-to-square"></i></span>修改收款银行卡
                <span class="sub">修改卡片需重新进行实名验证</span>
            </h2>
            <button class="close" onclick="location.href='withdraw-fiat.html'"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="modal-body">

            <div class="curr-card">
                <div class="lo">招</div>
                <div class="info">
                    <div class="n">招商银行 · 储蓄卡</div>
                    <div class="a">**** **** **** 6618</div>
                </div>
                <span class="tag">当前选中</span>
            </div>

            <div class="field">
                <label class="field-label">持卡人姓名 <span class="req">*</span></label>
                <input type="text" class="input" value="黄某某" />
            </div>

            <div class="field">
                <label class="field-label">银行卡号 <span class="req">*</span></label>
                <input type="text" class="input" value="6225 8800 1234 6618" />
                <div class="field-help t-success" style="margin-top: 6px"><i class="fa-solid fa-circle-check"></i> 已识别：招商银行 · 储蓄卡</div>
            </div>

            <div class="field">
                <label class="field-label">银行预留手机号 <span class="req">*</span></label>
                <div class="input-group">
                    <span class="pre">+86</span>
                    <input type="text" class="input" value="138 **** 8866" />
                </div>
            </div>

            <div class="notice notice-warning">
                <i class="fa-solid fa-triangle-exclamation ni"></i>
                <span><b>修改卡片信息将冻结提现 24 小时</b><br>这是合规反洗钱要求，期间已发起的提现订单不受影响。</span>
            </div>
        </div>

        <div class="modal-foot">
            <button class="btn" onclick="location.href='withdraw-fiat.html'">取消</button>
            <button class="btn btn-primary" onclick="location.href='withdraw-fiat.html'">
                <i class="fa-solid fa-shield-halved"></i>提交修改
            </button>
        </div>
    </div>
</div>

</body>
</html>
