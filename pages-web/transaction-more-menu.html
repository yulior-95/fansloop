<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>更多操作</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
body { background: var(--bg-app); }
.modal-mask { background: rgba(0,0,0,0.7); }
.modal { max-width: 420px; }

.menu-list { display: flex; flex-direction: column; gap: 4px; }
.m-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    background: var(--bg-input);
    border-radius: var(--r-md);
    cursor: pointer;
    transition: 0.15s;
}
.m-row:hover { background: var(--bg-card-2); }
.m-row .ic-m {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px;
    flex-shrink: 0;
}
.m-row.copy .ic-m { background: linear-gradient(135deg, #3B82F6, #1E40AF); }
.m-row.share .ic-m { background: linear-gradient(135deg, #A855F7, #7E22CE); }
.m-row.appeal .ic-m { background: linear-gradient(135deg, #F59E0B, #D97706); }
.m-row.contact .ic-m { background: linear-gradient(135deg, #10B981, #059669); }
.m-row.invoice .ic-m { background: linear-gradient(135deg, #EC4899, #BE185D); }
.m-row.report .ic-m { background: linear-gradient(135deg, #EF4444, #B91C1C); }
.m-row.tax .ic-m { background: linear-gradient(135deg, #06B6D4, #0E7490); }
.m-row.note .ic-m { background: linear-gradient(135deg, #8B5CF6, #6D28D9); }

.m-row .info { flex: 1; }
.m-row .info .nm { font-size: 13.5px; font-weight: 600; }
.m-row .info .desc { font-size: 11.5px; color: var(--t-tertiary); margin-top: 2px; }
.m-row .arrow { color: var(--t-tertiary); font-size: 11px; }
</style>
</head>
<body>

<div class="modal-mask">
    <div class="modal">
        <div class="modal-head">
            <h2 style="font-size: 16px"><span class="ic"><i class="fa-solid fa-ellipsis"></i></span>更多操作
                <span class="sub">订单 TXN20260425190832</span>
            </h2>
            <button class="close" onclick="location.href='transaction-detail.html'"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="modal-body">
            <div class="menu-list">

                <div class="m-row copy">
                    <div class="ic-m"><i class="fa-regular fa-copy"></i></div>
                    <div class="info"><div class="nm">复制订单号</div><div class="desc">将订单号复制到剪贴板</div></div>
                    <i class="fa-solid fa-chevron-right arrow"></i>
                </div>

                <div class="m-row share" onclick="location.href='transaction-share-poster.html'">
                    <div class="ic-m"><i class="fa-solid fa-share-nodes"></i></div>
                    <div class="info"><div class="nm">分享收益海报</div><div class="desc">生成精美海报分享到社交平台</div></div>
                    <i class="fa-solid fa-chevron-right arrow"></i>
                </div>

                <div class="m-row invoice">
                    <div class="ic-m"><i class="fa-solid fa-file-invoice"></i></div>
                    <div class="info"><div class="nm">下载收据 PDF</div><div class="desc">用于报销 / 财务存档</div></div>
                    <i class="fa-solid fa-chevron-right arrow"></i>
                </div>

                <div class="m-row tax">
                    <div class="ic-m"><i class="fa-solid fa-calculator"></i></div>
                    <div class="info"><div class="nm">税务报告</div><div class="desc">查看本笔交易的税务详情</div></div>
                    <i class="fa-solid fa-chevron-right arrow"></i>
                </div>

                <div class="m-row note">
                    <div class="ic-m"><i class="fa-solid fa-pen"></i></div>
                    <div class="info"><div class="nm">添加备注</div><div class="desc">为该交易添加自定义备注</div></div>
                    <i class="fa-solid fa-chevron-right arrow"></i>
                </div>

                <div class="m-row appeal" onclick="location.href='transaction-appeal.html'">
                    <div class="ic-m"><i class="fa-solid fa-gavel"></i></div>
                    <div class="info"><div class="nm">发起申诉</div><div class="desc">对交易有疑问？提交申诉单</div></div>
                    <i class="fa-solid fa-chevron-right arrow"></i>
                </div>

                <div class="m-row contact" onclick="location.href='transaction-contact.html'">
                    <div class="ic-m"><i class="fa-solid fa-headset"></i></div>
                    <div class="info"><div class="nm">联系客服</div><div class="desc">7×24 小时人工客服</div></div>
                    <i class="fa-solid fa-chevron-right arrow"></i>
                </div>

                <div class="m-row report">
                    <div class="ic-m"><i class="fa-solid fa-flag"></i></div>
                    <div class="info"><div class="nm">举报异常</div><div class="desc">举报欺诈 / 异常交易</div></div>
                    <i class="fa-solid fa-chevron-right arrow"></i>
                </div>
            </div>
        </div>

        <div class="modal-foot">
            <button class="btn" style="flex: 1" onclick="location.href='transaction-detail.html'">关闭</button>
        </div>
    </div>
</div>

</body>
</html>
