<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>发布视频 · FansLoop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
.pub-shell { max-width: 720px; margin: 32px auto; padding: 0 20px; }
.v-zone {
    aspect-ratio: 16/9;
    border-radius: var(--r-lg);
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 2px dashed var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
    color: var(--t-tertiary);
}
.price-opt {
    margin: 16px 0;
    padding: 14px;
    background: var(--bg-input);
    border: 1px dashed var(--border-strong);
    border-radius: var(--r-md);
}
.price-opt label { font-size: 12px; color: var(--t-secondary); display: block; margin-bottom: 8px; }
.price-opt .hint { font-size: 11px; color: var(--t-tertiary); margin-top: 8px; }
</style>

<link rel="stylesheet" href="../css-web/global-lang-switch.css">
<script src="../js-web/global-lang-switch.js" defer></script>
</head>
<body style="background:var(--bg-canvas)">
<div class="pub-shell">
    <a href="home.html" style="font-size:13px;color:var(--brand-purple);margin-bottom:16px;display:inline-flex;align-items:center;gap:6px"><i class="fa-solid fa-arrow-left"></i> 返回首页</a>
    <h1 style="font-size:22px;font-weight:800;margin-bottom:8px">发布视频</h1>
    <p style="color:var(--t-secondary);font-size:13px;margin-bottom:20px">支持 MP4 / MOV，最大 4GB · H.264 编码推荐。</p>
    <div class="v-zone">
        <i class="fa-solid fa-cloud-arrow-up" style="font-size:36px;color:var(--brand-purple)"></i>
        <span>点击或拖拽上传视频文件</span>
    </div>
    <input type="text" class="input" placeholder="标题" style="margin-bottom:12px" />
    <textarea class="textarea" style="min-height:80px" placeholder="视频简介"></textarea>
    <div class="price-opt">
        <label><i class="fa-solid fa-tag" style="color:#F59E0B"></i> 观看定价（可选）</label>
        <input type="number" class="input" placeholder="留空表示免费观看" min="0" step="0.01" style="max-width:220px" />
        <p class="hint">USDT · 付费视频将在审核通过后对购买者解锁。</p>
    </div>
    <button class="btn btn-primary btn-lg btn-block mt-16" onclick="location.href='home.html'"><i class="fa-solid fa-play"></i> 提交审核并发布</button>
</div>
</body>
</html>
