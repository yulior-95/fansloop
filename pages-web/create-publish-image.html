<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>发布图文 · FansLoop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
.pub-shell { max-width: 720px; margin: 32px auto; padding: 0 20px; }
.pub-hero {
    height: 200px;
    border-radius: var(--r-xl);
    background: url('https://images.pexels.com/photos/1267320/pexels-photo-1267320.jpeg?auto=compress&cs=tinysrgb&w=1200') center/cover;
    border: 1px solid var(--border);
    margin-bottom: 20px;
    display: flex; align-items: flex-end; padding: 16px;
}
.pub-hero span { background: rgba(0,0,0,0.55); padding: 8px 12px; border-radius: 8px; font-size: 12px; }
.price-opt {
    margin: 18px 0;
    padding: 14px;
    background: var(--bg-input);
    border: 1px dashed var(--border-strong);
    border-radius: var(--r-md);
}
.price-opt label { font-size: 12px; color: var(--t-secondary); display: block; margin-bottom: 8px; }
.price-opt .hint { font-size: 11px; color: var(--t-tertiary); margin-top: 8px; }
</style>
</head>
<body style="background:var(--bg-canvas)">
<div class="pub-shell">
    <a href="home.html" style="font-size:13px;color:var(--brand-purple);margin-bottom:16px;display:inline-flex;align-items:center;gap:6px"><i class="fa-solid fa-arrow-left"></i> 返回首页</a>
    <h1 style="font-size:22px;font-weight:800;margin-bottom:8px">发布图文</h1>
    <p style="color:var(--t-secondary);font-size:13px;margin-bottom:20px">拖拽上传或多选图片，支持 JPG / PNG / WebP，单张最大 20MB。</p>
    <div class="pub-hero"><span><i class="fa-regular fa-image"></i> 预览区域 · 示例图来自 Pexels</span></div>
    <textarea class="textarea" style="min-height:120px;margin-bottom:14px" placeholder="添加标题或正文…"></textarea>
    <div class="price-opt">
        <label><i class="fa-solid fa-tag" style="color:#F59E0B"></i> 单篇定价（可选）</label>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
            <input type="number" class="input" id="priceImg" placeholder="留空表示免费" min="0" step="0.01" style="max-width:200px" />
            <span style="font-size:12px;color:var(--t-tertiary)">USDT · 留空则发布后对所有用户免费浏览</span>
        </div>
        <p class="hint">提交后将进入审核队列，定价可在审核通过前于「创作内容」中修改。</p>
    </div>
    <button type="button" class="btn btn-primary btn-lg btn-block" onclick="location.href='home.html'"><i class="fa-solid fa-paper-plane"></i> 提交审核并发布</button>
</div>
</body>
</html>
