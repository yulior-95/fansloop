<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>异常 · 邮箱已绑定其他账号</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<link rel="stylesheet" href="../css-web/prototype-guest-first.css">

<link rel="stylesheet" href="../css-web/global-lang-switch.css">
<script src="../js-web/global-lang-switch.js" defer></script>
</head>
<body>
<div class="gf-modal-root">
    <div class="gf-modal" style="max-width:400px;">
        <div class="gf-modal-head">
            <div>
                <h2>无法发送验证码</h2>
                <p>绑定邮箱冲突提示</p>
            </div>
            <button type="button" class="close-x" onclick="location.href='guest-home.html'"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="gf-modal-body">
            <div class="alert-gf danger">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <div><strong>该邮箱已绑定其他账号。</strong><br />请更换邮箱，或使用该邮箱登录原账号后在「设置」发起换绑流程。</div>
            </div>
            <button type="button" class="btn-gf-primary" style="margin-top:14px;" onclick="location.href='settings-security-binding.html'">我知道了</button>
        </div>
    </div>
</div>
</body>
</html>
