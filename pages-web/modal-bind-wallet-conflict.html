<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>异常 · 钱包已绑定其他账号</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">

<script src="../js-web/global-lang-switch.js" defer></script>
</head>
<body>
<div class="gf-modal-root">
    <div class="gf-modal" style="max-width:400px;">
        <div class="gf-modal-head">
            <div>
                <h2>无法完成绑定</h2>
                <p>钱包地址冲突提示</p>
            </div>
            <button type="button" class="close-x" onclick="location.href='guest-home.html'"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="gf-modal-body">
            <div style="padding:12px;border-radius:var(--r-md);background:var(--bg-input);border:1px solid var(--border);font-family:ui-monospace,monospace;font-size:12px;color:var(--t-secondary);margin-bottom:14px;word-break:break-all;">
                0x71C7656EC7ab88b098defB751B7401B5f6d8976F
            </div>
            <div class="alert-gf danger">
                <i class="fa-solid fa-wallet"></i>
                <div><strong>该钱包已绑定其他账号。</strong><br />请更换钱包地址或登录对应账号后再尝试。</div>
            </div>
            <button type="button" class="btn-gf-primary" style="margin-top:14px;" onclick="location.href='modal-login-main.html'">切换其他钱包登录</button>
        </div>
    </div>
</div>
