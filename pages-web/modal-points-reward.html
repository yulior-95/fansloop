<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>积分奖励 · 弹窗原型</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
        radial-gradient(ellipse 800px 500px at 50% 20%, rgba(168,85,247,0.2), transparent 55%),
        radial-gradient(ellipse 600px 400px at 80% 80%, rgba(245,158,11,0.15), transparent 50%),
        linear-gradient(165deg, #0B0B14 0%, #1a1035 100%);
}

.pr-overlay {
    width: 100%;
    max-width: 440px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-xl);
    box-shadow: 0 28px 70px rgba(0,0,0,0.55), 0 0 60px rgba(251,191,36,0.12);
    overflow: hidden;
    position: relative;
}

.pr-overlay::before {
    content: '';
    position: absolute;
    top: -40%;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, rgba(251,191,36,0.35), transparent 70%);
    pointer-events: none;
}

.pr-head {
    position: relative;
    padding: 26px 22px 18px;
    text-align: center;
    border-bottom: 1px solid var(--border);
}
.pr-head .badge-icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 14px;
    border-radius: 50%;
    background: linear-gradient(145deg, #FEF3C7, #F59E0B 45%, #D97706);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: #78350F;
    box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.45),
        0 12px 28px rgba(245,158,11,0.45);
    animation: prPop 0.55s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes prPop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
.pr-head h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.3px; }
.pr-head p { font-size: 12.5px; color: var(--t-tertiary); margin-top: 6px; line-height: 1.5; }

.pr-body { position: relative; padding: 20px 22px 22px; }

.pr-amount {
    text-align: center;
    padding: 18px;
    border-radius: var(--r-lg);
    background: linear-gradient(135deg, rgba(168,85,247,0.12), rgba(236,72,153,0.06));
    border: 1px dashed rgba(251,191,36,0.35);
    margin-bottom: 16px;
}
.pr-amount .num {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #FBBF24, #F59E0B 40%, #EC4899);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}
.pr-amount .lbl { font-size: 12px; color: var(--t-secondary); margin-top: 4px; }

.pr-list {
    display: grid;
    gap: 8px;
    margin-bottom: 18px;
}
.pr-list .li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--bg-input);
    border-radius: var(--r-md);
    font-size: 12.5px;
    color: var(--t-secondary);
}
.pr-list .li i { color: var(--success); margin-right: 8px; }

.pr-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.pr-actions .btn-main {
    height: 46px;
    border-radius: var(--r-md);
    background: var(--brand-grad);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.pr-actions .btn-ghost {
    height: 42px;
    border-radius: var(--r-md);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--t-secondary);
    font-size: 13px;
    font-weight: 600;
}

.pr-close-hint {
    text-align: center;
    font-size: 11px;
    color: var(--t-quaternary);
    margin-top: 12px;
}
</style>
</head>
<body>

<div class="pr-overlay" role="dialog" aria-labelledby="prTitle">
    <div class="pr-head">
        <div class="badge-icon"><i class="fa-solid fa-coins"></i></div>
        <h1 id="prTitle">计时奖励已到账</h1>
        <p>与 App 端「赚积分」悬浮球同一逻辑：倒计时结束后自动发放，积分进入平台账户，可在商城兑换权益。</p>
    </div>
    <div class="pr-body">
        <div class="pr-amount">
            <div class="num">+128</div>
            <div class="lbl">基础奖励 100 · 连续活跃加成 28</div>
        </div>
        <div class="pr-list">
            <div class="li"><span><i class="fa-solid fa-circle-check"></i>本期任务</span><strong style="color:#fff">浏览 Feed 满 90 秒</strong></div>
            <div class="li"><span><i class="fa-solid fa-circle-check"></i>冷却时间</span><strong style="color:#fff">下一期 01:30 后可领</strong></div>
        </div>
        <div class="pr-actions">
            <button type="button" class="btn-main" onclick="location.href='points-mall.html'"><i class="fa-solid fa-store"></i> 前往积分商城兑换</button>
            <button type="button" class="btn-ghost" onclick="history.length > 1 ? history.back() : location.href='home.html'">开心收下</button>
        </div>
        <p class="pr-close-hint">此页为独立弹窗原型，供 index-web 平铺预览；交互演示中弹窗挂在 yanshi-web 顶层。</p>
    </div>
</div>

</body>
</html>
