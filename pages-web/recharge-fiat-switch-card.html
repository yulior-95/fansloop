<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>选择银行卡</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
body { background: var(--bg-app); }
.modal-mask { background: rgba(0,0,0,0.7); }
.modal { max-width: 500px; }

.bank-row {
    display: flex; align-items: center; gap: 14px;
    padding: 16px;
    background: var(--bg-input);
    border: 1.5px solid var(--border);
    border-radius: var(--r-md);
    margin-bottom: 8px;
    cursor: pointer;
    transition: 0.15s;
    position: relative;
}
.bank-row:hover { border-color: var(--border-strong); }
.bank-row.active {
    background: linear-gradient(135deg, rgba(168,85,247,0.1), rgba(236,72,153,0.04));
    border-color: var(--brand-purple);
}
.bank-row .bk-logo {
    width: 44px; height: 44px;
    border-radius: 10px;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800;
    flex-shrink: 0;
}
.bank-row.cmb .bk-logo  { background: linear-gradient(135deg, #C8102E, #8B0000); }
.bank-row.icbc .bk-logo { background: linear-gradient(135deg, #C8102E, #B91C1C); }
.bank-row.ccb .bk-logo  { background: linear-gradient(135deg, #1E40AF, #1E3A8A); }
.bank-row .info { flex: 1; }
.bank-row .info .n { font-size: 14px; font-weight: 700; }
.bank-row .info .a { font-size: 11.5px; color: var(--t-tertiary); margin-top: 3px; font-family: ui-monospace, monospace; }
.bank-row .info .meta { display: flex; gap: 6px; margin-top: 6px; }
.bank-row .check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    color: transparent; font-size: 11px;
}
.bank-row.active .check { background: var(--brand-grad); border-color: transparent; color: #fff; }
.bank-row .menu {
    color: var(--t-tertiary);
    padding: 6px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="modal-mask">
    <div class="modal">
        <div class="modal-head">
            <h2 style="font-size: 16px"><span class="ic"><i class="fa-solid fa-credit-card"></i></span>选择支付银行卡
                <span class="sub">已绑定 3 张 · 点击切换</span>
            </h2>
            <button class="close" onclick="location.href='recharge-fiat-verify.html'"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="modal-body">
            <div class="bank-row cmb active">
                <div class="bk-logo">招</div>
                <div class="info">
                    <div class="n">招商银行 · 储蓄卡</div>
                    <div class="a">**** **** **** 6618</div>
                    <div class="meta">
                        <span class="tag tag-success" style="font-size: 9px"><i class="fa-solid fa-star"></i> 默认</span>
                        <span class="tag tag-info" style="font-size: 9px">实名 黄某某</span>
                    </div>
                </div>
                <div class="check"><i class="fa-solid fa-check"></i></div>
            </div>

            <div class="bank-row icbc">
                <div class="bk-logo">工</div>
                <div class="info">
                    <div class="n">中国工商银行 · 储蓄卡</div>
                    <div class="a">**** **** **** 8842</div>
                    <div class="meta">
                        <span class="tag tag-info" style="font-size: 9px">实名 黄某某</span>
                    </div>
                </div>
                <div class="check"></div>
                <i class="fa-solid fa-ellipsis menu" title="管理"></i>
            </div>

            <div class="bank-row ccb">
                <div class="bk-logo">建</div>
                <div class="info">
                    <div class="n">中国建设银行 · 信用卡</div>
                    <div class="a">**** **** **** 2156</div>
                    <div class="meta">
                        <span class="tag tag-warning" style="font-size: 9px">该卡不支持充值</span>
                    </div>
                </div>
                <div class="check"></div>
                <i class="fa-solid fa-ellipsis menu"></i>
            </div>

            <button class="btn btn-secondary btn-block" style="margin-top: 14px" onclick="location.href='recharge-fiat-bind.html'">
                <i class="fa-solid fa-plus"></i>添加新银行卡
            </button>
        </div>

        <div class="modal-foot">
            <button class="btn" onclick="location.href='recharge-fiat-verify.html'">取消</button>
            <button class="btn btn-primary" onclick="location.href='recharge-fiat-verify.html'">确认使用此卡</button>
        </div>
    </div>
</div>

</body>
</html>
