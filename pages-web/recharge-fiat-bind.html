<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>绑定银行卡</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
body { background: var(--bg-app); }
.modal-mask { background: rgba(0,0,0,0.7); }
.modal { max-width: 560px; }

.card-preview {
    background: linear-gradient(135deg, #C8102E, #8B0000);
    border-radius: var(--r-lg);
    padding: 20px;
    color: #fff;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
}
.card-preview::before {
    content: '';
    position: absolute;
    top: -50px; right: -50px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
    border-radius: 50%;
}
.cp-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; position: relative; z-index: 2; }
.cp-top .bank { font-size: 14px; font-weight: 700; }
.cp-top .chip {
    width: 32px; height: 22px;
    background: linear-gradient(135deg, #FBBF24, #F59E0B);
    border-radius: 4px;
}
.cp-num { font-size: 20px; font-weight: 700; letter-spacing: 2px; font-family: ui-monospace, monospace; margin-bottom: 14px; position: relative; z-index: 2; }
.cp-bot { display: flex; justify-content: space-between; align-items: flex-end; position: relative; z-index: 2; }
.cp-bot .lbl { font-size: 9px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
.cp-bot .val { font-size: 12px; font-weight: 600; margin-top: 2px; }
</style>
</head>
<body>

<div class="modal-mask">
    <div class="modal">
        <div class="modal-head">
            <h2><span class="ic"><i class="fa-solid fa-credit-card"></i></span>绑定银行卡
                <span class="sub">实名信息须与身份证一致</span>
            </h2>
            <button class="close" onclick="location.href='recharge-fiat.html'"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="modal-body">

            <div class="card-preview">
                <div class="cp-top">
                    <span class="bank">招商银行 · 储蓄卡</span>
                    <div class="chip"></div>
                </div>
                <div class="cp-num">6225 **** **** ****</div>
                <div class="cp-bot">
                    <div>
                        <div class="lbl">CARDHOLDER</div>
                        <div class="val">YOUR NAME</div>
                    </div>
                    <div style="font-size: 18px; font-weight: 800; opacity: 0.6">VISA</div>
                </div>
            </div>

            <div class="field">
                <label class="field-label">持卡人姓名 <span class="req">*</span></label>
                <input type="text" class="input" placeholder="请输入持卡人姓名（须与身份证一致）" />
            </div>

            <div class="field">
                <label class="field-label">身份证号码 <span class="req">*</span></label>
                <input type="text" class="input" placeholder="请输入身份证号码" />
            </div>

            <div class="field">
                <label class="field-label">银行卡号 <span class="req">*</span></label>
                <input type="text" class="input" placeholder="请输入银行卡号" value="6225 8800 1234 6618" />
                <div class="field-help t-success" style="margin-top: 6px"><i class="fa-solid fa-circle-check"></i> 已自动识别：招商银行 · 储蓄卡</div>
            </div>

            <div class="field">
                <label class="field-label">银行预留手机号 <span class="req">*</span></label>
                <div class="input-group">
                    <span class="pre">+86</span>
                    <input type="text" class="input" placeholder="请输入银行预留手机号" value="138 ****  8866" />
                </div>
                <div class="field-help">必须与该卡在银行登记的手机号一致</div>
            </div>

            <div class="notice notice-info" style="margin-top: 18px">
                <i class="fa-solid fa-shield-halved ni"></i>
                <span><b>实名信息将被加密存储</b><br>FansLoop 不会泄露你的实名信息，仅用于支付验证与合规反洗钱风控。</span>
            </div>
        </div>

        <div class="modal-foot">
            <button class="btn" onclick="location.href='recharge-fiat.html'">取消</button>
            <button class="btn btn-primary" onclick="location.href='recharge-fiat.html'">
                <i class="fa-solid fa-shield-halved"></i>提交并绑定
            </button>
        </div>
    </div>
</div>

</body>
</html>
