<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>订单已超时</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
body { background: var(--bg-app); }
.modal-mask { background: rgba(0,0,0,0.7); }
.modal { max-width: 480px; }

.timeout-hero {
    text-align: center;
    padding: 28px 0 18px;
}
.timeout-hero .ic-wrap {
    width: 88px; height: 88px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: rgba(245,158,11,0.12);
    display: flex; align-items: center; justify-content: center;
    color: var(--warning-light);
    font-size: 36px;
    border: 1px solid rgba(245,158,11,0.25);
}
.timeout-hero h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.timeout-hero p { font-size: 13px; color: var(--t-tertiary); max-width: 320px; margin: 0 auto; line-height: 1.5; }
</style>
</head>
<body>

<div class="modal-mask">
    <div class="modal">
        <div class="modal-head">
            <h2 style="font-size: 16px"><span class="ic" style="background: rgba(245,158,11,0.18); box-shadow: none; color: var(--warning-light)"><i class="fa-solid fa-clock"></i></span>订单已超时</h2>
            <button class="close" onclick="location.href='recharge.html'"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="modal-body">
            <div class="timeout-hero">
                <div class="ic-wrap"><i class="fa-solid fa-hourglass-end"></i></div>
                <h2>订单已超时取消</h2>
                <p>订单 #FL2604251108 已超过 30 分钟有效期未完成转账，已自动取消</p>
            </div>

            <div class="kv-list" style="background: var(--bg-input); padding: 16px; border-radius: var(--r-md)">
                <div class="kv-row"><span class="k">订单号</span><span class="v code">FL2604251108</span></div>
                <div class="kv-row"><span class="k">充值金额</span><span class="v num">200.00 USDT</span></div>
                <div class="kv-row"><span class="k">订单创建</span><span class="v">2026-04-25 11:08</span></div>
                <div class="kv-row"><span class="k">取消时间</span><span class="v warning">2026-04-25 11:38</span></div>
                <div class="kv-row" style="border-bottom: none">
                    <span class="k">订单状态</span>
                    <span class="v"><span class="tag tag-warning">已超时取消</span></span>
                </div>
            </div>

            <div class="notice notice-info" style="margin-top: 14px">
                <i class="fa-solid fa-circle-info ni"></i>
                <span><b>如果你已经转账</b>，资金会自动退回到你的转出地址（约 1-12 个区块确认）。如未收到，请<a href="#" style="color:var(--brand-purple)">联系客服</a>提供 TxHash 协助处理。</span>
            </div>
        </div>

        <div class="modal-foot">
            <button class="btn" onclick="location.href='wallet.html'"><i class="fa-solid fa-house"></i>返回钱包</button>
            <button class="btn btn-primary" onclick="location.href='recharge.html'"><i class="fa-solid fa-rotate-right"></i>重新发起充值</button>
        </div>
    </div>
</div>

</body>
</html>
