<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邮箱未注册 · 二次确认</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<link rel="stylesheet" href="../css-web/prototype-guest-first.css">
<style>
.stack-modal { position:relative; }
.stack-modal .gf-modal { max-width:420px; }
.overlay-mini {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    border-radius: var(--r-xl);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
}
.overlay-mini .sheet {
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-lg);
    padding: 18px;
    width: 100%;
    max-width: 340px;
    box-shadow: var(--shadow-lg);
}
.overlay-mini .sheet h3 { font-size: 15px; font-weight: 800; margin-bottom: 8px; }
.overlay-mini .sheet p { font-size: 12px; color: var(--t-secondary); line-height: 1.5; margin-bottom: 14px; }
</style>

<link rel="stylesheet" href="../css-web/global-lang-switch.css">
<script src="../js-web/global-lang-switch.js" defer></script>
</head>
<body>
<div class="gf-modal-root stack-modal">
    <div class="gf-modal" style="position:relative;">
        <div class="gf-modal-head">
            <div>
                <h2>邮箱登录</h2>
                <p>校验邮箱注册状态 · 静态原型</p>
            </div>
            <a href="guest-home.html" class="close-x" title="关闭"><i class="fa-solid fa-xmark"></i></a>
        </div>
        <div class="gf-modal-body" style="padding-bottom:80px;">
            <div class="gf-field">
                <label>邮箱</label>
                <input type="email" value="new-user@example.com" readonly style="opacity:0.85;" />
            </div>
            <div class="gf-field">
                <label>验证码</label>
                <input type="text" placeholder="等待验证…" disabled />
            </div>
        </div>

        <div class="overlay-mini">
            <div class="sheet">
                <h3><i class="fa-solid fa-circle-exclamation" style="color:var(--warning-light);margin-right:6px;"></i>账号未注册</h3>
                <p>该邮箱尚未注册 FansLoop，是否需要进行<strong style="color:#fff;">注册并登录</strong>？注册流程将使用当前邮箱并校验验证码。</p>
                <div class="dialog-actions">
                    <button type="button" class="btn-gf-ghost" onclick="location.href='guest-home.html'">取消</button>
                    <button type="button" class="btn-gf-primary" onclick="location.href='modal-email-register-code.html'">注册并登录</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
