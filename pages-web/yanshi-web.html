<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>FansLoop Web · 交互演示</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
html, body { height: 100%; overflow: hidden; }
body { display: grid; grid-template-rows: auto 1fr; }

.demo-bar {
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    padding: 10px 22px;
    display: flex; align-items: center; gap: 14px;
    height: 56px;
}
.demo-bar .brand { display: flex; align-items: center; gap: 10px; padding-right: 18px; border-right: 1px solid var(--border); margin-right: 6px; }
.demo-bar .brand .lo { width: 32px; height: 32px; border-radius: 8px; background: var(--brand-grad); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; }
.demo-bar .brand .nm { font-size: 14px; font-weight: 800; }
.demo-bar .brand .sub { font-size: 10px; color: var(--t-tertiary); }

.nav-btns { display: flex; gap: 4px; }
.nav-btns button {
    width: 32px; height: 32px;
    background: var(--bg-input); border: 1px solid var(--border);
    color: var(--t-secondary); border-radius: 8px;
    cursor: pointer; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
}
.nav-btns button:hover { background: var(--bg-card-2); color: #fff; }

.demo-search-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    position: relative;
}
.demo-search-wrap .in-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 12px 0 14px;
    height: 36px;
    min-width: 0;
}
.demo-search-wrap .in-wrap i { color: var(--t-tertiary); font-size: 13px; flex-shrink: 0; }
.demo-search-wrap .in-wrap input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    color: var(--t-primary);
    font-size: 13px;
    outline: none;
}
.demo-search-wrap .in-wrap input::placeholder { color: var(--t-tertiary); }
.demo-suggest {
    display: none;
    position: absolute;
    left: 0;
    right: 88px;
    top: calc(100% + 6px);
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 1000;
    box-shadow: var(--shadow-lg);
}
.demo-suggest.show { display: block; }
.demo-suggest button {
    width: 100%;
    text-align: left;
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--t-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
}
.demo-suggest button:last-child { border-bottom: none; }
.demo-suggest button:hover { background: var(--bg-input); color: #fff; }
.demo-search-wrap .btn-search-go {
    height: 36px;
    padding: 0 18px;
    background: var(--brand-grad);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
}
.demo-search-wrap .btn-search-go:hover { filter: brightness(1.08); }
.url-bar {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
}
.url-bar i.lock { color: var(--success); font-size: 11px; }
.url-bar .path { color: var(--t-tertiary); }
.url-bar .page { color: #fff; font-weight: 600; }

.viewport-toggle { display: flex; gap: 2px; padding: 3px; background: var(--bg-input); border-radius: 8px; }
.viewport-toggle button { background: transparent; border: none; padding: 6px 10px; font-size: 11px; color: var(--t-tertiary); border-radius: 5px; cursor: pointer; }
.viewport-toggle button.active { background: var(--brand-grad); color: #fff; }

.page-picker {
    position: relative;
}
.page-picker > button {
    height: 36px;
    padding: 0 14px; gap: 8px;
    background: var(--bg-input); border: 1px solid var(--border);
    color: #fff; border-radius: 10px;
    font-size: 12.5px; font-weight: 600;
    display: flex; align-items: center;
    cursor: pointer;
}
.dropdown {
    position: absolute; right: 0; top: calc(100% + 6px);
    width: 720px; max-height: 70vh; overflow-y: auto;
    background: var(--bg-card); border: 1px solid var(--border-strong);
    border-radius: var(--r-lg); padding: 16px;
    box-shadow: var(--shadow-lg);
    z-index: 999;
    display: none;
}
.dropdown.show { display: block; }
.dropdown .group-title { font-size: 11px; color: var(--t-tertiary); text-transform: uppercase; letter-spacing: 0.4px; margin: 12px 0 8px; font-weight: 600; }
.dropdown .group-title:first-child { margin-top: 0; }
.dropdown .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
.dropdown .pg-item {
    padding: 8px 10px;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--t-secondary);
    display: flex; align-items: center; gap: 8px;
}
.dropdown .pg-item:hover { background: var(--bg-input); color: #fff; }
.dropdown .pg-item.active { background: var(--brand-grad); color: #fff; }
.dropdown .pg-item i { font-size: 10px; color: var(--t-tertiary); width: 14px; }
.dropdown .pg-item.active i { color: #fff; }

.stage-wrap {
    background: var(--bg-canvas);
    overflow: auto;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 22px;
}
.stage {
    width: 100%; max-width: 1440px;
    height: calc(100vh - 56px - 44px);
    background: var(--bg-app);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
}
.stage iframe { width: 100%; height: 100%; border: none; display: block; }

.stage.tablet { max-width: 1024px; }
.stage.mobile { max-width: 480px; }

/* ===== 全局悬浮 · 积分奖励倒计时（覆盖演示框架，始终可见） ===== */
.reward-dock {
    position: fixed;
    right: 22px;
    bottom: 22px;
    z-index: 10050;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px 10px 12px;
    background: rgba(17,17,28,0.92);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(251,191,36,0.35);
    border-radius: var(--r-pill);
    box-shadow: 0 14px 40px rgba(0,0,0,0.45), 0 0 28px rgba(245,158,11,0.18);
    cursor: pointer;
    text-align: left;
    color: #fff;
    max-width: calc(100vw - 40px);
    transition: transform 0.15s, border-color 0.15s;
    animation: dockIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes dockIn {
    from { transform: translateY(16px) scale(0.92); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
}
.reward-dock:hover {
    border-color: rgba(251,191,36,0.55);
    transform: translateY(-2px);
}
.reward-dock:active { transform: scale(0.98); }
.reward-dock .rd-ring {
    width: 44px; height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    --rd-progress: 100;
    background: conic-gradient(from -90deg,
        #FBBF24 0%,
        #F59E0B calc(var(--rd-progress) * 1%),
        rgba(255,255,255,0.12) calc(var(--rd-progress) * 1%));
    padding: 3px;
    position: relative;
}
.reward-dock .rd-ring::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: linear-gradient(145deg, #FEF3C7, #F59E0B 50%, #B45309);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
}
.reward-dock .rd-ring i {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    font-size: 15px;
    color: #78350F;
}
.reward-dock .rd-txt .lb { font-size: 10px; font-weight: 700; color: #FDE68A; letter-spacing: 0.3px; text-transform: uppercase; }
.reward-dock .rd-txt .tm { font-size: 17px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; margin-top: 2px; }
.reward-dock .rd-hint { font-size: 10px; color: var(--t-tertiary); margin-top: 2px; }

.reward-dock.wait-payout .rd-ring {
    animation: ringPulse 1.2s ease-in-out infinite;
}
@keyframes ringPulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.15); }
}

#rewardModalRoot {
    position: fixed;
    inset: 0;
    z-index: 10100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
}
#rewardModalRoot.show { display: flex; }

.reward-modal-panel {
    width: 100%;
    max-width: 420px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: modalUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalUp {
    from { transform: translateY(16px) scale(0.96); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
}
.reward-modal-panel .rm-hero {
    padding: 22px;
    text-align: center;
    background:
        radial-gradient(circle at 50% 0%, rgba(251,191,36,0.25), transparent 55%),
        linear-gradient(135deg, rgba(168,85,247,0.15), rgba(236,72,153,0.08));
    border-bottom: 1px solid var(--border);
}
.reward-modal-panel .rm-hero .ic {
    width: 64px; height: 64px; margin: 0 auto 12px;
    border-radius: 50%;
    background: linear-gradient(145deg, #FEF3C7, #F59E0B);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #78350F;
    box-shadow: 0 10px 24px rgba(245,158,11,0.4);
}
.reward-modal-panel .rm-hero h2 { font-size: 18px; font-weight: 900; }
.reward-modal-panel .rm-hero p { font-size: 12px; color: var(--t-tertiary); margin-top: 6px; line-height: 1.5; }
.reward-modal-panel .rm-body { padding: 20px 22px 22px; }
.reward-modal-panel .rm-amt {
    text-align: center;
    padding: 16px;
    border-radius: var(--r-lg);
    border: 1px dashed rgba(251,191,36,0.4);
    background: rgba(168,85,247,0.08);
    margin-bottom: 16px;
}
.reward-modal-panel .rm-amt .big {
    font-size: 38px;
    font-weight: 900;
    letter-spacing: -1px;
    background: var(--brand-grad-strong);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}
.reward-modal-panel .rm-amt .sub { font-size: 12px; color: var(--t-secondary); margin-top: 4px; }
.reward-modal-panel .rm-btns { display: flex; flex-direction: column; gap: 10px; }
.reward-modal-panel .rm-btns .b1 {
    height: 44px;
    border-radius: var(--r-md);
    background: var(--brand-grad);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
}
.reward-modal-panel .rm-btns .b2 {
    height: 40px;
    border-radius: var(--r-md);
    border: 1px solid var(--border);
    color: var(--t-secondary);
    font-size: 13px;
    font-weight: 600;
    background: transparent;
}
</style>
</head>
<body>

<div class="demo-bar">
    <div class="brand">
        <div class="lo"><i class="fa-solid fa-infinity"></i></div>
        <div><div class="nm">FansLoop Web Demo</div><div class="sub">交互式高保真原型</div></div>
    </div>

    <div class="nav-btns">
        <button id="btn-back" title="后退"><i class="fa-solid fa-arrow-left"></i></button>
        <button id="btn-forward" title="前进"><i class="fa-solid fa-arrow-right"></i></button>
        <button id="btn-reload" title="刷新"><i class="fa-solid fa-rotate-right"></i></button>
        <button id="btn-home" title="首页"><i class="fa-solid fa-house"></i></button>
    </div>

    <div class="demo-search-wrap">
        <div class="in-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" id="demoSearchInp" placeholder="搜索页面、创作者或话题…" autocomplete="off" />
        </div>
        <button type="button" class="btn-search-go" id="demoSearchBtn">搜索</button>
        <div class="demo-suggest" id="demoSuggest"></div>
    </div>
    <div class="url-bar" aria-hidden="true">
        <i class="fa-solid fa-lock lock"></i>
        <span><span class="path">https://fansloop.io/</span><span class="page" id="urlPage">guest-home.html</span></span>
    </div>

    <div class="viewport-toggle">
        <button class="active" data-vp="desktop"><i class="fa-solid fa-desktop"></i> 桌面</button>
        <button data-vp="tablet"><i class="fa-solid fa-tablet"></i> 平板</button>
        <button data-vp="mobile"><i class="fa-solid fa-mobile"></i> 移动</button>
    </div>

    <div class="page-picker">
        <button id="picker-toggle">
            <i class="fa-solid fa-table-cells"></i>
            <span id="curr-page-name">游客首页（默认落地）</span>
            <i class="fa-solid fa-chevron-down" style="font-size: 9px"></i>
        </button>
        <div class="dropdown" id="dropdown"></div>
    </div>
</div>

<div class="stage-wrap">
    <div class="stage" id="stage">
        <iframe id="frame" src="guest-home.html"></iframe>
    </div>
</div>

<button type="button" class="reward-dock" id="rewardDock" title="点击进入积分商城；倒计时结束自动发放奖励">
    <div class="rd-ring" id="rewardRing" style="--rd-progress:100">
        <i class="fa-solid fa-coins"></i>
    </div>
    <div class="rd-txt">
        <div class="lb"><i class="fa-solid fa-gift" style="margin-right:4px;color:#FBBF24"></i>积分奖励</div>
        <div class="tm" id="rewardTime">00:45</div>
        <div class="rd-hint">点击进商城 · 结束弹出奖励</div>
    </div>
</button>

<div id="rewardModalRoot" aria-hidden="true">
    <div class="reward-modal-panel" role="dialog" aria-modal="true" aria-labelledby="rmTitle">
        <div class="rm-hero">
            <div class="ic"><i class="fa-solid fa-sparkles"></i></div>
            <h2 id="rmTitle">恭喜获得积分奖励</h2>
            <p>奖励已发放至你的平台账户（与 App 端「赚积分」入口一致），可用于订阅抵扣、解锁付费内容、直播礼物补贴等。</p>
        </div>
        <div class="rm-body">
            <div class="rm-amt">
                <div class="big" id="rmPoints">+128</div>
                <div class="sub" id="rmDetail">含连续活跃加成 · 详见账变记录</div>
            </div>
            <div class="rm-btns">
                <button type="button" class="b1" id="rmGoMall"><i class="fa-solid fa-store"></i> 前往积分商城</button>
                <button type="button" class="b2" id="rmDismiss">开心收下</button>
            </div>
        </div>
    </div>
</div>

<script src="demo-pages-data.js"></script>
<script>
const frame = document.getElementById('frame');
const urlPage = document.getElementById('urlPage');
const currName = document.getElementById('curr-page-name');
const dropdown = document.getElementById('dropdown');
const stage = document.getElementById('stage');

let PAGE_NAMES = {};
let DEMO_ROUTES = [];
let history = ['guest-home.html'];
let cursor = 0;

function syncRewardDockForPage(page) {
    const dock = document.getElementById('rewardDock');
    if (!dock) return;
    const file = ((page || '').split('/').pop() || '').toLowerCase();
    const hideDock =
        file.startsWith('guest-') ||
        file.startsWith('login-') ||
        file.startsWith('register-') ||
        file.startsWith('modal-login') ||
        file.startsWith('modal-email') ||
        file.startsWith('modal-wallet') ||
        file.startsWith('modal-wallet-auth') ||
        file.startsWith('modal-bind') ||
        file.startsWith('login-modal-home') ||
        file.startsWith('onboarding-profile');
    dock.style.display = hideDock ? 'none' : '';
}

function navigate(page, name, push=true) {
    frame.src = page;
    urlPage.textContent = page;
    currName.textContent = name || PAGE_NAMES[page] || page;
    if (push) {
        history = history.slice(0, cursor + 1);
        history.push(page);
        cursor = history.length - 1;
    }
    document.querySelectorAll('.pg-item').forEach(it => it.classList.toggle('active', it.dataset.page === page));
    syncRewardDockForPage(page);
}

function renderPagePicker() {
    if (!window.DEMO_PAGE_GROUPS || !dropdown) return;
    dropdown.innerHTML = '';
    PAGE_NAMES = {};
    window.DEMO_PAGE_GROUPS.forEach(([title, items]) => {
        const gt = document.createElement('div');
        gt.className = 'group-title';
        gt.textContent = title;
        dropdown.appendChild(gt);
        const grid = document.createElement('div');
        grid.className = 'grid';
        items.forEach(([page, label]) => {
            PAGE_NAMES[page] = label;
            const el = document.createElement('div');
            el.className = 'pg-item';
            el.dataset.page = page;
            el.dataset.pgLabel = label;
            el.innerHTML = '<i class="fa-solid fa-file-lines"></i>' + label;
            if (page === 'guest-home.html') el.classList.add('active');
            grid.appendChild(el);
        });
        dropdown.appendChild(grid);
    });
    dropdown.querySelectorAll('.pg-item').forEach(it => {
        it.addEventListener('click', () => {
            navigate(it.dataset.page, it.dataset.pgLabel, true);
            dropdown.classList.remove('show');
        });
    });
}

function buildDemoRoutes() {
    DEMO_ROUTES = [];
    (window.DEMO_PAGE_GROUPS || []).forEach(([_, items]) => {
        items.forEach(([page, name]) => {
            const slug = page.replace('.html', '').toLowerCase();
            DEMO_ROUTES.push({
                page,
                name,
                q: [name.toLowerCase(), page.toLowerCase(), slug, slug.replace(/-/g, '')]
            });
        });
    });
}

renderPagePicker();
buildDemoRoutes();

document.getElementById('picker-toggle').addEventListener('click', e => {
    e.stopPropagation();
    dropdown.classList.toggle('show');
});
document.addEventListener('click', () => dropdown.classList.remove('show'));

document.getElementById('btn-back').addEventListener('click', () => {
    if (cursor > 0) { cursor--; navigate(history[cursor], null, false); }
});
document.getElementById('btn-forward').addEventListener('click', () => {
    if (cursor < history.length-1) { cursor++; navigate(history[cursor], null, false); }
});
document.getElementById('btn-reload').addEventListener('click', () => {
    const cur = frame.src.split('/').pop() || history[cursor];
    frame.src = frame.src;
    syncRewardDockForPage(cur);
});
frame.addEventListener('load', () => {
    try {
        const path = frame.contentWindow.location.pathname || '';
        const file = path.split('/').pop() || '';
        if (file) syncRewardDockForPage(file);
    } catch (e) {
        syncRewardDockForPage(history[cursor] || '');
    }
});
document.getElementById('btn-home').addEventListener('click', () => navigate('guest-home.html', PAGE_NAMES['guest-home.html'], true));

document.querySelectorAll('.viewport-toggle button').forEach(b => {
    b.addEventListener('click', () => {
        document.querySelectorAll('.viewport-toggle button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        stage.className = 'stage ' + (b.dataset.vp === 'desktop' ? '' : b.dataset.vp);
    });
});

const dsInp = document.getElementById('demoSearchInp');
const dsBox = document.getElementById('demoSuggest');
function demoSuggestRender() {
    const v = (dsInp.value || '').trim().toLowerCase();
    dsBox.innerHTML = '';
    const hits = !v ? DEMO_ROUTES : DEMO_ROUTES.filter(r =>
        r.q.some(k => k.includes(v)) || r.name.toLowerCase().includes(v) || r.page.toLowerCase().includes(v)
    );
    (hits.length ? hits : DEMO_ROUTES).slice(0, 12).forEach(r => {
        const b = document.createElement('button');
        b.type = 'button';
        b.innerHTML = '<i class="fa-solid fa-file-lines" style="color:var(--brand-purple);width:14px"></i> ' + r.name + ' <span style="opacity:.5;font-size:11px;margin-left:auto">' + r.page + '</span>';
        b.onclick = () => { navigate(r.page, r.name, true); dsBox.classList.remove('show'); dsInp.value = ''; };
        dsBox.appendChild(b);
    });
    dsBox.classList.add('show');
}
dsInp.addEventListener('focus', demoSuggestRender);
dsInp.addEventListener('input', demoSuggestRender);
document.getElementById('demoSearchBtn').addEventListener('click', () => {
    const v = (dsInp.value || '').trim().toLowerCase();
    const hit = DEMO_ROUTES.find(r =>
        r.q.some(k => k.includes(v)) || r.name.toLowerCase().includes(v) || r.page.toLowerCase().includes(v)
    );
    navigate(hit ? hit.page : 'guest-home.html', hit ? hit.name : PAGE_NAMES['guest-home.html'], true);
    dsBox.classList.remove('show');
});
document.addEventListener('click', e => {
    if (!e.target.closest('.demo-search-wrap')) dsBox.classList.remove('show');
});

/* ========== 积分倒计时 · 顶层弹窗（不写入 iframe 内） ========== */
const REWARD_TOTAL = 45;
let rewardLeft = REWARD_TOTAL;
let rewardTimer = null;

const rewardDock = document.getElementById('rewardDock');
const rewardTime = document.getElementById('rewardTime');
const rewardRing = document.getElementById('rewardRing');
const rewardModalRoot = document.getElementById('rewardModalRoot');
const rmPoints = document.getElementById('rmPoints');
const rmDetail = document.getElementById('rmDetail');
const rmGoMall = document.getElementById('rmGoMall');
const rmDismiss = document.getElementById('rmDismiss');

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function syncRewardRing() {
    const p = Math.max(0, Math.min(100, (rewardLeft / REWARD_TOTAL) * 100));
    rewardRing.style.setProperty('--rd-progress', String(Math.round(p)));
}

function pickReward() {
    const base = 80 + Math.floor(Math.random() * 40);
    const bonus = Math.floor(Math.random() * 35);
    return { total: base + bonus, base, bonus };
}

function showRewardModal() {
    const r = pickReward();
    rmPoints.textContent = '+' + r.total;
    rmDetail.textContent = r.bonus > 0
        ? '基础 ' + r.base + ' · 连续活跃加成 +' + r.bonus
        : '基础奖励 ' + r.base + ' 积分';
    rewardModalRoot.classList.add('show');
    rewardModalRoot.setAttribute('aria-hidden', 'false');
    rewardDock.classList.add('wait-payout');
}

function hideRewardModal() {
    rewardModalRoot.classList.remove('show');
    rewardModalRoot.setAttribute('aria-hidden', 'true');
    rewardDock.classList.remove('wait-payout');
}

function startRewardCountdown() {
    if (rewardTimer) clearInterval(rewardTimer);
    rewardLeft = REWARD_TOTAL;
    syncRewardRing();
    rewardTime.textContent = formatTime(rewardLeft);
    rewardTimer = setInterval(() => {
        rewardLeft--;
        if (rewardLeft <= 0) {
            clearInterval(rewardTimer);
            rewardTimer = null;
            rewardLeft = 0;
            rewardTime.textContent = '00:00';
            syncRewardRing();
            showRewardModal();
            return;
        }
        rewardTime.textContent = formatTime(rewardLeft);
        syncRewardRing();
    }, 1000);
}

rewardDock.addEventListener('click', () => {
    navigate('points-mall.html', '积分兑换商城');
});

rmGoMall.addEventListener('click', () => {
    hideRewardModal();
    navigate('points-mall.html', '积分兑换商城');
});

rmDismiss.addEventListener('click', () => {
    hideRewardModal();
    startRewardCountdown();
});

rewardModalRoot.addEventListener('click', e => {
    if (e.target === rewardModalRoot) {
        hideRewardModal();
        startRewardCountdown();
    }
});

startRewardCountdown();
syncRewardDockForPage('guest-home.html');
</script>
</body>
</html>
