<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完善信息 · 注册后资料</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<link rel="stylesheet" href="../css-web/prototype-guest-first.css">
<style>
.avatar-upload {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    margin: 0 auto 18px;
    border: 2px dashed var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    font-size: 11px;
    color: var(--t-tertiary);
    cursor: pointer;
    background-size: cover;
    background-position: center;
    background-image: url('https://images.unsplash.com/photo-1527980965255-d3b416303d12?auto=format&fit=crop&w=240&q=80');
}
.avatar-upload i { font-size: 18px; color: var(--brand-purple); }
.top-bar {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(11,11,20,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 50;
}
.top-bar .brand { font-weight: 900; letter-spacing: -0.3px; display: flex; align-items: center; gap: 10px; }
.top-bar .brand i { color: var(--brand-purple); }
</style>

<link rel="stylesheet" href="../css-web/global-lang-switch.css">
<script src="../js-web/global-lang-switch.js" defer></script>
</head>
<body>

<header class="top-bar">
    <div class="brand"><i class="fa-solid fa-infinity"></i> FansLoop · <span style="font-size:12px;font-weight:700;color:var(--t-tertiary);">Onboarding</span></div>
    <button type="button" class="btn btn-secondary" style="padding:8px 14px;border-radius:var(--r-md);font-weight:700;" onclick="location.href='home.html'">跳过（原型）</button>
</header>

<div class="onboard-wrap">
    <div class="onboard-card">
        <div style="text-align:center;margin-bottom:10px;">
            <div class="avatar-upload"></div>
        </div>
        <h1>完善你的创作者名片</h1>
        <p class="sub" id="onboardSub">昵称为必填；邮箱与安全绑定可在稍后「设置」补齐。地区字段默认读取 IP 归属（示意）。</p>

        <div class="gf-field">
            <label>昵称（必填）</label>
            <input type="text" placeholder="例如：LoopKid" value="" />
        </div>
        <div class="gf-field">
            <label>个人简介（选填）</label>
            <textarea rows="3" placeholder="一句话介绍你的内容与风格…"></textarea>
        </div>
        <div class="gf-field">
            <label>所在地区（默认 IP）</label>
            <select>
                <option>中国 · 上海（基于 IP 推断）</option>
                <option>中国 · 北京</option>
                <option>新加坡</option>
                <option>美国 · 加州</option>
            </select>
            <div class="hint">服务端根据访问 IP 预选，可手动修改。</div>
        </div>

        <div class="gf-field" id="walletBindOptional">
            <label>邮箱 + 验证码（选填）</label>
            <input type="email" placeholder="绑定邮箱有助于找回与安全验证" />
            <div class="hint"><strong>引导文案：</strong>建议你绑定邮箱用于安全提醒与账单通知；也可稍后在「设置 · 安全绑定」完成。</div>
            <div class="gf-row2" style="margin-top:10px;">
                <input type="text" placeholder="验证码" maxlength="6" />
                <button type="button" class="btn-gf-ghost" style="white-space:nowrap;">获取验证码</button>
            </div>
        </div>

        <button type="button" class="btn-gf-primary" style="margin-top:8px;" onclick="location.href='home.html'">
            <i class="fa-solid fa-arrow-right"></i> 完成并进入首页
        </button>
    </div>
</div>

<footer style="text-align:center;padding:32px 16px;color:var(--t-quaternary);font-size:12px;">
    配图：Unsplash 头像示例 · 静态原型
</footer>

<script>
(function () {
    var source = new URLSearchParams(location.search).get('source') || 'wallet';
    var bindField = document.getElementById('walletBindOptional');
    var sub = document.getElementById('onboardSub');
    if (source === 'email' && bindField) {
        bindField.style.display = 'none';
        if (sub) {
            sub.textContent = '昵称为必填；邮箱注册用户可稍后在「设置」补充安全绑定。地区字段默认读取 IP 归属（示意）。';
        }
    }
})();
</script>
</body>
</html>
