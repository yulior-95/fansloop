<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>常见问题排错 · FansLoop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
.modal-overlay {
    min-height: 100vh;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}
.modal-card {
    width: 100%;
    max-width: 520px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-xl);
    overflow: hidden;
}
.mc-head {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.mc-head h2 { font-size: 17px; font-weight: 800; }
.mc-body { padding: 18px 22px 22px; }
.faq {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
}
.faq:last-child { border-bottom: none; }
.faq b { display: block; margin-bottom: 6px; color: var(--t-primary); }
.faq span { color: var(--t-secondary); font-size: 12px; line-height: 1.55; }
</style>
</head>
<body>
<div class="modal-overlay">
    <div class="modal-card">
        <div class="mc-head">
            <h2><i class="fa-solid fa-life-ring" style="color:var(--brand-purple)"></i> 常见问题排错</h2>
            <a href="home.html" style="width:36px;height:36px;border-radius:var(--r-md);background:var(--bg-input);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--t-secondary)"><i class="fa-solid fa-xmark"></i></a>
        </div>
        <div class="mc-body">
            <div class="faq">
                <b>Feed 加载缓慢或空白？</b>
                <span>尝试切换网络、关闭广告拦截插件，或清除缓存后重新登录。</span>
            </div>
            <div class="faq">
                <b>充值未到账？</b>
                <span>链上确认需要一定时间，可在「钱包 → 账变记录」查看状态；超时请联系客服并提供 TxHash。</span>
            </div>
            <div class="faq">
                <b>直播无法播放？</b>
                <span>确认浏览器允许自动播放音视频；建议使用 Chrome / Edge 最新版本。</span>
            </div>
            <div class="faq">
                <b>订阅扣款异常？</b>
                <span>在「设置 → 钱包与支付」检查默认支付方式与自动续费开关。</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
