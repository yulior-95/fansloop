<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忘记密码 · FansLoop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<link rel="stylesheet" href="../css-web/prototype-guest-first.css">
<link rel="stylesheet" href="../css-web/auth-wizard-modal.css">
<link rel="stylesheet" href="../css-web/global-lang-switch.css">
<script src="../js-web/global-lang-switch.js" defer></script>
</head>
<body>
<div class="gf-modal-root">
    <div class="gf-modal" style="max-width:420px;">
        <div class="gf-modal-head">
            <div class="aw-brand">
                <div class="aw-logo"><i class="fa-solid fa-infinity"></i></div>
                <div><div class="aw-title">重置密码</div><p style="font-size:11px;color:var(--t-tertiary);margin-top:2px;">邮箱 + 验证码</p></div>
            </div>
            <a href="guest-home.html" class="close-x"><i class="fa-solid fa-xmark"></i></a>
        </div>

        <div class="gf-modal-body">
            <div class="gf-field">
                <label>邮箱</label>
                <input type="email" id="fpEmail" placeholder="注册时使用的邮箱" />
            </div>
            <div class="gf-field">
                <label>验证码</label>
                <div class="gf-row2">
                    <input type="text" id="fpOtp" placeholder="6 位验证码" maxlength="6" />
                    <button type="button" class="btn-gf-ghost" style="white-space:nowrap;" id="fpSendOtp">获取验证码</button>
                </div>
            </div>
            <div class="gf-field">
                <label>新密码</label>
                <input type="password" id="fpNew1" placeholder="不少于 8 位" />
            </div>
            <div class="gf-field">
                <label>确认新密码</label>
                <input type="password" id="fpNew2" placeholder="再次输入" />
            </div>
            <div id="fpAlert" class="alert-gf danger" style="display:none;margin-bottom:12px;"></div>
            <button type="button" class="btn-gf-primary" id="fpSubmit"><i class="fa-solid fa-key"></i> 确认重置</button>
            <p style="font-size:11px;color:var(--t-quaternary);margin-top:12px;line-height:1.45;">
                原型演示：若邮箱填写 <code style="color:#C084FC;">not-reg@test.com</code>，点击「获取验证码」或「确认重置」将提示<strong>该邮箱未注册</strong>。
            </p>
            <div style="margin-top:14px;text-align:center;font-size:12px;">
                <a href="modal-email-login.html#pwd" style="color:var(--brand-purple);font-weight:700;">返回密码登录</a>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    var unreg = 'not-reg@test.com';
    function showAlert(msg) {
        var el = document.getElementById('fpAlert');
        el.style.display = 'flex';
        el.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i><div>' + msg + '</div>';
    }
    function clearAlert() {
        var el = document.getElementById('fpAlert');
        el.style.display = 'none';
    }
    document.getElementById('fpSendOtp').addEventListener('click', function () {
        var em = (document.getElementById('fpEmail').value || '').trim().toLowerCase();
        clearAlert();
        if (em === unreg) {
            showAlert('该邮箱未注册');
            return;
        }
        alert('验证码已发送（原型）');
    });
    document.getElementById('fpSubmit').addEventListener('click', function () {
        var em = (document.getElementById('fpEmail').value || '').trim().toLowerCase();
        clearAlert();
        if (em === unreg) {
            showAlert('该邮箱未注册');
            return;
        }
        var p1 = document.getElementById('fpNew1').value;
        var p2 = document.getElementById('fpNew2').value;
        if (!document.getElementById('fpOtp').value.trim()) {
            showAlert('请输入验证码');
            return;
        }
        if (p1.length < 8) {
            showAlert('密码不少于 8 位');
            return;
        }
        if (p1 !== p2) {
            showAlert('两次密码不一致');
            return;
        }
        alert('密码已重置（原型） · 请返回登录');
        window.location.href = 'modal-email-login.html#pwd';
    });
})();
</script>
</body>
</html>
