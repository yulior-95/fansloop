<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>发布付费内容 · FansLoop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
.pub-shell { max-width: 720px; margin: 32px auto; padding: 0 20px; }
</style>

<link rel="stylesheet" href="../css-web/global-lang-switch.css">
<script src="../js-web/global-lang-switch.js" defer></script>
</head>
<body style="background:var(--bg-canvas)">
<div class="pub-shell">
    <a href="home.html" style="font-size:13px;color:var(--brand-purple);margin-bottom:16px;display:inline-flex;align-items:center;gap:6px"><i class="fa-solid fa-arrow-left"></i> 返回首页</a>
    <h1 style="font-size:22px;font-weight:800;margin-bottom:8px">发布付费内容</h1>
    <p style="color:var(--t-secondary);font-size:13px;margin-bottom:20px">设置解锁价格或仅限订阅会员可见。</p>
    <div class="field"><label class="field-label">定价 (USDT)</label><input class="input" type="number" placeholder="例如 5.00" value="5.00" /></div>
    <div class="field mt-16"><label class="field-label">正文 / 附件</label><textarea class="textarea" style="min-height:140px" placeholder="付费区域预览文案…"></textarea></div>
    <button class="btn btn-primary btn-lg btn-block mt-16" onclick="location.href='home.html'"><i class="fa-solid fa-lock"></i> 保存并上架</button>
</div>
</body>
</html>
