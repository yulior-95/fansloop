<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>生成海报 · FansLoop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
.overlay {
    min-height: 100vh;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}
.poster-phone {
    width: 280px;
    aspect-ratio: 9/16;
    border-radius: 20px;
    overflow: hidden;
    border: 3px solid var(--border-strong);
    box-shadow: var(--shadow-lg);
    position: relative;
    background: #111 url('https://images.unsplash.com/photo-1490806843957-31f4c9a91c65?w=800&q=80') center/cover;
}
.poster-phone::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.85));
}
.poster-phone .brand {
    position: absolute;
    bottom: 20px;
    left: 16px;
    right: 16px;
    z-index: 2;
    color: #fff;
}
.poster-phone .brand .lg { font-size: 18px; font-weight: 900; }
.poster-phone .brand .sub { font-size: 11px; opacity: 0.85; margin-top: 4px; }
.panel {
    margin-left: 28px;
    max-width: 320px;
}
.panel h2 { font-size: 20px; font-weight: 800; margin-bottom: 12px; }
.panel .btn-row { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
@media (max-width: 900px) {
    .overlay { flex-direction: column; }
    .panel { margin-left: 0; margin-top: 24px; text-align: center; }
}
</style>
</head>
<body>
<div class="overlay">
    <div class="poster-phone">
        <div class="brand">
            <div class="lg">FansLoop</div>
            <div class="sub">富士山日出 · @Luna 邀请你加入</div>
        </div>
    </div>
    <div class="panel">
        <h2>精美海报已生成</h2>
        <p style="font-size:13px;color:var(--t-secondary);line-height:1.6">9:16 竖版，适合 Instagram Story、小红书与朋友圈。可长按保存或点击下方下载。</p>
        <div class="btn-row">
            <button class="btn btn-primary btn-block"><i class="fa-solid fa-download"></i> 下载 PNG</button>
            <a href="share-modal.html" class="btn btn-secondary btn-block" style="text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px"><i class="fa-solid fa-arrow-left"></i> 返回分享</a>
        </div>
    </div>
</div>
</body>
</html>
