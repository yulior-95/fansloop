<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录帮助 · FansLoop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
.modal-overlay {
    min-height: 100vh;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}
.modal-card {
    width: 100%;
    max-width: 520px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-xl);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
}
.mc-head {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.mc-head h2 { font-size: 17px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
.mc-head .close {
    width: 36px; height: 36px;
    border-radius: var(--r-md);
    background: var(--bg-input);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--t-secondary);
    cursor: pointer;
}
.mc-head .close:hover { color: #fff; }
.mc-body { padding: 20px 22px 24px; max-height: 70vh; overflow-y: auto; }
.help-step {
    display: flex; gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
}
.help-step:last-child { border-bottom: none; }
.help-step .sn {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--brand-grad);
    color: #fff;
    font-size: 12px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.help-step .txt h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.help-step .txt p { font-size: 12.5px; color: var(--t-secondary); line-height: 1.55; }
.mc-foot {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-elevated);
    font-size: 12px;
    color: var(--t-tertiary);
}
</style>
</head>
<body>
<div class="modal-overlay">
    <div class="modal-card">
        <div class="mc-head">
            <h2><i class="fa-solid fa-circle-question" style="color:var(--brand-purple)"></i>登录帮助</h2>
            <a href="login-entry.html" class="close" title="关闭"><i class="fa-solid fa-xmark"></i></a>
        </div>
        <div class="mc-body">
            <div class="help-step">
                <span class="sn">1</span>
                <div class="txt">
                    <h4>安装浏览器钱包扩展</h4>
                    <p>推荐使用 MetaMask 或 Coinbase Wallet。从官方网站下载并固定到工具栏，创建或导入钱包后刷新本页。</p>
                </div>
            </div>
            <div class="help-step">
                <span class="sn">2</span>
                <div class="txt">
                    <h4>允许站点连接</h4>
                    <p>点击「连接钱包」后，在扩展弹窗中选择账户并授权<strong>读取地址</strong>（FansLoop 不会默认请求转账权限）。</p>
                </div>
            </div>
            <div class="help-step">
                <span class="sn">3</span>
                <div class="txt">
                    <h4>完成签名验证</h4>
                    <p>根据 EIP-4361 标准发起签名请求，仅在本地签名，无需支付 Gas。若拒绝签名将无法建立会话。</p>
                </div>
            </div>
            <div class="help-step">
                <span class="sn">4</span>
                <div class="txt">
                    <h4>移动端用户</h4>
                    <p>可使用 WalletConnect 扫码，或在钱包内置浏览器中直接打开 fansloop.io。</p>
                </div>
            </div>
        </div>
        <div class="mc-foot">
            仍无法登录？<a href="#" style="color:var(--brand-purple)">联系客服</a> · <a href="login-select-method.html" style="color:var(--brand-purple)">浏览全部钱包</a>
        </div>
    </div>
</div>
</body>
</html>
