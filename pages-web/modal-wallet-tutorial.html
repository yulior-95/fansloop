<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>创建钱包教程 · FansLoop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css-web/common-web.css">
<style>
.modal-overlay {
    min-height: 100vh;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}
.modal-card {
    width: 100%;
    max-width: 560px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-xl);
    overflow: hidden;
}
.mc-head {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.mc-head h2 { font-size: 17px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
.mc-head .close {
    width: 36px; height: 36px;
    border-radius: var(--r-md);
    background: var(--bg-input);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--t-secondary);
}
.mc-body { padding: 20px 22px 24px; }
.tutorial-hero {
    border-radius: var(--r-lg);
    overflow: hidden;
    margin-bottom: 18px;
    border: 1px solid var(--border);
}
.tutorial-hero img { width: 100%; height: 160px; object-fit: cover; display: block; }
.tutorial-list { display: flex; flex-direction: column; gap: 12px; }
.tl-item {
    display: flex; gap: 12px;
    padding: 14px;
    background: var(--bg-input);
    border-radius: var(--r-md);
    border: 1px solid var(--border);
}
.tl-item i { color: var(--brand-purple); margin-top: 2px; }
.tl-item .tx h4 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.tl-item .tx p { font-size: 12px; color: var(--t-secondary); line-height: 1.5; }
</style>

<link rel="stylesheet" href="../css-web/global-lang-switch.css">
<script src="../js-web/global-lang-switch.js" defer></script>
</head>
<body>
<div class="modal-overlay">
    <div class="modal-card">
        <div class="mc-head">
            <h2><i class="fa-solid fa-wallet" style="color:#F6851B"></i>创建钱包 · 图文教程</h2>
            <a href="login-entry.html" class="close"><i class="fa-solid fa-xmark"></i></a>
        </div>
        <div class="mc-body">
            <div class="tutorial-hero">
                <img src="https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=900&q=80" alt="">
            </div>
            <div class="tutorial-list">
                <div class="tl-item">
                    <i class="fa-solid fa-download"></i>
                    <div class="tx">
                        <h4>① 安装 MetaMask</h4>
                        <p>访问 metamask.io 下载对应浏览器扩展，务必核对域名以防钓鱼。</p>
                    </div>
                </div>
                <div class="tl-item">
                    <i class="fa-solid fa-key"></i>
                    <div class="tx">
                        <h4>② 保存助记词</h4>
                        <p>按向导生成新钱包，将 12 个单词抄写在纸上并离线保管，切勿截图或发送给他人。</p>
                    </div>
                </div>
                <div class="tl-item">
                    <i class="fa-solid fa-link"></i>
                    <div class="tx">
                        <h4>③ 连接 FansLoop</h4>
                        <p>返回本站点击 MetaMask 卡片，授权读取地址后即可登录或注册。</p>
                    </div>
                </div>
            </div>
            <div style="margin-top:18px;text-align:center">
                <a href="login-entry.html" class="btn btn-primary"><i class="fa-solid fa-arrow-right"></i> 我已创建钱包</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
